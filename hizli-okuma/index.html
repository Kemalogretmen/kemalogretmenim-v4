<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 Hızlı Okuma — Kemal Öğretmenim</title>
  <meta name="description" content="Sınıfa özel metinlerle hızlı okuma, anlama ve sonuç takibi için hazırlanan merkez.">
  <link rel="canonical" href="https://kemalogretmenim.com.tr/hizli-okuma/index.html">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hızlı Okuma — Kemal Öğretmenim">
  <meta property="og:description" content="Sınıfa özel metinlerle hızlı okuma, anlama ve sonuç takibi için hazırlanan merkez.">
  <meta property="og:url" content="https://kemalogretmenim.com.tr/hizli-okuma/index.html">
  <meta property="og:site_name" content="Kemal Öğretmenim">
  <meta property="og:image" content="https://kemalogretmenim.com.tr/gorseller/logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Hızlı Okuma — Kemal Öğretmenim">
  <meta name="twitter:description" content="Sınıfa özel metinlerle hızlı okuma, anlama ve sonuç takibi için hazırlanan merkez.">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .ho-hero {
      background: linear-gradient(145deg,#1A1040,#3B1F8C,#6C3DED);
      padding:52px 32px; text-align:center; position:relative; overflow:hidden;
    }
    .ho-hero::before { content:''; position:absolute; width:350px; height:350px; background:rgba(255,255,255,.04); border-radius:50%; top:-100px; left:-80px; }
    .ho-hero-em { font-size:68px; display:block; margin-bottom:14px; animation:floatB 3s ease-in-out infinite; position:relative; z-index:1; }
    .ho-hero h1 { font-size:clamp(26px,4.5vw,44px); font-weight:800; color:white; margin-bottom:8px; position:relative; z-index:1; }
    .ho-hero p  { color:rgba(255,255,255,.6); font-size:15px; font-weight:600; position:relative; z-index:1; }

    /* Steps */
    .steps-wrap { max-width:960px; margin:0 auto; padding:40px 32px; }

    /* Step indicator */
    .step-indicator { display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:36px; }
    .si-item { display:flex; align-items:center; gap:0; }
    .si-dot { width:36px; height:36px; border-radius:50%; background:var(--border); color:var(--muted); font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .3s; }
    .si-dot.active { background:var(--purple); color:white; box-shadow:0 4px 12px rgba(108,61,237,.4); }
    .si-dot.done   { background:var(--teal);   color:white; }
    .si-line { width:60px; height:3px; background:var(--border); transition:background .3s; }
    .si-line.done { background:var(--teal); }

    /* ── ADIM 1: Sınıf Seç ── */
    #step1 .step-title { font-family:var(--font-display); font-size:26px; font-weight:800; color:var(--navy); text-align:center; margin-bottom:24px; }
    .sinif-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; max-width:600px; margin:0 auto; }
    .sinif-btn {
      aspect-ratio:1; border:3px solid var(--border); border-radius:var(--r-lg);
      background:white; cursor:pointer; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:6px;
      transition:all .3s cubic-bezier(.34,1.56,.64,1); font-family:var(--font-body);
    }
    .sinif-btn:hover, .sinif-btn.active {
      border-color:var(--purple); background:#F0EBFF;
      transform:translateY(-4px) scale(1.04); box-shadow:var(--shadow-sm);
    }
    .sinif-btn-num { font-family:var(--font-display); font-size:32px; font-weight:800; color:var(--navy); }
    .sinif-btn-lbl { font-size:11px; font-weight:700; color:var(--slate); text-transform:uppercase; }
    .sinif-btn[data-s="1"]:hover, .sinif-btn[data-s="1"].active { border-color:#FF6B6B; background:#FFF0F0; }
    .sinif-btn[data-s="2"]:hover, .sinif-btn[data-s="2"].active { border-color:#FF9F43; background:#FFF5EC; }
    .sinif-btn[data-s="3"]:hover, .sinif-btn[data-s="3"].active { border-color:#00C9B1; background:#ECFDF5; }
    .sinif-btn[data-s="4"]:hover, .sinif-btn[data-s="4"].active { border-color:#4D9FF5; background:#EFF7FF; }
    .sinif-btn[data-s="5"]:hover, .sinif-btn[data-s="5"].active { border-color:var(--purple); background:#F0EBFF; }
    .sinif-btn[data-s="6"]:hover, .sinif-btn[data-s="6"].active { border-color:#8E44AD; background:#F5EAFF; }
    .sinif-btn[data-s="7"]:hover, .sinif-btn[data-s="7"].active { border-color:#E91E63; background:#FDE8EF; }
    .sinif-btn[data-s="8"]:hover, .sinif-btn[data-s="8"].active { border-color:#1A1040; background:#F0EBFF; }

    /* ── ADIM 2: Metin Seç ── */
    .metin-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .back-btn { background:none; border:2px solid var(--border); border-radius:var(--r-sm); padding:8px 14px; font-weight:700; font-size:14px; cursor:pointer; color:var(--slate); transition:all .2s; }
    .back-btn:hover { border-color:var(--purple); color:var(--purple); }
    .metin-title { font-family:var(--font-display); font-size:22px; font-weight:800; color:var(--navy); }

    /* Metin listesi — 2 sütunlu grid */
    .metin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .metin-card {
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
    }
    .metin-card:hover {
      border-color: var(--purple);
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 8px 20px rgba(108,61,237,.12);
    }
    .mc-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .mc-no {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      background: var(--bg,#F5F0FF);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mc-em { font-size: 28px; }
    .mc-body { flex: 1; min-width: 0; }
    .mc-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .mc-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .mc-meta   { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .mc-badge  { padding: 2px 8px; border-radius: 20px; font-weight: 800; font-size: 10px; }
    .badge-tam { background: #EFF7FF; color: #185FA5; }
    .badge-kw  { background: #F5EAFF; color: #7D3C98; }
    .badge-new {
      background: linear-gradient(135deg, #FFF7ED, #FFEDD5);
      color: #C2410C;
      letter-spacing: .04em;
    }
    .mc-chip   { font-size: 10px; font-weight: 700; color: var(--muted); }
    .mc-title-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, #FFF7ED, #FFEDD5);
      color: #C2410C;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .08em;
      flex-shrink: 0;
    }
    .mc-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .mc-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid transparent;
    }
    .mc-status-badge.completed {
      background: #ECFDF5;
      color: #047857;
      border-color: #A7F3D0;
    }
    .metin-card.is-complete {
      border-color: #86EFAC;
      box-shadow: 0 10px 22px rgba(16, 185, 129, .10);
    }
    .mc-arrow  { font-size: 18px; color: var(--purple); transition: transform .2s; flex-shrink: 0; }
    .metin-card:hover .mc-arrow { transform: translateX(4px); }

    /* Sayfalama */
    .metin-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .mp-btn {
      padding: 8px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      color: var(--slate);
    }
    .mp-btn:hover:not(:disabled) { border-color: var(--purple); color: var(--purple); }
    .mp-btn.active { background: var(--purple); color: white; border-color: var(--purple); }
    .mp-btn:disabled { opacity: .35; cursor: not-allowed; }
    .mp-info { font-size: 12px; color: var(--muted); font-weight: 700; padding: 0 4px; }

    .no-metin { text-align:center; padding:60px 20px; color:var(--slate); }
    .no-metin span { font-size:60px; display:block; margin-bottom:14px; }

    @media(max-width:580px) {
      .metin-grid { grid-template-columns: 1fr; }
      .mc-title { white-space: normal; }
    }

    /* ── ADIM 3: Giriş ── */
    .giris-card { background:white; border:2px solid var(--border); border-radius:var(--r-xl); padding:36px; max-width:560px; margin:0 auto; }
    .giris-metin-info { background:#F0EBFF; border-radius:var(--r-md); padding:16px 20px; margin-bottom:28px; display:flex; align-items:center; gap:12px; }
    .gmi-em { font-size:28px; }
    .gmi-title { font-family:var(--font-display); font-size:16px; font-weight:800; color:var(--purple); }
    .gmi-sub   { font-size:12px; color:var(--slate); }

    .giris-form-title { font-family:var(--font-display); font-size:22px; font-weight:800; color:var(--navy); margin-bottom:22px; }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .fg { margin-bottom:16px; }
    .fg label { display:block; font-size:13px; font-weight:800; color:var(--slate); margin-bottom:7px; }
    .fg input, .fg select {
      width:100%; padding:13px 16px; border:2px solid var(--border);
      border-radius:var(--r-sm); font-family:var(--font-body); font-size:15px;
      color:var(--navy); background:var(--cream); outline:none; transition:border-color .2s;
    }
    .fg input:focus, .fg select:focus { border-color:var(--purple); background:white; }

    .start-btn {
      width:100%; padding:16px; background:linear-gradient(135deg,var(--purple),var(--purple-light));
      color:white; border:none; border-radius:50px; font-family:var(--font-body);
      font-size:16px; font-weight:800; cursor:pointer; transition:all .25s;
      box-shadow:0 4px 15px rgba(108,61,237,.4);
    }
    .start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(108,61,237,.5); }

    .loading { text-align:center; padding:40px; color:var(--slate); font-weight:700; font-size:15px; }
    .loading span { font-size:40px; display:block; margin-bottom:12px; animation:floatB 1.5s ease-in-out infinite; }

    @media(max-width:640px) {
      .sinif-grid { grid-template-columns:repeat(4,1fr); gap:10px; }
      .steps-wrap { padding:28px 16px; }
      .form-row-2 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <div class="ho-hero">
    <span class="ho-hero-em">📖</span>
    <h1>Hızlı Okuma Merkezi</h1>
    <p>Sınıfını seç → Metni bul → Okumaya başla!</p>
  </div>

  <div class="steps-wrap">

    <!-- Adım Göstergesi -->
    <div class="step-indicator">
      <div class="si-item">
        <div class="si-dot active" id="dot1">1</div>
      </div>
      <div class="si-line" id="line1"></div>
      <div class="si-item">
        <div class="si-dot" id="dot2">2</div>
      </div>
      <div class="si-line" id="line2"></div>
      <div class="si-item">
        <div class="si-dot" id="dot3">3</div>
      </div>
    </div>

    <!-- ADIM 1: Sınıf Seç -->
    <div id="step1">
      <div class="step-title">🎒 Hangi sınıftasın?</div>
      <div class="sinif-grid">
        <button class="sinif-btn" data-s="1" onclick="sinifSec(1,this)">
          <span class="sinif-btn-num">1</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="2" onclick="sinifSec(2,this)">
          <span class="sinif-btn-num">2</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="3" onclick="sinifSec(3,this)">
          <span class="sinif-btn-num">3</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="4" onclick="sinifSec(4,this)">
          <span class="sinif-btn-num">4</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="5" onclick="sinifSec(5,this)">
          <span class="sinif-btn-num">5</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="6" onclick="sinifSec(6,this)">
          <span class="sinif-btn-num">6</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="7" onclick="sinifSec(7,this)">
          <span class="sinif-btn-num">7</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="8" onclick="sinifSec(8,this)">
          <span class="sinif-btn-num">8</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
      </div>
    </div>

    <!-- ADIM 2: Metin Seç -->
    <div id="step2" style="display:none;">
      <div class="metin-header">
        <button class="back-btn" onclick="geriyeDon(1)">← Geri</button>
        <div class="metin-title" id="step2Title">📚 Metinler</div>
      </div>
      <div id="metinListesi" class="metin-list">
        <div class="loading"><span>⏳</span>Metinler yükleniyor…</div>
      </div>
    </div>

    <!-- ADIM 3: Bilgi Girişi -->
    <div id="step3" style="display:none;">
      <div class="metin-header">
        <button class="back-btn" onclick="geriyeDon(2)">← Geri</button>
        <div class="metin-title">📝 Bilgilerini Gir</div>
      </div>

      <div class="giris-card">
        <div class="giris-metin-info" id="seciliMetinInfo">
          <span class="gmi-em">📖</span>
          <div>
            <div class="gmi-title" id="seciliMetinAdi">Metin Seçildi</div>
            <div class="gmi-sub" id="seciliMetinMeta">—</div>
          </div>
        </div>

        <div class="giris-form-title">👤 Okuyucu Bilgileri</div>

        <div class="form-row-2">
          <div class="fg">
            <label>Ad *</label>
            <input type="text" id="kullanici_ad" placeholder="Adınız" autocomplete="off" maxlength="30">
          </div>
          <div class="fg">
            <label>Soyad *</label>
            <input type="text" id="kullanici_soyad" placeholder="Soyadınız" autocomplete="off" maxlength="30">
          </div>
        </div>

        <div class="form-row-2">
          <div class="fg">
            <label>Sınıf *</label>
            <select id="kullanici_sinif">
              <option value="">Seç…</option>
              <option value="1">1. Sınıf</option>
              <option value="2">2. Sınıf</option>
              <option value="3">3. Sınıf</option>
              <option value="4">4. Sınıf</option>
              <option value="5">5. Sınıf</option>
              <option value="6">6. Sınıf</option>
              <option value="7">7. Sınıf</option>
              <option value="8">8. Sınıf</option>
            </select>
          </div>
          <div class="fg">
            <label>Şube *</label>
            <select id="kullanici_sube">
              <option value="">Seç…</option>
              <option value="A">A Şubesi</option>
              <option value="B">B Şubesi</option>
              <option value="C">C Şubesi</option>
              <option value="D">D Şubesi</option>
              <option value="E">E Şubesi</option>
              <option value="F">F Şubesi</option>
              <option value="G">G Şubesi</option>
              <option value="H">H Şubesi</option>
            </select>
          </div>
        </div>

        <div class="form-row-2">
          <div class="fg">
            <label>İl *</label>
            <select id="kullanici_il"></select>
          </div>
          <div class="fg">
            <label>Okul *</label>
            <input type="text" id="kullanici_okul" placeholder="Okul adını yazın" autocomplete="organization" maxlength="90">
          </div>
        </div>

        <button class="start-btn" onclick="okumaBaslat()">🚀 Okumaya Başla!</button>
      </div>
    </div>

  </div>

  <script src="/js/site-data.js"></script>
  <script src="/js/site.js"></script>
  <script src="/js/content-progress.js"></script>
  <script>
    const sbConfig = window.kemalSiteStore.getReadingConfig
      ? window.kemalSiteStore.getReadingConfig()
      : window.kemalSiteStore.getConfig();
    const sb = supabase.createClient(sbConfig.supabaseUrl, sbConfig.supabaseAnonKey);
    const METIN_CACHE_KEY = 'kemal_okuma_metin_cache_v1';
    const METIN_DETAIL_CACHE_PREFIX = 'kemal_okuma_metin_detay_';
    const urlParams = new URLSearchParams(window.location.search);
    const sharedMetinId = urlParams.get('metinId') || urlParams.get('textId') || urlParams.get('metin') || '';
    const TR_CITIES = window.kemalSiteStore && window.kemalSiteStore.getTurkeyCities
      ? window.kemalSiteStore.getTurkeyCities()
      : [];
    const LOW_QUALITY_TOKENS = ['asd','asdf','qwe','qwer','zxc','zxcv','abc','xxx','test','deneme','yok','none','null'];

    let seciliSinif = null;
    let seciliMetin = null;

    function collapseSpaces(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function parseOptionalJson(value) {
      if (!value) {
        return {};
      }
      if (typeof value === 'object') {
        return value;
      }
      try {
        return JSON.parse(value);
      } catch (error) {
        return {};
      }
    }

    function capitalizeWords(value) {
      return collapseSpaces(value).split(' ').map(function(word) {
        return word ? word.charAt(0).toUpperCase() + word.slice(1).toLowerCase() : '';
      }).join(' ');
    }

    function populateCitySelect() {
      const select = document.getElementById('kullanici_il');
      if (!select) {
        return;
      }
      select.innerHTML = '<option value="">Seç…</option>' + TR_CITIES.map(function(city) {
        return '<option value="' + escHtml(city) + '">' + escHtml(city) + '</option>';
      }).join('');
    }

    function hasLowQualityText(value) {
      const normalized = collapseSpaces(value).toLocaleLowerCase('tr-TR');
      if (!normalized) {
        return true;
      }
      const lettersOnly = normalized.replace(/[^a-zçğıöşü]/g, '');
      if (lettersOnly.length < 2) {
        return true;
      }
      if (/^(.)\1{2,}$/.test(lettersOnly) || /(.)\1{3,}/.test(lettersOnly)) {
        return true;
      }
      if (LOW_QUALITY_TOKENS.includes(normalized) || LOW_QUALITY_TOKENS.includes(lettersOnly)) {
        return true;
      }
      const words = normalized.split(' ').filter(Boolean);
      if (words.length > 1 && new Set(words).size === 1) {
        return true;
      }
      return false;
    }

    function validateSurname(value) {
      const normalized = collapseSpaces(value);
      if (!/^[A-Za-zÇĞİÖŞÜçğıöşü\s'-]+$/.test(normalized)) {
        return false;
      }
      return !hasLowQualityText(normalized);
    }

    function validateSchool(value) {
      return !hasLowQualityText(value);
    }

    function normalizeGradeList(metin) {
      const raw = Array.isArray(metin.siniflar) && metin.siniflar.length
        ? metin.siniflar
        : (metin.sinif !== undefined && metin.sinif !== null ? [metin.sinif] : []);
      return raw
        .map(v => parseInt(v, 10))
        .filter(v => Number.isFinite(v));
    }

    function saveMetinCache(list) {
      try {
        localStorage.setItem(METIN_CACHE_KEY, JSON.stringify(list || []));
      } catch (error) {}
    }

    function getMetinCache() {
      try {
        const raw = localStorage.getItem(METIN_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (error) {
        return [];
      }
    }

    function saveMetinDetailCache(metin) {
      if (!metin || !metin.id) return;
      try {
        localStorage.setItem(METIN_DETAIL_CACHE_PREFIX + metin.id, JSON.stringify(metin));
      } catch (error) {}
    }

    function getMetinDetailCache(metinId) {
      try {
        const raw = localStorage.getItem(METIN_DETAIL_CACHE_PREFIX + metinId);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function getCachedMetinById(metinId) {
      const listed = getMetinCache().find(item => item.id === metinId);
      return listed || getMetinDetailCache(metinId);
    }

    function setSinifButtonState(sinif) {
      document.querySelectorAll('.sinif-btn').forEach(button => {
        button.classList.toggle('active', parseInt(button.dataset.s, 10) === parseInt(sinif, 10));
      });
    }

    /* ── Adım 1 → 2: Sınıf Seç ── */
    async function sinifSec(sinif) {
      setSinifButtonState(sinif);
      seciliSinif = sinif;

      // Step geçişi
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      document.getElementById('step2Title').textContent = `📚 ${sinif}. Sınıf Metinleri`;

      // Step gösterge
      setStep(2);

      // Sınıf seçiliyse giriş formunda da ayarla
      document.getElementById('kullanici_sinif').value = sinif;

      // Metinleri çek
      await loadMetinler(sinif);
    }

    let tumMetinler = [];
    let aktifSayfa  = 1;
    const SAYFA_BOYUT = 12;

    async function loadMetinler(sinif) {
      const list = document.getElementById('metinListesi');
      list.innerHTML = '<div class="loading"><span>⏳</span>Metinler yükleniyor…</div>';
      aktifSayfa = 1;

      // sinif sütunu VEYA siniflar dizisi içinde eşleşen metinleri çek
      const { data, error } = await sb
        .from('metinler')
        .select('id,baslik,sinif,siniflar,goruntuleme_modu,hedef_hiz,kelime_sayisi,aktif,olusturma_tarihi')
        .eq('aktif', true)
        .order('olusturma_tarihi', { ascending: false });

      if (error) {
        const cached = getMetinCache();
        tumMetinler = cached.filter(m => normalizeGradeList(m).includes(parseInt(sinif, 10)));
        if (tumMetinler.length) {
          renderMetinSayfasi(list);
          list.insertAdjacentHTML('afterbegin', '<div style="margin-bottom:14px;padding:12px 14px;border:1.5px solid #FCD34D;background:#FFF7ED;border-radius:14px;color:#9A3412;font-size:13px;font-weight:700;">⚠️ Canlı veritabanına ulaşılamadı. Son kaydedilmiş metin listesi gösteriliyor.</div>');
          return;
        }
        list.innerHTML = `<div class="no-metin"><span>⚠️</span><p>Metinler şu an yüklenemedi. Lütfen biraz sonra tekrar deneyin.</p></div>`;
        return;
      }

      saveMetinCache(data || []);

      // İstemci tarafında filtrele: sinif sütunu veya siniflar dizisi eşleşsin
      tumMetinler = (data || []).filter(m => {
        return normalizeGradeList(m).includes(parseInt(sinif, 10));
      });

      renderMetinSayfasi(list);
    }

    function renderMetinSayfasi(list) {
      if (!tumMetinler.length) {
        list.innerHTML = `
          <div class="no-metin">
            <span>📭</span>
            <p>Bu sınıf için henüz metin eklenmemiş.</p>
          </div>`;
        return;
      }

      const topSayfa  = Math.ceil(tumMetinler.length / SAYFA_BOYUT);
      const baslangic = (aktifSayfa - 1) * SAYFA_BOYUT;
      const sayfa     = tumMetinler.slice(baslangic, baslangic + SAYFA_BOYUT);
      const yeniMetinIdSet = new Set(
        tumMetinler
          .slice()
          .sort(function(a, b) {
            return getTimeValue(b.olusturma_tarihi) - getTimeValue(a.olusturma_tarihi);
          })
          .slice(0, 3)
          .map(function(item) {
            return String(item.id);
          })
      );

      const EMOJILER = ['📖','📚','✏️','🌟','📝','🔖','📓','🗒️','📃','🌈'];

      const kartHTML = sayfa.map((m, i) => {
        const mod    = m.goruntuleme_modu === 'kelime' ? '⚡ Kelime Kelime' : '📄 Tam Metin';
        const modCls = m.goruntuleme_modu === 'kelime' ? 'badge-kw' : 'badge-tam';
        const hiz    = m.hedef_hiz    ? `${m.hedef_hiz} k/dk` : '';
        const kw     = m.kelime_sayisi ? `${m.kelime_sayisi} kelime` : '';
        const em     = EMOJILER[(baslangic + i) % EMOJILER.length];
        const statusMeta = getReadingStatusMeta(m);
        const isNew = yeniMetinIdSet.has(String(m.id));
        return `
          <div class="metin-card ${statusMeta ? 'is-complete' : ''}" onclick="metinSec('${m.id}')">
            <div class="mc-left">
              <div class="mc-no">${baslangic + i + 1}</div>
              <span class="mc-em">${em}</span>
            </div>
            <div class="mc-body">
              <div class="mc-title-row">
                <div class="mc-title">${escHtml(m.baslik)}</div>
                ${isNew ? '<span class="mc-title-badge">YENİ</span>' : ''}
              </div>
              <div class="mc-meta">
                <span class="mc-badge ${modCls}">${mod}</span>
                ${isNew ? '<span class="mc-badge badge-new">Yeni Metin</span>' : ''}
                ${kw ? `<span class="mc-chip">📊 ${kw}</span>` : ''}
                ${hiz ? `<span class="mc-chip">🎯 ${hiz}</span>` : ''}
              </div>
              ${statusMeta ? `<div class="mc-status-row"><span class="mc-status-badge ${statusMeta.tone}">✅ ${statusMeta.label}</span></div>` : ''}
            </div>
            <span class="mc-arrow">→</span>
          </div>`;
      }).join('');

      // Sayfalama HTML
      let pgHTML = '';
      if (topSayfa > 1) {
        pgHTML = `<div class="metin-pagination">`;
        pgHTML += `<button class="mp-btn" onclick="sayfaDegis(${aktifSayfa-1})" ${aktifSayfa===1?'disabled':''}>← Önceki</button>`;
        for (let i = 1; i <= topSayfa; i++) {
          pgHTML += `<button class="mp-btn ${i===aktifSayfa?'active':''}" onclick="sayfaDegis(${i})">${i}</button>`;
        }
        pgHTML += `<button class="mp-btn" onclick="sayfaDegis(${aktifSayfa+1})" ${aktifSayfa===topSayfa?'disabled':''}>Sonraki →</button>`;
        pgHTML += `<span class="mp-info">${tumMetinler.length} metin · Sayfa ${aktifSayfa}/${topSayfa}</span>`;
        pgHTML += `</div>`;
      }

      list.innerHTML = `<div class="metin-grid">${kartHTML}</div>${pgHTML}`;
    }

    function sayfaDegis(s) {
      aktifSayfa = s;
      const list = document.getElementById('metinListesi');
      renderMetinSayfasi(list);
      list.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function getTimeValue(raw) {
      const value = Date.parse(String(raw || ''));
      return Number.isNaN(value) ? 0 : value;
    }

    function getReadingStatusMeta(metin) {
      if (!window.kemalContentProgress || !metin || !metin.id) {
        return null;
      }
      return window.kemalContentProgress.getStatusMeta({
        type: 'reading',
        id: metin.id,
      });
    }

    /* ── Adım 2 → 3: Metin Seç ── */
    async function metinSec(metinId) {
      // Tam metni ve soruları çek
      const { data: metin, error } = await sb
        .from('metinler')
        .select('*')
        .eq('id', metinId)
        .single();

      let selectedMetin = metin;
      if (error || !selectedMetin) {
        selectedMetin = getMetinDetailCache(metinId);
      }
      if (!selectedMetin) { alert('Metin yüklenemedi, lütfen tekrar deneyin.'); return; }

      let soruResponse = await sb
        .from('sorular')
        .select('id, metin_id, soru_metni, sira, soru_tipi, ayar_json')
        .eq('metin_id', metinId)
        .order('sira');

      if (soruResponse.error) {
        soruResponse = await sb
          .from('sorular_public')
          .select('id, metin_id, soru_metni, sira, soru_tipi, ayar_json')
          .eq('metin_id', metinId)
          .order('sira');
        if (soruResponse.error && /(soru_tipi|ayar_json)/i.test(soruResponse.error.message || '')) {
          soruResponse = await sb
            .from('sorular_public')
            .select('id, metin_id, soru_metni, sira')
            .eq('metin_id', metinId)
            .order('sira');
        }
      }

      const sorularRows = soruResponse.data;
      const sorularError = soruResponse.error;

      if (sorularError) {
        alert('Sorular yüklenemedi, lütfen tekrar deneyin.');
        return;
      }

      const soruIds = (sorularRows || []).map((soru) => soru.id);
      let secenekRows = [];

      if (soruIds.length) {
        let secenekResponse = await sb
          .from('secenekler')
          .select('id, soru_id, secenek_metni, sira, dogru_mu')
          .in('soru_id', soruIds)
          .order('sira');

        if (secenekResponse.error) {
          secenekResponse = await sb
            .from('secenekler_public')
            .select('id, soru_id, secenek_metni, sira, dogru_mu')
            .in('soru_id', soruIds)
            .order('sira');
          if (secenekResponse.error && /dogru_mu/i.test(secenekResponse.error.message || '')) {
            secenekResponse = await sb
              .from('secenekler_public')
              .select('id, soru_id, secenek_metni, sira')
              .in('soru_id', soruIds)
              .order('sira');
          }
        }

        const secenekData = secenekResponse.data;
        const secenekError = secenekResponse.error;

        if (secenekError) {
          alert('Seçenekler yüklenemedi, lütfen tekrar deneyin.');
          return;
        }

        secenekRows = secenekData || [];
      }

      const secenekMap = {};
      secenekRows.forEach(function(secenek) {
        if (!secenekMap[secenek.soru_id]) {
          secenekMap[secenek.soru_id] = [];
        }
        secenekMap[secenek.soru_id].push(secenek);
      });

      const sorularData = (sorularRows || []).map(function(soru) {
        return {
          ...soru,
          soru_tipi: soru.soru_tipi || '',
          ayar_json: parseOptionalJson(soru.ayar_json),
          secenekler: (secenekMap[soru.id] || []).sort(function(a, b) {
            return a.sira - b.sira;
          }),
        };
      });

      selectedMetin.sorular = sorularData;

      seciliMetin = selectedMetin;
      document.getElementById('kullanici_sinif').value = seciliSinif || normalizeGradeList(selectedMetin)[0] || '';
      saveMetinDetailCache(selectedMetin);
      sessionStorage.setItem('okuma_metin', JSON.stringify(selectedMetin));

      // Bilgilendirme paneli
      const mod = selectedMetin.goruntuleme_modu === 'kelime' ? '⚡ Kelime Kelime' : '📄 Tam Metin';
      document.getElementById('seciliMetinAdi').textContent = selectedMetin.baslik;
      document.getElementById('seciliMetinMeta').textContent =
        `${mod} · ${selectedMetin.kelime_sayisi || '?'} kelime · ${selectedMetin.sorular.length} anlama sorusu`;

      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'block';
      setStep(3);
    }

    /* ── Okumayı Başlat ── */
    function okumaBaslat() {
      const ad    = document.getElementById('kullanici_ad').value.trim();
      const soyad = document.getElementById('kullanici_soyad').value.trim();
      const sinif = document.getElementById('kullanici_sinif').value;
      const sube  = document.getElementById('kullanici_sube').value;
      const il    = document.getElementById('kullanici_il').value.trim();
      const okul  = document.getElementById('kullanici_okul').value.trim();

      if (!ad || !soyad || !sinif || !sube || !il || !okul) {
        alert('Lütfen tüm alanları doldurun!');
        return;
      }
      if (!validateSurname(soyad)) {
        alert('Soyad alanında anlamsız, tekrar eden veya geçersiz bir giriş görünüyor.');
        return;
      }
      if (!validateSchool(okul)) {
        alert('Okul adı anlamsız veya tekrar eden bir giriş gibi görünüyor. Lütfen okul adını daha net yazın.');
        return;
      }

      sessionStorage.setItem('okuma_kullanici', JSON.stringify({
        ad: capitalizeWords(ad),
        soyad: capitalizeWords(soyad),
        sinif: parseInt(sinif),
        sube,
        il: capitalizeWords(il),
        okul: collapseSpaces(okul)
      }));
      window.location.href = '/hizli-okuma/oku.html';
    }

    /* ── Geri ── */
    function geriyeDon(adim) {
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'none';
      document.getElementById('step' + adim).style.display = 'block';
      setStep(adim);
    }

    /* ── Step Gösterge ── */
    function setStep(n) {
      [1,2,3].forEach(i => {
        const dot  = document.getElementById('dot'+i);
        dot.className = 'si-dot' + (i < n ? ' done' : i === n ? ' active' : '');
      });
      [1,2].forEach(i => {
        const line = document.getElementById('line'+i);
        line.className = 'si-line' + (i < n ? ' done' : '');
      });
    }

    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function resolveSharedMetin(metinId) {
      const { data, error } = await sb
        .from('metinler')
        .select('id, baslik, sinif, siniflar, aktif')
        .eq('id', metinId)
        .maybeSingle();

      if (!error && data) {
        return data;
      }

      return getCachedMetinById(metinId);
    }

    populateCitySelect();

    async function handleSharedMetinLink() {
      if (!sharedMetinId) {
        return;
      }

      const sharedMetin = await resolveSharedMetin(sharedMetinId);
      if (!sharedMetin || sharedMetin.aktif === false) {
        alert('Paylaşılan okuma bağlantısı artık aktif değil veya bulunamadı.');
        return;
      }

      const grades = normalizeGradeList(sharedMetin);
      const targetGrade = grades[0];
      if (!targetGrade) {
        alert('Bu metin için sınıf bilgisi bulunamadı.');
        return;
      }

      await sinifSec(targetGrade);
      await metinSec(sharedMetin.id);
    }

    handleSharedMetinLink();
  </script>
</body>
</html>
