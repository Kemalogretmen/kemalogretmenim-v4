<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta name="twitter:title" content="Hızlı Okuma — Kemal Öğretmenim">
  <meta name="twitter:description" content="Sınıfa özel metinlerle hızlı okuma, anlama ve sonuç takibi için hazırlanan merkez.">
  <link rel="stylesheet" href="/css/style.css?v=20260418-2">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .ho-hero {
      background: linear-gradient(135deg,#24135F 0%,#6C3DED 54%,#4CC9F0 100%);
      padding:34px 24px 30px; text-align:center; position:relative; overflow:hidden;
    }
    .ho-hero::before { content:''; position:absolute; width:280px; height:280px; background:rgba(255,255,255,.07); border-radius:50%; top:-110px; left:-70px; }
    .ho-hero::after { content:''; position:absolute; width:340px; height:340px; background:rgba(255,255,255,.08); border-radius:50%; right:-150px; bottom:-220px; }
    .ho-hero-em { font-size:42px; display:block; margin-bottom:8px; animation:floatB 3s ease-in-out infinite; position:relative; z-index:1; }
    .ho-hero h1 { font-size:clamp(24px,3.8vw,36px); font-weight:800; color:white; margin-bottom:6px; position:relative; z-index:1; }
    .ho-hero p  { color:rgba(255,255,255,.80); font-size:14px; font-weight:700; position:relative; z-index:1; }
    .ho-hero-actions { display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:16px; position:relative; z-index:1; }
    .ho-hero-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:42px; padding:10px 16px; border-radius:999px; border:1.5px solid rgba(255,255,255,.35); color:#fff; text-decoration:none; font-weight:900; font-size:13px; background:rgba(255,255,255,.14); transition:all .2s; backdrop-filter:blur(8px); }
    .ho-hero-btn.primary { background:#fff; color:#4A1FD0; border-color:#fff; box-shadow:0 10px 22px rgba(15,23,42,.16); }
    .ho-hero-btn:hover { transform:translateY(-2px); background:rgba(255,255,255,.22); }
    .ho-hero-btn.primary:hover { background:#fff; }

    /* Steps */
    .steps-wrap { max-width:1060px; margin:0 auto; padding:28px 28px; }

    /* Step indicator */
    .step-indicator { display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:24px; }
    .si-item { display:flex; align-items:center; gap:0; }
    .si-dot { width:36px; height:36px; border-radius:50%; background:var(--border); color:var(--muted); font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .3s; }
    .si-dot.active { background:var(--purple); color:white; box-shadow:0 4px 12px rgba(108,61,237,.4); }
    .si-dot.done   { background:var(--teal);   color:white; }
    .si-line { width:60px; height:3px; background:var(--border); transition:background .3s; }
    .si-line.done { background:var(--teal); }

    /* ── ADIM 1: Sınıf Seç ── */
    #step1 .step-title { font-family:var(--font-display); font-size:24px; font-weight:800; color:var(--navy); text-align:center; margin-bottom:18px; }
    .sinif-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:660px; margin:0 auto; }
    .sinif-btn {
      min-height:148px; border:0; border-radius:28px;
      background:var(--sinif-bg,#6C3DED); cursor:pointer; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:6px;
      transition:transform .32s cubic-bezier(.34,1.56,.64,1), box-shadow .32s ease, filter .32s ease;
      font-family:var(--font-body);
      color:white; box-shadow:0 18px 34px var(--sinif-shadow,rgba(108,61,237,.18));
      position:relative; overflow:hidden;
      filter:brightness(1) saturate(1);
      isolation:isolate;
    }
    .sinif-btn::before {
      content:''; position:absolute; inset:10px;
      border-radius:22px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.34);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.42), 0 16px 28px rgba(15,23,42,.10);
      backdrop-filter:blur(12px) saturate(1.35);
      -webkit-backdrop-filter:blur(12px) saturate(1.35);
      opacity:.74;
      transition:background .28s ease, opacity .28s ease, transform .28s ease;
      z-index:0;
    }
    /* cam iç parıltı katmanı */
    .sinif-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(165deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.06) 38%,transparent 60%);
      pointer-events:none; border-radius:28px;
      transition:opacity .32s ease;
    }
    .sinif-btn:hover {
      transform:translateY(-9px) scale(1.05);
      box-shadow:0 32px 54px var(--sinif-shadow,rgba(108,61,237,.34));
      filter:brightness(1.08) saturate(1.12);
    }
    .sinif-btn.active {
      box-shadow:0 22px 38px var(--sinif-shadow,rgba(108,61,237,.28));
      filter:brightness(1.04) saturate(1.08);
    }
    .sinif-btn:hover::before, .sinif-btn.active::before {
      background:rgba(255,255,255,.25);
      opacity:.95;
      transform:scale(1.015);
    }
    .sinif-btn:hover::after { opacity:1.4; }
    .sinif-btn-num { font-family:var(--font-display); font-size:54px; font-weight:900; color:#fff; line-height:1; position:relative; z-index:1; }
    /* cam etiket — alt kısım */
    .sinif-btn-lbl {
      position:relative; z-index:1;
      display:inline-flex; align-items:center; justify-content:center;
      padding:5px 16px; border-radius:999px;
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(10px) saturate(1.5);
      -webkit-backdrop-filter:blur(10px) saturate(1.5);
      border:1.5px solid rgba(255,255,255,.36);
      font-size:13px; font-weight:900; color:rgba(255,255,255,.96);
      text-transform:uppercase; letter-spacing:.09em;
      box-shadow:0 2px 12px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.35);
      transition:background .28s ease, box-shadow .28s ease;
    }
    .sinif-btn:hover .sinif-btn-lbl {
      background:rgba(255,255,255,.28);
      box-shadow:0 4px 18px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.5);
    }
    .sinif-btn[data-s="1"] { --sinif-bg:linear-gradient(135deg,#FF7A76,#FF8E6A); --sinif-shadow:rgba(255,122,118,.26); }
    .sinif-btn[data-s="2"] { --sinif-bg:linear-gradient(135deg,#FF9853,#FFB347); --sinif-shadow:rgba(255,152,83,.26); }
    .sinif-btn[data-s="3"] { --sinif-bg:linear-gradient(135deg,#FFB84D,#FFD84D); --sinif-shadow:rgba(255,184,77,.24); }
    .sinif-btn[data-s="4"] { --sinif-bg:linear-gradient(135deg,#5BBE67,#79C979); --sinif-shadow:rgba(91,190,103,.24); }
    .sinif-btn[data-s="5"] { --sinif-bg:linear-gradient(135deg,#34BDB6,#48CBD4); --sinif-shadow:rgba(52,189,182,.24); }
    .sinif-btn[data-s="6"] { --sinif-bg:linear-gradient(135deg,#41AEEB,#5AB9F0); --sinif-shadow:rgba(65,174,235,.24); }
    .sinif-btn[data-s="7"] { --sinif-bg:linear-gradient(135deg,#766DCA,#8C6ED0); --sinif-shadow:rgba(118,109,202,.24); }
    .sinif-btn[data-s="8"] { --sinif-bg:linear-gradient(135deg,#C252B7,#E34B8C); --sinif-shadow:rgba(194,82,183,.22); }

    /* ── ADIM 2: Metin Seç ── */
    #step2 {
      border-radius:24px;
      padding:18px;
      background:
        linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.46)),
        linear-gradient(135deg,#FFF7ED 0%,#ECFEFF 44%,#F5F3FF 100%);
      border:1px solid rgba(255,255,255,.70);
      box-shadow:0 18px 42px rgba(15,23,42,.07);
    }
    .metin-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .back-btn { background:none; border:2px solid var(--border); border-radius:var(--r-sm); padding:8px 14px; font-weight:700; font-size:14px; cursor:pointer; color:var(--slate); transition:all .2s; }
    .back-btn:hover { border-color:var(--purple); color:var(--purple); }
    .metin-title { font-family:var(--font-display); font-size:22px; font-weight:800; color:var(--navy); }

    .metin-filter-panel {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      background:rgba(255,255,255,.56);
      border:1.5px solid rgba(255,255,255,.72);
      border-radius:18px;
      padding:12px;
      margin-bottom:16px;
      box-shadow:0 14px 30px rgba(15,23,42,.07), inset 0 1px 0 rgba(255,255,255,.70);
      backdrop-filter:blur(16px) saturate(1.25);
      -webkit-backdrop-filter:blur(16px) saturate(1.25);
    }
    .metin-filter-panel label {
      display:block;
      font-size:11px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:6px;
    }
    .metin-filter-panel select {
      width:100%;
      padding:11px 12px;
      border:2px solid var(--border);
      border-radius:12px;
      background:#FAFAFF;
      color:var(--navy);
      font-family:var(--font-body);
      font-weight:800;
      outline:none;
    }
    .metin-filter-panel select:focus { border-color:var(--purple); background:#fff; }

    /* Metin listesi */
    .metin-grid {
      display: grid;
      grid-template-columns: repeat(3,minmax(0,1fr));
      gap: 14px;
    }
    .metin-card {
      background:
        linear-gradient(145deg,rgba(255,255,255,.78),rgba(255,255,255,.48)),
        var(--metin-bg,#F8FAFC);
      border: 1.5px solid var(--metin-border,rgba(226,232,240,.9));
      border-radius: 20px;
      padding: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      min-height: 136px;
      box-shadow:0 16px 34px var(--metin-shadow,rgba(15,23,42,.08)), inset 0 1px 0 rgba(255,255,255,.70);
      backdrop-filter:blur(14px) saturate(1.2);
      -webkit-backdrop-filter:blur(14px) saturate(1.2);
      position:relative;
      overflow:hidden;
    }
    .metin-card::before {
      content:'';
      position:absolute;
      inset:0 0 auto;
      height:6px;
      background:var(--metin-accent,#6C3DED);
    }
    .metin-card:hover {
      border-color: var(--metin-accent,#6C3DED);
      transform: translateY(-5px) scale(1.015);
      box-shadow: 0 22px 42px var(--metin-shadow,rgba(15,23,42,.12)), inset 0 1px 0 rgba(255,255,255,.82);
      background:
        linear-gradient(145deg,rgba(255,255,255,.86),rgba(255,255,255,.58)),
        var(--metin-bg,#F8FAFC);
    }
    .mc-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .mc-no {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      background: rgba(255,255,255,.72);
      border:1px solid var(--metin-border,#E2E8F0);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mc-em { font-size: 28px; }
    .mc-body {
      flex: 1; min-width: 0;
      padding:12px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.62);
      border:1px solid rgba(255,255,255,.72);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.82), 0 10px 20px rgba(15,23,42,.055);
      backdrop-filter:blur(14px) saturate(1.22);
      -webkit-backdrop-filter:blur(14px) saturate(1.22);
    }
    .mc-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .mc-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: var(--navy);
      white-space: normal;
      overflow: hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      flex: 1;
      line-height:1.25;
    }
    .mc-meta   { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .mc-badge  { padding: 3px 8px; border-radius: 20px; font-weight: 800; font-size: 10px; border:1px solid rgba(255,255,255,.70); box-shadow:inset 0 1px 0 rgba(255,255,255,.72); }
    .badge-tam { background: rgba(239,247,255,.76); color: #185FA5; }
    .badge-kw  { background: rgba(245,234,255,.76); color: #7D3C98; }
    .badge-new {
      background: linear-gradient(135deg, rgba(255,247,237,.80), rgba(255,237,213,.78));
      color: #C2410C;
      letter-spacing: .04em;
    }
    .mc-chip   { font-size: 10px; font-weight: 800; color: #64748B; padding:3px 6px; border-radius:999px; background:rgba(255,255,255,.48); border:1px solid rgba(255,255,255,.58); }
    .mc-title-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,247,237,.84), rgba(255,237,213,.82));
      color: #C2410C;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .08em;
      flex-shrink: 0;
    }
    .mc-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .mc-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid transparent;
    }
    .mc-status-badge.completed {
      background: #ECFDF5;
      color: #047857;
      border-color: #A7F3D0;
    }
    .metin-card.is-complete {
      border-color: #86EFAC;
      box-shadow: 0 10px 22px rgba(16, 185, 129, .10);
    }
    .mc-arrow  { font-size: 18px; color: var(--metin-accent,var(--purple)); transition: transform .2s; flex-shrink: 0; }
    .metin-card:hover .mc-arrow { transform: translateX(4px); }

    /* Sayfalama */
    .metin-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .mp-btn {
      padding: 8px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      color: var(--slate);
    }
    .mp-btn:hover:not(:disabled) { border-color: var(--purple); color: var(--purple); }
    .mp-btn.active { background: var(--purple); color: white; border-color: var(--purple); }
    .mp-btn:disabled { opacity: .35; cursor: not-allowed; }
    .mp-info { font-size: 12px; color: var(--muted); font-weight: 700; padding: 0 4px; }

    .no-metin { text-align:center; padding:60px 20px; color:var(--slate); }
    .no-metin span { font-size:60px; display:block; margin-bottom:14px; }

    @media(max-width:900px) {
      .metin-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
    }

    @media(max-width:580px) {
      #step2 { padding:16px; border-radius:22px; }
      .metin-grid { grid-template-columns: 1fr; }
      .metin-filter-panel { grid-template-columns: 1fr; gap:10px; padding:12px; }
      .metin-filter-panel select { padding:10px 12px; font-size:13px; }
      .ho-hero { padding:28px 18px 24px; }
      .ho-hero-em { font-size:34px; margin-bottom:6px; }
      .ho-hero h1 { font-size:28px; }
      .ho-hero-actions { margin-top:14px; }
      .ho-hero-btn { min-height:40px; padding:9px 14px; }
      .mc-title-row { flex-direction:column; gap:4px; }
      .mc-title-badge { align-self:flex-start; }
    }

    /* ── ADIM 3: Giriş ── */
    .giris-card { background:white; border:2px solid var(--border); border-radius:var(--r-xl); padding:28px; max-width:540px; margin:0 auto; }
    .giris-metin-info { background:#F0EBFF; border-radius:var(--r-md); padding:14px 18px; margin-bottom:22px; display:flex; align-items:center; gap:12px; }
    .gmi-em { font-size:28px; }
    .gmi-title { font-family:var(--font-display); font-size:16px; font-weight:800; color:var(--purple); }
    .gmi-sub   { font-size:12px; color:var(--slate); }

    .giris-form-title { font-family:var(--font-display); font-size:20px; font-weight:800; color:var(--navy); margin-bottom:18px; }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .fg { margin-bottom:16px; }
    .fg label { display:block; font-size:13px; font-weight:800; color:var(--slate); margin-bottom:7px; }
    .fg input, .fg select {
      width:100%; padding:11px 14px; border:2px solid var(--border);
      border-radius:var(--r-sm); font-family:var(--font-body); font-size:15px;
      color:var(--navy); background:var(--cream); outline:none; transition:border-color .2s;
    }
    .fg input:focus, .fg select:focus { border-color:var(--purple); background:white; }

    .start-btn {
      width:100%; padding:14px; background:linear-gradient(135deg,var(--purple),var(--purple-light));
      color:white; border:none; border-radius:50px; font-family:var(--font-body);
      font-size:16px; font-weight:800; cursor:pointer; transition:all .25s;
      box-shadow:0 4px 15px rgba(108,61,237,.4);
    }
    .start-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(108,61,237,.5); }

    .loading { text-align:center; padding:40px; color:var(--slate); font-weight:700; font-size:15px; }
    .loading span { font-size:40px; display:block; margin-bottom:12px; animation:floatB 1.5s ease-in-out infinite; }

    @media(max-width:640px) {
      .sinif-grid { grid-template-columns:repeat(2,1fr); gap:12px; }
      .sinif-btn { min-height:132px; border-radius:24px; }
      .sinif-btn-num { font-size:44px; }
      .steps-wrap { padding:24px 16px; }
      .giris-card { padding:22px; }
      .form-row-2 { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

  <div class="ho-hero">
    <span class="ho-hero-em">📖</span>
    <h1>Hızlı Okuma Merkezi</h1>
    <p>Sınıfını seç → Metni bul → Okumaya başla!</p>
    <div class="ho-hero-actions">
      <a class="ho-hero-btn primary" href="#step1">Sınıfını Seç</a>
      <a class="ho-hero-btn" href="/hizli-okuma/karne.html" data-auth-entry="reading-report" data-auth-mode="optional">Okuma Karnem</a>
    </div>
  </div>

  <div class="steps-wrap">

    <!-- Adım Göstergesi -->
    <div class="step-indicator">
      <div class="si-item">
        <div class="si-dot active" id="dot1">1</div>
      </div>
      <div class="si-line" id="line1"></div>
      <div class="si-item">
        <div class="si-dot" id="dot2">2</div>
      </div>
      <div class="si-line" id="line2"></div>
      <div class="si-item">
        <div class="si-dot" id="dot3">3</div>
      </div>
    </div>

    <!-- ADIM 1: Sınıf Seç -->
    <div id="step1">
      <div class="step-title">🎒 Hangi sınıftasın?</div>
      <div class="sinif-grid">
        <button class="sinif-btn" data-s="1" onclick="sinifSec(1,this)">
          <span class="sinif-btn-num">1</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="2" onclick="sinifSec(2,this)">
          <span class="sinif-btn-num">2</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="3" onclick="sinifSec(3,this)">
          <span class="sinif-btn-num">3</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="4" onclick="sinifSec(4,this)">
          <span class="sinif-btn-num">4</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="5" onclick="sinifSec(5,this)">
          <span class="sinif-btn-num">5</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="6" onclick="sinifSec(6,this)">
          <span class="sinif-btn-num">6</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="7" onclick="sinifSec(7,this)">
          <span class="sinif-btn-num">7</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
        <button class="sinif-btn" data-s="8" onclick="sinifSec(8,this)">
          <span class="sinif-btn-num">8</span>
          <span class="sinif-btn-lbl">Sınıf</span>
        </button>
      </div>
    </div>

    <!-- ADIM 2: Metin Seç -->
    <div id="step2" style="display:none;">
      <div class="metin-header">
        <button class="back-btn" onclick="geriyeDon(1)">← Geri</button>
        <div class="metin-title" id="step2Title">📚 Metinler</div>
      </div>
      <div class="metin-filter-panel" id="metinFilterPanel"></div>
      <div id="metinListesi" class="metin-list">
        <div class="loading"><span>⏳</span>Metinler yükleniyor…</div>

    <!-- ADIM 3: Bilgi Girişi -->
    <div id="step3" style="display:none;">
      <div class="metin-header">
        <button class="back-btn" onclick="geriyeDon(2)">← Geri</button>
        <div class="metin-title">📝 Bilgilerini Gir</div>
      </div>

      <div class="giris-card">
        <div class="giris-metin-info" id="seciliMetinInfo">
          <span class="gmi-em">📖</span>
          <div>
            <div class="gmi-title" id="seciliMetinAdi">Metin Seçildi</div>
            <div class="gmi-sub" id="seciliMetinMeta">—</div>

              <option value="">Seç…</option>

              <option value="E">E Şubesi</option>

        <div class="form-row-2">
          <div class="fg">
            <label>İl *</label>
            <select id="kullanici_il"></select>
          </div>
          <div class="fg">
            <label>Okul *</label>
            <input type="text" id="kullanici_okul" placeholder="Okul adını yazın" autocomplete="organization" maxlength="90">
          </div>

        <button class="start-btn" onclick="okumaBaslat()">🚀 Okumaya Başla!</button>
      </div>
    </div>

  </div>

  <script src="/js/site-data.js?v=20260418-2"></script>
  <script src="/js/site.js?v=20260418-2"></script>
  <script src="/js/content-progress.js?v=20260418-2"></script>
  <script>
    const sbConfig = window.kemalSiteStore.getReadingConfig
      ? window.kemalSiteStore.getReadingConfig()
      : window.kemalSiteStore.getConfig();
    const sb = supabase.createClient(sbConfig.supabaseUrl, sbConfig.supabaseAnonKey);
    const METIN_CACHE_KEY = 'kemal_okuma_metin_cache_v1';
    const METIN_DETAIL_CACHE_PREFIX = 'kemal_okuma_metin_detay_';
    const urlParams = new URLSearchParams(window.location.search);
    const sharedMetinId = urlParams.get('metinId') || urlParams.get('textId') || urlParams.get('metin') || '';
    const TR_CITIES = window.kemalSiteStore && window.kemalSiteStore.getTurkeyCities
      ? window.kemalSiteStore.getTurkeyCities()
      : [];
    const LOW_QUALITY_TOKENS = ['asd','asdf','qwe','qwer','zxc','zxcv','abc','xxx','test','deneme','yok','none','null'];
    window.kemalReadingAuth = window.kemalReadingAuth || {
      enabled: false,
      entrySelector: '[data-auth-entry="reading-report"]',
      storageKey: 'kemal_okuma_kullanici',
      returnUrl: '/hizli-okuma/karne.html'
    };

    let seciliSinif = null;
    let seciliMetin = null;

    function collapseSpaces(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function parseOptionalJson(value) {
      if (!value) {
        return {};
      }
      if (typeof value === 'object') {
        return value;
      }
      try {
        return JSON.parse(value);
      } catch (error) {
        return {};
      }
    }

    function capitalizeWords(value) {
      return collapseSpaces(value).split(' ').map(function(word) {
        return word ? word.charAt(0).toUpperCase() + word.slice(1).toLowerCase() : '';
      }).join(' ');
    }

    function populateCitySelect() {
      const select = document.getElementById('kullanici_il');
      if (!select) {
        return;
      }
      select.innerHTML = '<option value="">Seç…</option>' + TR_CITIES.map(function(city) {
        return '<option value="' + escHtml(city) + '">' + escHtml(city) + '</option>';
      }).join('');
    }

    function hasLowQualityText(value) {
      const normalized = collapseSpaces(value).toLocaleLowerCase('tr-TR');
      if (!normalized) {
        return true;
      }
      const lettersOnly = normalized.replace(/[^a-zçğıöşü]/g, '');
      if (lettersOnly.length < 2) {
        return true;
      }
      if (/^(.)\1{2,}$/.test(lettersOnly) || /(.)\1{3,}/.test(lettersOnly)) {
        return true;
      }
      if (LOW_QUALITY_TOKENS.includes(normalized) || LOW_QUALITY_TOKENS.includes(lettersOnly)) {
        return true;
      }
      const words = normalized.split(' ').filter(Boolean);
      if (words.length > 1 && new Set(words).size === 1) {
        return true;
      }
      return false;
    }

    function validateSurname(value) {
      const normalized = collapseSpaces(value);
      if (!/^[A-Za-zÇĞİÖŞÜçğıöşü\s'-]+$/.test(normalized)) {
        return false;
      }
      return !hasLowQualityText(normalized);
    }

    function validateSchool(value) {
      return !hasLowQualityText(value);
    }

    function normalizeGradeList(metin) {
      const raw = Array.isArray(metin.siniflar) && metin.siniflar.length
        ? metin.siniflar
        : (metin.sinif !== undefined && metin.sinif !== null ? [metin.sinif] : []);
      return raw
        .map(v => parseInt(v, 10))
        .filter(v => Number.isFinite(v));
    }

    function saveMetinCache(list) {
      try {
        localStorage.setItem(METIN_CACHE_KEY, JSON.stringify(list || []));
      } catch (error) {}
    }

    function getMetinCache() {
      try {
        const raw = localStorage.getItem(METIN_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (error) {
        return [];
      }
    }

    function saveMetinDetailCache(metin) {
      if (!metin || !metin.id) return;
      try {
        localStorage.setItem(METIN_DETAIL_CACHE_PREFIX + metin.id, JSON.stringify(metin));
      } catch (error) {}
    }

    function getMetinDetailCache(metinId) {
      try {
        const raw = localStorage.getItem(METIN_DETAIL_CACHE_PREFIX + metinId);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function getCachedMetinById(metinId) {
      const listed = getMetinCache().find(item => item.id === metinId);
      return listed || getMetinDetailCache(metinId);
    }

    function setSinifButtonState(sinif) {
      document.querySelectorAll('.sinif-btn').forEach(button => {
        button.classList.toggle('active', parseInt(button.dataset.s, 10) === parseInt(sinif, 10));
      });
    }

    /* ── Adım 1 → 2: Sınıf Seç ── */
    async function sinifSec(sinif) {
      setSinifButtonState(sinif);
      seciliSinif = sinif;

      // Step geçişi
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      document.getElementById('step2Title').textContent = `📚 ${sinif}. Sınıf Metinleri`;

      // Step gösterge
      setStep(2);

      // Sınıf seçiliyse giriş formunda da ayarla
      document.getElementById('kullanici_sinif').value = sinif;
      metinFiltreleri.tur = 'all';
      metinFiltreleri.siralama = 'newest';
      metinFiltreleri.soru = 'all';

      // Metinleri çek
      await loadMetinler(sinif);
    }

    let tumMetinlerKaynak = [];
    let tumMetinler = [];
    let aktifSayfa  = 1;
    const SAYFA_BOYUT = 12;
    const metinFiltreleri = {
      tur: 'all',
      siralama: 'newest',
      soru: 'all',
    };

    async function loadMetinler(sinif) {
      const list = document.getElementById('metinListesi');
      list.innerHTML = '<div class="loading"><span>⏳</span>Metinler yükleniyor…</div>';
      aktifSayfa = 1;

      // sinif sütunu VEYA siniflar dizisi içinde eşleşen metinleri çek
      const { data, error } = await sb
        .from('metinler')
        .select('id,baslik,sinif,siniflar,goruntuleme_modu,hedef_hiz,kelime_sayisi,aktif,olusturma_tarihi')
        .eq('aktif', true)
        .order('olusturma_tarihi', { ascending: false });

      if (error) {
        const cached = getMetinCache();
        tumMetinlerKaynak = cached.filter(m => normalizeGradeList(m).includes(parseInt(sinif, 10)));
        applyMetinFilters();
        if (tumMetinler.length) {
          list.insertAdjacentHTML('afterbegin', '<div style="margin-bottom:14px;padding:12px 14px;border:1.5px solid #FCD34D;background:#FFF7ED;border-radius:14px;color:#9A3412;font-size:13px;font-weight:700;">⚠️ Canlı veritabanına ulaşılamadı. Son kaydedilmiş metin listesi gösteriliyor.</div>');
          return;
        }
        list.innerHTML = `<div class="no-metin"><span>⚠️</span><p>Metinler şu an yüklenemedi. Lütfen biraz sonra tekrar deneyin.</p></div>`;
        return;
      }

      // İstemci tarafında filtrele: sinif sütunu veya siniflar dizisi eşleşsin
      tumMetinlerKaynak = await enrichMetinQuestionCounts((data || []).filter(m => {
        return normalizeGradeList(m).includes(parseInt(sinif, 10));
      }));
      saveMetinCache(tumMetinlerKaynak);

      applyMetinFilters();
    }

    async function enrichMetinQuestionCounts(items) {
      const list = Array.isArray(items) ? items : [];
      const ids = list.map(function(item) { return item.id; }).filter(Boolean);
      if (!ids.length) return list;

      let response = await sb
        .from('sorular_public')
        .select('metin_id')
        .in('metin_id', ids);

      if (response.error) {
        response = await sb
          .from('sorular')
          .select('metin_id')
          .in('metin_id', ids);
      }

      if (response.error) {
        return list;
      }

      const counts = {};
      (response.data || []).forEach(function(row) {
        if (!row || !row.metin_id) return;
        counts[row.metin_id] = (counts[row.metin_id] || 0) + 1;
      });

      return list.map(function(item) {
        return Object.assign({}, item, {
          soru_sayisi: counts[item.id] || 0,
        });
      });
    }

    function getMetinQuestionLabel(value) {
      if (value === '1-3') return '1-3 soru';
      if (value === '4-6') return '4-6 soru';
      if (value === '7+') return '7+ soru';
      return 'Tüm soru sayıları';
    }

    function renderMetinFilters() {
      const panel = document.getElementById('metinFilterPanel');
      if (!panel) return;
      panel.innerHTML = `
        <div>
          <label>Tür</label>
          <select onchange="metinFiltreDegistir('tur', this.value)">
            <option value="all" ${metinFiltreleri.tur === 'all' ? 'selected' : ''}>Tüm türler</option>
            <option value="tam" ${metinFiltreleri.tur === 'tam' ? 'selected' : ''}>Tam metin</option>
            <option value="kelime" ${metinFiltreleri.tur === 'kelime' ? 'selected' : ''}>Kelime kelime</option>
          </select>
        </div>
        <div>
          <label>Tarih / Sıra</label>
          <select onchange="metinFiltreDegistir('siralama', this.value)">
            <option value="newest" ${metinFiltreleri.siralama === 'newest' ? 'selected' : ''}>En yeni</option>
            <option value="oldest" ${metinFiltreleri.siralama === 'oldest' ? 'selected' : ''}>En eski</option>
            <option value="questions-desc" ${metinFiltreleri.siralama === 'questions-desc' ? 'selected' : ''}>Soru sayısı fazla</option>
            <option value="questions-asc" ${metinFiltreleri.siralama === 'questions-asc' ? 'selected' : ''}>Soru sayısı az</option>
          </select>
        </div>
        <div>
          <label>Soru Sayısı</label>
          <select onchange="metinFiltreDegistir('soru', this.value)">
            ${['all', '1-3', '4-6', '7+'].map(function(value) {
              return '<option value="' + value + '" ' + (metinFiltreleri.soru === value ? 'selected' : '') + '>' + getMetinQuestionLabel(value) + '</option>';
            }).join('')}
          </select>
        </div>`;
    }

    function metinSoruSayisiEslesir(metin) {
      const count = Number(metin.soru_sayisi || 0);
      if (metinFiltreleri.soru === '1-3') return count >= 1 && count <= 3;
      if (metinFiltreleri.soru === '4-6') return count >= 4 && count <= 6;
      if (metinFiltreleri.soru === '7+') return count >= 7;
      return true;
    }

    function sortMetinler(list) {
      const rows = list.slice();
      if (metinFiltreleri.siralama === 'oldest') {
        return rows.sort(function(a, b) { return getTimeValue(a.olusturma_tarihi) - getTimeValue(b.olusturma_tarihi); });
      }
      if (metinFiltreleri.siralama === 'questions-desc') {
        return rows.sort(function(a, b) { return (Number(b.soru_sayisi || 0) - Number(a.soru_sayisi || 0)) || (getTimeValue(b.olusturma_tarihi) - getTimeValue(a.olusturma_tarihi)); });
      }
      if (metinFiltreleri.siralama === 'questions-asc') {
        return rows.sort(function(a, b) { return (Number(a.soru_sayisi || 0) - Number(b.soru_sayisi || 0)) || (getTimeValue(b.olusturma_tarihi) - getTimeValue(a.olusturma_tarihi)); });
      }
      return rows.sort(function(a, b) { return getTimeValue(b.olusturma_tarihi) - getTimeValue(a.olusturma_tarihi); });
    }

    function applyMetinFilters() {
      tumMetinler = sortMetinler(tumMetinlerKaynak.filter(function(metin) {
        if (metinFiltreleri.tur !== 'all' && metin.goruntuleme_modu !== metinFiltreleri.tur) {
          return false;
        }
        return metinSoruSayisiEslesir(metin);
      }));
      aktifSayfa = 1;
      renderMetinFilters();
      renderMetinSayfasi(document.getElementById('metinListesi'));
    }

    function metinFiltreDegistir(key, value) {
      metinFiltreleri[key] = value;
      applyMetinFilters();
    }

    function renderMetinSayfasi(list) {
      if (!tumMetinler.length) {
        list.innerHTML = `
          <div class="no-metin">
            <span>📭</span>
            <p>Bu sınıf için henüz metin eklenmemiş.</p>
          </div>`;
        return;
      }

      const topSayfa  = Math.ceil(tumMetinler.length / SAYFA_BOYUT);
      const baslangic = (aktifSayfa - 1) * SAYFA_BOYUT;
      const sayfa     = tumMetinler.slice(baslangic, baslangic + SAYFA_BOYUT);
      const yeniMetinIdSet = new Set(
        tumMetinler
          .slice()
          .sort(function(a, b) {
            return getTimeValue(b.olusturma_tarihi) - getTimeValue(a.olusturma_tarihi);
          })
          .slice(0, 3)
          .map(function(item) {
            return String(item.id);
          })
      );

      const EMOJILER = ['📖','📚','✏️','🌟','📝','🔖','📓','🗒️','📃','🌈'];
      const METIN_RENKLER = [
        { accent: '#F97373', bg: '#FFF1F2', border: '#FECACA', shadow: 'rgba(249,115,115,.18)' },
        { accent: '#F59E0B', bg: '#FFF7ED', border: '#FED7AA', shadow: 'rgba(245,158,11,.18)' },
        { accent: '#22C55E', bg: '#F0FDF4', border: '#BBF7D0', shadow: 'rgba(34,197,94,.16)' },
        { accent: '#14B8A6', bg: '#ECFEFF', border: '#99F6E4', shadow: 'rgba(20,184,166,.16)' },
        { accent: '#38BDF8', bg: '#EFF6FF', border: '#BAE6FD', shadow: 'rgba(56,189,248,.17)' },
        { accent: '#8B5CF6', bg: '#F5F3FF', border: '#DDD6FE', shadow: 'rgba(139,92,246,.18)' },
        { accent: '#D946EF', bg: '#FDF4FF', border: '#F5D0FE', shadow: 'rgba(217,70,239,.14)' },
        { accent: '#FB7185', bg: '#FFF7F7', border: '#FFE4E6', shadow: 'rgba(251,113,133,.14)' }
      ];

      const kartHTML = sayfa.map((m, i) => {
        const mod    = m.goruntuleme_modu === 'kelime' ? '⚡ Kelime Kelime' : '📄 Tam Metin';
        const modCls = m.goruntuleme_modu === 'kelime' ? 'badge-kw' : 'badge-tam';
        const hiz    = m.hedef_hiz    ? `${m.hedef_hiz} k/dk` : '';
        const kw     = m.kelime_sayisi ? `${m.kelime_sayisi} kelime` : '';
        const soru   = Number.isFinite(Number(m.soru_sayisi)) ? `${Number(m.soru_sayisi)} soru` : '';
        const em     = EMOJILER[(baslangic + i) % EMOJILER.length];
        const statusMeta = getReadingStatusMeta(m);
        const isNew = yeniMetinIdSet.has(String(m.id));
        const renk = METIN_RENKLER[(baslangic + i) % METIN_RENKLER.length];
        return `
          <div class="metin-card ${statusMeta ? 'is-complete' : ''}" style="--metin-accent:${renk.accent};--metin-bg:${renk.bg};--metin-border:${renk.border};--metin-shadow:${renk.shadow}" onclick="metinSec('${m.id}')">
            <div class="mc-left">
              <div class="mc-no">${baslangic + i + 1}</div>
              <span class="mc-em">${em}</span>
            </div>
            <div class="mc-body">
              <div class="mc-title-row">
                <div class="mc-title">${escHtml(m.baslik)}</div>
                ${isNew ? '<span class="mc-title-badge">YENİ</span>' : ''}
              </div>
              <div class="mc-meta">
                <span class="mc-badge ${modCls}">${mod}</span>
                ${isNew ? '<span class="mc-badge badge-new">Yeni Metin</span>' : ''}
                ${kw ? `<span class="mc-chip">📊 ${kw}</span>` : ''}
                ${soru ? `<span class="mc-chip">❔ ${soru}</span>` : ''}
                ${hiz ? `<span class="mc-chip">🎯 ${hiz}</span>` : ''}
              </div>
              ${statusMeta ? `<div class="mc-status-row"><span class="mc-status-badge ${statusMeta.tone}">✅ ${statusMeta.label}</span></div>` : ''}
            </div>
            <span class="mc-arrow">→</span>
          </div>`;
      }).join('');

      // Sayfalama HTML
      let pgHTML = '';
      if (topSayfa > 1) {
        pgHTML = `<div class="metin-pagination">`;
        pgHTML += `<button class="mp-btn" onclick="sayfaDegis(${aktifSayfa-1})" ${aktifSayfa===1?'disabled':''}>← Önceki</button>`;
        for (let i = 1; i <= topSayfa; i++) {
          pgHTML += `<button class="mp-btn ${i===aktifSayfa?'active':''}" onclick="sayfaDegis(${i})">${i}</button>`;
        }
        pgHTML += `<button class="mp-btn" onclick="sayfaDegis(${aktifSayfa+1})" ${aktifSayfa===topSayfa?'disabled':''}>Sonraki →</button>`;
        pgHTML += `<span class="mp-info">${tumMetinler.length} metin · Sayfa ${aktifSayfa}/${topSayfa}</span>`;
        pgHTML += `</div>`;
      }

      list.innerHTML = `<div class="metin-grid">${kartHTML}</div>${pgHTML}`;
    }

    function sayfaDegis(s) {
      aktifSayfa = s;
      const list = document.getElementById('metinListesi');
      renderMetinSayfasi(list);
      list.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function getTimeValue(raw) {
      const value = Date.parse(String(raw || ''));
      return Number.isNaN(value) ? 0 : value;
    }

    function getReadingStatusMeta(metin) {
      if (!window.kemalContentProgress || !metin || !metin.id) {
        return null;
      }
      return window.kemalContentProgress.getStatusMeta({
        type: 'reading',
        id: metin.id,
      });
    }

    /* ── Adım 2 → 3: Metin Seç ── */
    async function metinSec(metinId) {
      // Tam metni ve soruları çek
      const { data: metin, error } = await sb
        .from('metinler')
        .select('*')
        .eq('id', metinId)
        .single();

      let selectedMetin = metin;
      if (error || !selectedMetin) {
        selectedMetin = getMetinDetailCache(metinId);
      }
      if (!selectedMetin) { alert('Metin yüklenemedi, lütfen tekrar deneyin.'); return; }

      let soruResponse = await sb
        .from('sorular')
        .select('id, metin_id, soru_metni, sira, soru_tipi, ayar_json')
        .eq('metin_id', metinId)
        .order('sira');

      if (soruResponse.error) {
        soruResponse = await sb
          .from('sorular_public')
          .select('id, metin_id, soru_metni, sira, soru_tipi, ayar_json')
          .eq('metin_id', metinId)
          .order('sira');
        if (soruResponse.error && /(soru_tipi|ayar_json)/i.test(soruResponse.error.message || '')) {
          soruResponse = await sb
            .from('sorular_public')
            .select('id, metin_id, soru_metni, sira')
            .eq('metin_id', metinId)
            .order('sira');
        }
      }

      const sorularRows = soruResponse.data;
      const sorularError = soruResponse.error;

      if (sorularError) {
        alert('Sorular yüklenemedi, lütfen tekrar deneyin.');
        return;
      }

      const soruIds = (sorularRows || []).map((soru) => soru.id);
      let secenekRows = [];

      if (soruIds.length) {
        let secenekResponse = await sb
          .from('secenekler')
          .select('id, soru_id, secenek_metni, sira, dogru_mu')
          .in('soru_id', soruIds)
          .order('sira');

        if (secenekResponse.error) {
          secenekResponse = await sb
            .from('secenekler_public')
            .select('id, soru_id, secenek_metni, sira, dogru_mu')
            .in('soru_id', soruIds)
            .order('sira');
          if (secenekResponse.error && /dogru_mu/i.test(secenekResponse.error.message || '')) {
            secenekResponse = await sb
              .from('secenekler_public')
              .select('id, soru_id, secenek_metni, sira')
              .in('soru_id', soruIds)
              .order('sira');
          }
        }

        const secenekData = secenekResponse.data;
        const secenekError = secenekResponse.error;

        if (secenekError) {
          alert('Seçenekler yüklenemedi, lütfen tekrar deneyin.');
          return;
        }

        secenekRows = secenekData || [];
      }

      const secenekMap = {};
      secenekRows.forEach(function(secenek) {
        if (!secenekMap[secenek.soru_id]) {
          secenekMap[secenek.soru_id] = [];
        }
        secenekMap[secenek.soru_id].push(secenek);
      });

      const sorularData = (sorularRows || []).map(function(soru) {
        return {
          ...soru,
          soru_tipi: soru.soru_tipi || '',
          ayar_json: parseOptionalJson(soru.ayar_json),
          secenekler: (secenekMap[soru.id] || []).sort(function(a, b) {
            return a.sira - b.sira;
          }),
        };
      });

      selectedMetin.sorular = sorularData;

      seciliMetin = selectedMetin;
      document.getElementById('kullanici_sinif').value = seciliSinif || normalizeGradeList(selectedMetin)[0] || '';
      saveMetinDetailCache(selectedMetin);
      sessionStorage.setItem('okuma_metin', JSON.stringify(selectedMetin));

      // Bilgilendirme paneli
      const mod = selectedMetin.goruntuleme_modu === 'kelime' ? '⚡ Kelime Kelime' : '📄 Tam Metin';
      document.getElementById('seciliMetinAdi').textContent = selectedMetin.baslik;
      document.getElementById('seciliMetinMeta').textContent =
        `${mod} · ${selectedMetin.kelime_sayisi || '?'} kelime · ${selectedMetin.sorular.length} anlama sorusu`;

      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'block';
      setStep(3);
    }

    /* ── Okumayı Başlat ── */
    function okumaBaslat() {
      const ad    = document.getElementById('kullanici_ad').value.trim();
      const soyad = document.getElementById('kullanici_soyad').value.trim();
      const sinif = document.getElementById('kullanici_sinif').value;
      const sube  = document.getElementById('kullanici_sube').value;
      const il    = document.getElementById('kullanici_il').value.trim();
      const okul  = document.getElementById('kullanici_okul').value.trim();

      if (!ad || !soyad || !sinif || !sube || !il || !okul) {
        alert('Lütfen tüm alanları doldurun!');
        return;
      }
      if (!validateSurname(soyad)) {
        alert('Soyad alanında anlamsız, tekrar eden veya geçersiz bir giriş görünüyor.');
        return;
      }
      if (!validateSchool(okul)) {
        alert('Okul adı anlamsız veya tekrar eden bir giriş gibi görünüyor. Lütfen okul adını daha net yazın.');
        return;
      }

      sessionStorage.setItem('okuma_kullanici', JSON.stringify({
        ad: capitalizeWords(ad),
        soyad: capitalizeWords(soyad),
        sinif: parseInt(sinif),
        sube,
        il: capitalizeWords(il),
        okul: collapseSpaces(okul)
      }));
      window.location.href = '/hizli-okuma/oku.html';
    }

    /* ── Geri ── */
    function geriyeDon(adim) {
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'none';
      document.getElementById('step' + adim).style.display = 'block';
      setStep(adim);
    }

    /* ── Step Gösterge ── */
    function setStep(n) {
      [1,2,3].forEach(i => {
        const dot  = document.getElementById('dot'+i);
        dot.className = 'si-dot' + (i < n ? ' done' : i === n ? ' active' : '');
      });
      [1,2].forEach(i => {
        const line = document.getElementById('line'+i);
        line.className = 'si-line' + (i < n ? ' done' : '');
      });
    }

    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function resolveSharedMetin(metinId) {
      const { data, error } = await sb
        .from('metinler')
        .select('id, baslik, sinif, siniflar, aktif')
        .eq('id', metinId)
        .maybeSingle();

      if (!error && data) {
        return data;
      }

      return getCachedMetinById(metinId);
    }

    populateCitySelect();

    async function handleSharedMetinLink() {
      if (!sharedMetinId) {
        return;
      }

      const sharedMetin = await resolveSharedMetin(sharedMetinId);
      if (!sharedMetin || sharedMetin.aktif === false) {
        alert('Paylaşılan okuma bağlantısı artık aktif değil veya bulunamadı.');
        return;
      }

      const grades = normalizeGradeList(sharedMetin);
      const targetGrade = grades[0];
      if (!targetGrade) {
        alert('Bu metin için sınıf bilgisi bulunamadı.');
        return;
      }

      await sinifSec(targetGrade);
      await metinSec(sharedMetin.id);
    }

    handleSharedMetinLink();
  </script>
</body>
</html>
