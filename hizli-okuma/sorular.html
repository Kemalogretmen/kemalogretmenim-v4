<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❓ Anlama Soruları — Kemal Öğretmenim</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(145deg,#0F0A2E,#1A1040); min-height:100vh; }

    .soru-ekran {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Üst bilgi */
    .soru-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .soru-metin-adi {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: rgba(255,255,255,.6);
    }
    .soru-sayac-badge {
      background: rgba(108,61,237,.4);
      border: 2px solid rgba(108,61,237,.6);
      color: white;
      padding: 7px 16px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 14px;
    }

    /* İlerleme */
    .soru-progress {
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 6px;
      margin-bottom: 36px;
      overflow: hidden;
    }
    .soru-progress-fill {
      height: 100%;
      background: linear-gradient(90deg,var(--purple),var(--teal));
      border-radius: 6px;
      transition: width .5s ease;
    }

    /* Soru kartı */
    .soru-kart {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255,255,255,.1);
      border-radius: var(--r-xl);
      padding: 36px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .soru-no {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,.35);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    .soru-metin {
      font-family: var(--font-display);
      font-size: clamp(18px,3.5vw,24px);
      font-weight: 800;
      color: white;
      line-height: 1.4;
      margin-bottom: 28px;
      flex: 1;
    }

    /* Şıklar */
    .secenekler-list { display: flex; flex-direction: column; gap: 12px; }
    .secenekler-list.dy-list { flex-direction: row; flex-wrap: wrap; gap: 14px; }
    .secenekler-list.fill-list { flex-direction: row; flex-wrap: wrap; gap: 10px; }
    .secenek-btn {
      padding: 15px 20px;
      background: rgba(255,255,255,.07);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: var(--r-md);
      color: rgba(255,255,255,.85);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all .2s;
    }
    .secenek-btn:hover {
      background: rgba(108,61,237,.3);
      border-color: rgba(108,61,237,.6);
      color: white;
      transform: translateX(4px);
    }
    .secenek-btn.secili {
      background: rgba(108,61,237,.4);
      border-color: var(--purple);
      color: white;
    }
    .secenek-btn.fill-btn {
      width: auto;
      border-radius: 999px;
      padding: 12px 18px;
      text-align: center;
    }
    .secenek-btn.fill-btn:hover {
      transform: translateY(-2px);
    }
    .secenek-btn.dy-btn {
      flex: 1 1 220px;
      justify-content: center;
      text-align: center;
      padding: 18px 20px;
    }
    .secenek-harf {
      width: 30px; height: 30px;
      background: rgba(255,255,255,.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .secenek-btn.secili .secenek-harf { background: var(--purple); }
    .dy-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      flex-shrink: 0;
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.18);
    }
    .secenek-btn.dy-btn.secili .dy-circle {
      background: rgba(255,255,255,.28);
      border-color: transparent;
    }
    .secenek-btn.dy-btn.dogru.secili {
      background: linear-gradient(135deg,rgba(0,201,177,.42),rgba(85,239,196,.28));
      border-color: rgba(85,239,196,.8);
    }
    .secenek-btn.dy-btn.yanlis.secili {
      background: linear-gradient(135deg,rgba(255,96,82,.42),rgba(255,154,74,.28));
      border-color: rgba(255,154,74,.8);
    }
    .bosluk-vurgu {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      min-width: 92px;
      padding: 0 10px 4px;
      margin: 0 4px;
      border-bottom: 3px dashed #FFD93D;
      color: #FFD93D;
      font-weight: 900;
      letter-spacing: 1px;
    }

    /* Navigasyon */
    .soru-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }
    .nav-btn {
      padding: 12px 24px;
      background: rgba(255,255,255,.1);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 50px;
      color: white;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.2); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .nav-btn-ileri {
      background: linear-gradient(135deg,var(--purple),var(--purple-light));
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(108,61,237,.4);
    }
    .nav-btn-ileri:hover { transform: translateX(3px); box-shadow: 0 6px 20px rgba(108,61,237,.5); }
    .nav-btn-bitir {
      background: linear-gradient(135deg,var(--coral),#FF9A4A);
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(255,96,82,.35);
      padding: 12px 32px;
    }
    .nav-btn-bitir:hover { transform: translateY(-2px); }

    .nokta-nav {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nokta {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      cursor: pointer;
      transition: all .2s;
    }
    .nokta.aktif   { background: white; transform: scale(1.4); }
    .nokta.cevapli { background: var(--teal); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 999;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: white;
      border-radius: var(--r-xl);
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .modal-em  { font-size:56px; display:block; margin-bottom:16px; }
    .modal-title { font-family:var(--font-display); font-size:24px; font-weight:800; color:var(--navy); margin-bottom:10px; }
    .modal-sub  { font-size:15px; color:var(--slate); margin-bottom:24px; line-height:1.6; }
    .modal-btns { display:flex; gap:12px; justify-content:center; }
    .modal-btn-vazgec { padding:12px 24px; background:var(--border); border:none; border-radius:50px; cursor:pointer; font-weight:800; font-family:var(--font-body); color:var(--slate); transition:all .2s; }
    .modal-btn-bitir  { padding:12px 24px; background:var(--coral); border:none; border-radius:50px; cursor:pointer; font-weight:800; font-family:var(--font-body); color:white; transition:all .2s; }
    .modal-btn-vazgec:hover { background:#ddd; }
    .modal-btn-bitir:hover  { background:#C0392B; transform:translateY(-1px); }

    @media(max-width:480px) {
      .soru-kart { padding:24px; }
      .soru-nav  { flex-wrap:wrap; }
    }
  </style>
</head>
<body>

  <div class="soru-ekran">

    <div class="soru-topbar">
      <div class="soru-metin-adi" id="soruMetinAdi">📖 —</div>
      <div class="soru-sayac-badge" id="soruSayacBadge">0 / 0</div>
    </div>

    <div class="soru-progress">
      <div class="soru-progress-fill" id="soruProgress" style="width:0%"></div>
    </div>

    <div class="soru-kart" id="soruKart">
      <div class="soru-no" id="soruNo">SORU 1</div>
      <div class="soru-metin" id="soruMetin">Yükleniyor…</div>
      <div class="secenekler-list" id="seceneklerList"></div>
    </div>

    <div class="soru-nav">
      <button class="nav-btn" id="geriBtn" onclick="soruGeri()" disabled>← Geri</button>
      <div class="nokta-nav" id="noktaNav"></div>
      <button class="nav-btn nav-btn-ileri" id="ileriBtn" onclick="soruIleri()">İleri →</button>
    </div>

  </div>

  <!-- Bitir Modal -->
  <div class="modal-overlay" id="bitirModal">
    <div class="modal-box">
      <span class="modal-em">🤔</span>
      <div class="modal-title">Sınavı Bitirmek İstiyor Musun?</div>
      <div class="modal-sub" id="bitirModalSub">Cevapladığın sorular kaydedilecek.</div>
      <div class="modal-btns">
        <button class="modal-btn-vazgec" onclick="modalKapat()">Hayır, Devam</button>
        <button class="modal-btn-bitir" onclick="soruBitir()">Evet, Bitir!</button>
      </div>
    </div>
  </div>

  <script>
    const metin     = JSON.parse(sessionStorage.getItem('okuma_metin') || 'null');
    const kullanici = JSON.parse(sessionStorage.getItem('okuma_kullanici') || 'null');

    if (!metin || !kullanici) { window.location.href = '/hizli-okuma/index.html'; }

    const QUESTION_TYPES = {
      CHOICE: 'coktan-secmeli',
      TRUE_FALSE: 'dogru-yanlis',
      FILL: 'bosluk-doldurma',
    };

    const sorular = (metin.sorular || []);
    if (sorular.length === 0) { window.location.href = '/hizli-okuma/karne.html'; }

    let aktifSoru = 0;
    const cevaplar = new Array(sorular.length).fill(null);

    function normalizeTextToken(value) {
      return String(value || '')
        .toLocaleLowerCase('tr-TR')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function hasBlankPlaceholder(value) {
      return /_{3,}|\.{3,}/.test(String(value || ''));
    }

    function isTrueFalseChoices(choices) {
      if (!Array.isArray(choices) || choices.length !== 2) {
        return false;
      }
      const labels = choices.map(choice => normalizeTextToken(choice && choice.secenek_metni));
      return labels.includes('doğru') && labels.includes('yanlış') ||
        labels.includes('dogru') && labels.includes('yanlis');
    }

    function getQuestionType(question) {
      const explicitType = normalizeTextToken(question && question.soru_tipi);
      if (explicitType === QUESTION_TYPES.TRUE_FALSE) return QUESTION_TYPES.TRUE_FALSE;
      if (explicitType === QUESTION_TYPES.FILL) return QUESTION_TYPES.FILL;
      if (isTrueFalseChoices(question && question.secenekler)) return QUESTION_TYPES.TRUE_FALSE;
      if (hasBlankPlaceholder(question && question.soru_metni)) return QUESTION_TYPES.FILL;
      return QUESTION_TYPES.CHOICE;
    }

    function getTrueFalseChoices(choices) {
      const list = Array.isArray(choices) ? choices : [];
      const dogruSec = list.find(choice => {
        const label = normalizeTextToken(choice && choice.secenek_metni);
        return label === 'doğru' || label === 'dogru';
      });
      const yanlisSec = list.find(choice => {
        const label = normalizeTextToken(choice && choice.secenek_metni);
        return label === 'yanlış' || label === 'yanlis';
      });
      const dogruMu = dogruSec ? !!dogruSec.dogru_mu : !(yanlisSec && yanlisSec.dogru_mu);
      return [
        {
          id: dogruSec && dogruSec.id ? dogruSec.id : 'dogru',
          secenek_metni: 'Doğru',
          dogru_mu: dogruMu,
        },
        {
          id: yanlisSec && yanlisSec.id ? yanlisSec.id : 'yanlis',
          secenek_metni: 'Yanlış',
          dogru_mu: !dogruMu,
        },
      ];
    }

    function getQuestionChoices(question) {
      const type = getQuestionType(question);
      if (type === QUESTION_TYPES.TRUE_FALSE) {
        return getTrueFalseChoices(question && question.secenekler);
      }
      return (question && question.secenekler ? question.secenekler : [])
        .slice()
        .sort((a, b) => (a.sira || 0) - (b.sira || 0))
        .map((choice, index) => ({
          ...choice,
          id: choice && choice.id ? choice.id : `sec_${index + 1}`,
        }));
    }

    function getCorrectChoice(question) {
      return getQuestionChoices(question).find(choice => choice.dogru_mu) || null;
    }

    function formatQuestionText(question) {
      const raw = escHtml(question && question.soru_metni ? question.soru_metni : '');
      if (getQuestionType(question) !== QUESTION_TYPES.FILL) {
        return raw;
      }
      return raw.replace(/_{3,}|\.{3,}/g, '<span class="bosluk-vurgu">_____</span>');
    }

    function getQuestionListClass(type) {
      if (type === QUESTION_TYPES.TRUE_FALSE) return 'secenekler-list dy-list';
      if (type === QUESTION_TYPES.FILL) return 'secenekler-list fill-list';
      return 'secenekler-list';
    }

    function buildOptionsHtml(question, questionIndex) {
      const type = getQuestionType(question);
      const choices = getQuestionChoices(question);
      const selectedId = cevaplar[questionIndex];
      const harfler = ['A', 'B', 'C', 'D', 'E'];

      if (type === QUESTION_TYPES.TRUE_FALSE) {
        return choices.map(choice => {
          const key = normalizeTextToken(choice.secenek_metni);
          const shortLabel = key === 'yanlış' || key === 'yanlis' ? 'Y' : 'D';
          const tone = shortLabel === 'D' ? 'dogru' : 'yanlis';
          return `
            <button class="secenek-btn dy-btn ${tone} ${String(selectedId)===String(choice.id)?'secili':''}"
                    onclick="cevapSec('${choice.id}',this,${questionIndex})">
              <span class="dy-circle">${shortLabel}</span>
              <span>${escHtml(choice.secenek_metni)}</span>
            </button>`;
        }).join('');
      }

      if (type === QUESTION_TYPES.FILL) {
        return choices.map(choice => `
          <button class="secenek-btn fill-btn ${String(selectedId)===String(choice.id)?'secili':''}"
                  onclick="cevapSec('${choice.id}',this,${questionIndex})">
            <span>${escHtml(choice.secenek_metni)}</span>
          </button>`).join('');
      }

      return choices.map((choice, i) => `
        <button class="secenek-btn ${String(selectedId)===String(choice.id)?'secili':''}"
                onclick="cevapSec('${choice.id}',this,${questionIndex})">
          <span class="secenek-harf">${harfler[i]||i+1}</span>
          <span>${escHtml(choice.secenek_metni)}</span>
        </button>`).join('');
    }

    function getChoiceText(question, selectedId) {
      const selected = getQuestionChoices(question).find(choice => String(choice.id) === String(selectedId));
      return selected ? selected.secenek_metni : '—';
    }

    document.getElementById('soruMetinAdi').textContent = '📖 ' + metin.baslik;
    renderNoktalar();
    soruGoster(0);

    function soruGoster(index) {
      aktifSoru = index;
      const soru = sorular[index];
      const type = getQuestionType(soru);

      document.getElementById('soruNo').textContent = `SORU ${index+1}`;
      document.getElementById('soruMetin').innerHTML = formatQuestionText(soru);
      document.getElementById('soruSayacBadge').textContent = `${index+1} / ${sorular.length}`;
      document.getElementById('soruProgress').style.width = ((index+1)/sorular.length*100) + '%';

      const list = document.getElementById('seceneklerList');
      list.className = getQuestionListClass(type);
      list.innerHTML = buildOptionsHtml(soru, index);

      document.getElementById('geriBtn').disabled = index === 0;

      const ileriBtn = document.getElementById('ileriBtn');
      if (index === sorular.length - 1) {
        ileriBtn.className  = 'nav-btn nav-btn-bitir';
        ileriBtn.textContent = '🏁 Sınavı Bitir';
        ileriBtn.onclick    = bitirOnayla;
      } else {
        ileriBtn.className  = 'nav-btn nav-btn-ileri';
        ileriBtn.textContent = 'İleri →';
        ileriBtn.onclick    = soruIleri;
      }

      renderNoktalar();
    }

    function cevapSec(secId, el, soruIndex) {
      cevaplar[soruIndex] = secId;
      el.closest('.secenekler-list').querySelectorAll('.secenek-btn')
        .forEach(button => button.classList.remove('secili'));
      el.classList.add('secili');
      renderNoktalar();
    }

    function soruIleri() {
      if (aktifSoru < sorular.length - 1) soruGoster(aktifSoru + 1);
    }

    function soruGeri() {
      if (aktifSoru > 0) soruGoster(aktifSoru - 1);
    }

    function renderNoktalar() {
      document.getElementById('noktaNav').innerHTML = sorular.map((_, i) => `
        <div class="nokta ${i===aktifSoru?'aktif':''} ${cevaplar[i]?'cevapli':''}"
             onclick="soruGoster(${i})"></div>`).join('');
    }

    function bitirOnayla() {
      const bos = cevaplar.filter(c => c === null).length;
      const sub = bos > 0
        ? `<strong>${bos} soru</strong> boş bırakıldı. Yine de bitirmek istiyor musun?`
        : 'Tüm sorular cevaplandı. Sınavı tamamlamak istiyor musun?';
      document.getElementById('bitirModalSub').innerHTML = sub;
      document.getElementById('bitirModal').classList.add('show');
    }

    function modalKapat() {
      document.getElementById('bitirModal').classList.remove('show');
    }

    function soruBitir() {
      let dogru = 0;
      let yanlis = 0;

      const detay = sorular.map((soru, index) => {
        const secilen = cevaplar[index];
        const dogruSec = getCorrectChoice(soru);
        const isDogru = dogruSec && secilen !== null && String(secilen) === String(dogruSec.id);

        if (secilen === null) {
          yanlis += 1;
        } else if (isDogru) {
          dogru += 1;
        } else {
          yanlis += 1;
        }

        return {
          soru: soru.soru_metni,
          tip: getQuestionType(soru),
          secilen,
          dogruId: dogruSec ? dogruSec.id : null,
          isDogru: !!isDogru,
          secilenMetin: getChoiceText(soru, secilen),
          dogruMetin: dogruSec ? dogruSec.secenek_metni : '—',
        };
      });

      sessionStorage.setItem('okuma_cevaplar', JSON.stringify({ dogru, yanlis, detay }));
      window.location.href = '/hizli-okuma/karne.html';
    }

    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
