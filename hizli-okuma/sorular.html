<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❓ Anlama Soruları — Kemal Öğretmenim</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(145deg,#0F0A2E,#1A1040); min-height:100vh; }

    .soru-ekran {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Üst bilgi */
    .soru-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .soru-metin-adi {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: rgba(255,255,255,.6);
    }
    .soru-sayac-badge {
      background: rgba(108,61,237,.4);
      border: 2px solid rgba(108,61,237,.6);
      color: white;
      padding: 7px 16px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 14px;
    }

    /* İlerleme */
    .soru-progress {
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 6px;
      margin-bottom: 36px;
      overflow: hidden;
    }
    .soru-progress-fill {
      height: 100%;
      background: linear-gradient(90deg,var(--purple),var(--teal));
      border-radius: 6px;
      transition: width .5s ease;
    }

    /* Soru kartı */
    .soru-kart {
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255,255,255,.1);
      border-radius: var(--r-xl);
      padding: 36px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .soru-no {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,.35);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    .soru-metin {
      font-family: var(--font-display);
      font-size: clamp(18px,3.5vw,24px);
      font-weight: 800;
      color: white;
      line-height: 1.4;
      margin-bottom: 28px;
      flex: 1;
    }

    /* Şıklar */
    .secenekler-list { display: flex; flex-direction: column; gap: 12px; }
    .secenek-btn {
      padding: 15px 20px;
      background: rgba(255,255,255,.07);
      border: 2px solid rgba(255,255,255,.12);
      border-radius: var(--r-md);
      color: rgba(255,255,255,.85);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all .2s;
    }
    .secenek-btn:hover {
      background: rgba(108,61,237,.3);
      border-color: rgba(108,61,237,.6);
      color: white;
      transform: translateX(4px);
    }
    .secenek-btn.secili {
      background: rgba(108,61,237,.4);
      border-color: var(--purple);
      color: white;
    }
    .secenek-harf {
      width: 30px; height: 30px;
      background: rgba(255,255,255,.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .secenek-btn.secili .secenek-harf { background: var(--purple); }

    /* Navigasyon */
    .soru-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }
    .nav-btn {
      padding: 12px 24px;
      background: rgba(255,255,255,.1);
      border: 2px solid rgba(255,255,255,.15);
      border-radius: 50px;
      color: white;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.2); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .nav-btn-ileri {
      background: linear-gradient(135deg,var(--purple),var(--purple-light));
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(108,61,237,.4);
    }
    .nav-btn-ileri:hover { transform: translateX(3px); box-shadow: 0 6px 20px rgba(108,61,237,.5); }
    .nav-btn-bitir {
      background: linear-gradient(135deg,var(--coral),#FF9A4A);
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(255,96,82,.35);
      padding: 12px 32px;
    }
    .nav-btn-bitir:hover { transform: translateY(-2px); }

    .nokta-nav {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nokta {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      cursor: pointer;
      transition: all .2s;
    }
    .nokta.aktif   { background: white; transform: scale(1.4); }
    .nokta.cevapli { background: var(--teal); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 999;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: white;
      border-radius: var(--r-xl);
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .modal-em  { font-size:56px; display:block; margin-bottom:16px; }
    .modal-title { font-family:var(--font-display); font-size:24px; font-weight:800; color:var(--navy); margin-bottom:10px; }
    .modal-sub  { font-size:15px; color:var(--slate); margin-bottom:24px; line-height:1.6; }
    .modal-btns { display:flex; gap:12px; justify-content:center; }
    .modal-btn-vazgec { padding:12px 24px; background:var(--border); border:none; border-radius:50px; cursor:pointer; font-weight:800; font-family:var(--font-body); color:var(--slate); transition:all .2s; }
    .modal-btn-bitir  { padding:12px 24px; background:var(--coral); border:none; border-radius:50px; cursor:pointer; font-weight:800; font-family:var(--font-body); color:white; transition:all .2s; }
    .modal-btn-vazgec:hover { background:#ddd; }
    .modal-btn-bitir:hover  { background:#C0392B; transform:translateY(-1px); }

    @media(max-width:480px) {
      .soru-kart { padding:24px; }
      .soru-nav  { flex-wrap:wrap; }
    }
  </style>
</head>
<body>

  <div class="soru-ekran">

    <div class="soru-topbar">
      <div class="soru-metin-adi" id="soruMetinAdi">📖 —</div>
      <div class="soru-sayac-badge" id="soruSayacBadge">0 / 0</div>
    </div>

    <div class="soru-progress">
      <div class="soru-progress-fill" id="soruProgress" style="width:0%"></div>
    </div>

    <div class="soru-kart" id="soruKart">
      <div class="soru-no" id="soruNo">SORU 1</div>
      <div class="soru-metin" id="soruMetin">Yükleniyor…</div>
      <div class="secenekler-list" id="seceneklerList"></div>
    </div>

    <div class="soru-nav">
      <button class="nav-btn" id="geriBtn" onclick="soruGeri()" disabled>← Geri</button>
      <div class="nokta-nav" id="noktaNav"></div>
      <button class="nav-btn nav-btn-ileri" id="ileriBtn" onclick="soruIleri()">İleri →</button>
    </div>

  </div>

  <!-- Bitir Modal -->
  <div class="modal-overlay" id="bitirModal">
    <div class="modal-box">
      <span class="modal-em">🤔</span>
      <div class="modal-title">Sınavı Bitirmek İstiyor Musun?</div>
      <div class="modal-sub" id="bitirModalSub">Cevapladığın sorular kaydedilecek.</div>
      <div class="modal-btns">
        <button class="modal-btn-vazgec" onclick="modalKapat()">Hayır, Devam</button>
        <button class="modal-btn-bitir" onclick="soruBitir()">Evet, Bitir!</button>
      </div>
    </div>
  </div>

  <script>
    const metin     = JSON.parse(sessionStorage.getItem('okuma_metin') || 'null');
    const kullanici = JSON.parse(sessionStorage.getItem('okuma_kullanici') || 'null');

    if (!metin || !kullanici) { window.location.href = '/hizli-okuma/index.html'; }

    const sorular = (metin.sorular || []);
    if (sorular.length === 0) { window.location.href = '/hizli-okuma/karne.html'; }

    let aktifSoru = 0;
    const cevaplar = new Array(sorular.length).fill(null); // seceneğin id'si

    /* ─── INIT ─── */
    document.getElementById('soruMetinAdi').textContent = '📖 ' + metin.baslik;
    renderNoktalar();
    soruGoster(0);

    function soruGoster(index) {
      aktifSoru = index;
      const s = sorular[index];
      const harfler = ['A','B','C','D','E'];

      document.getElementById('soruNo').textContent = `SORU ${index+1}`;
      document.getElementById('soruMetin').textContent = s.soru_metni;
      document.getElementById('soruSayacBadge').textContent = `${index+1} / ${sorular.length}`;
      document.getElementById('soruProgress').style.width =
        ((index+1)/sorular.length*100) + '%';

      // Şıklar
      const list = document.getElementById('seceneklerList');
      list.innerHTML = (s.secenekler || []).map((sec, i) => `
        <button class="secenek-btn ${cevaplar[index]===sec.id?'secili':''}"
                onclick="cevapSec('${sec.id}',this,${index})">
          <span class="secenek-harf">${harfler[i]||i+1}</span>
          <span>${escHtml(sec.secenek_metni)}</span>
        </button>`).join('');

      // Nav butonları
      document.getElementById('geriBtn').disabled = index === 0;

      const ileriBtn = document.getElementById('ileriBtn');
      if (index === sorular.length - 1) {
        ileriBtn.className  = 'nav-btn nav-btn-bitir';
        ileriBtn.textContent = '🏁 Sınavı Bitir';
        ileriBtn.onclick    = bitirOnayla;
      } else {
        ileriBtn.className  = 'nav-btn nav-btn-ileri';
        ileriBtn.textContent = 'İleri →';
        ileriBtn.onclick    = soruIleri;
      }

      renderNoktalar();
    }

    function cevapSec(secId, el, soruIndex) {
      cevaplar[soruIndex] = secId;
      el.closest('.secenekler-list').querySelectorAll('.secenek-btn')
        .forEach(b => b.classList.remove('secili'));
      el.classList.add('secili');
      renderNoktalar();
    }

    function soruIleri() {
      if (aktifSoru < sorular.length - 1) soruGoster(aktifSoru + 1);
    }
    function soruGeri() {
      if (aktifSoru > 0) soruGoster(aktifSoru - 1);
    }

    function renderNoktalar() {
      document.getElementById('noktaNav').innerHTML = sorular.map((_, i) => `
        <div class="nokta ${i===aktifSoru?'aktif':''} ${cevaplar[i]?'cevapli':''}"
             onclick="soruGoster(${i})"></div>`).join('');
    }

    function bitirOnayla() {
      const bos = cevaplar.filter(c=>c===null).length;
      const sub = bos > 0
        ? `<strong>${bos} soru</strong> boş bırakıldı. Yine de bitirmek istiyor musun?`
        : 'Tüm sorular cevaplandı. Sınavı tamamlamak istiyor musun?';
      document.getElementById('bitirModalSub').innerHTML = sub;
      document.getElementById('bitirModal').classList.add('show');
    }

    function modalKapat() {
      document.getElementById('bitirModal').classList.remove('show');
    }

    function soruBitir() {
      // Sonuçları hesapla
      let dogru = 0, yanlis = 0;
      const detay = sorular.map((s, i) => {
        const secilen = cevaplar[i];
        const dogruSec = (s.secenekler || []).find(sec => sec.dogru_mu);
        const isDogru = dogruSec && secilen === dogruSec.id;
        if (secilen === null) {
          yanlis++;
        } else if (isDogru) {
          dogru++;
        } else {
          yanlis++;
        }
        return {
          soru: s.soru_metni,
          secilen,
          dogruId: dogruSec?.id,
          isDogru,
          secilenMetin: (s.secenekler||[]).find(sec=>sec.id===secilen)?.secenek_metni || '—',
          dogruMetin:   dogruSec?.secenek_metni || '—'
        };
      });

      sessionStorage.setItem('okuma_cevaplar', JSON.stringify({ dogru, yanlis, detay }));
      window.location.href = '/hizli-okuma/karne.html';
    }

    function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
