<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Okuma Serüveni</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Andika&family=Varela+Round&display=swap');
            * { box-sizing: border-box; }
            body, html { margin:0; padding:0; height:100%; width:100%; font-family: 'Varela Round', sans-serif; background:#fff; overflow:hidden; }
            .scr { display:none; height:100vh; height:100dvh; width:100%; position:fixed; top:0; left:0; flex-direction:column; align-items:center; z-index:999; background:#fff; }
            .scr.on { display:flex; }
            
            #reading-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; }
            #wb { margin:auto; font-weight:bold; color:#333; text-align:center; padding:0 10px; line-height:1.2; }
            #fb { text-align:left; line-height:1.6; width: 95%; max-width:850px; height: 75vh; margin: auto; overflow-y:auto; padding:20px; border:6px solid #f0f4f8; border-radius:20px; background:#fff; }
            
            .tm { font-size:24px; color:#94a3b8; font-weight:bold; padding:15px; text-align:center; }
            .btn { background:#673ab7; color:white; border:none; padding:15px 45px; font-size:22px; border-radius:50px; cursor:pointer; font-weight:bold; transition:0.2s; box-shadow:0 6px 0 #4527a0; text-decoration:none; display:inline-block; text-align:center; box-sizing:border-box;}
            .btn:disabled { background:#e2e8f0 !important; color:#94a3b8 !important; box-shadow:none !important; cursor:not-allowed; }
            
            .quiz-card { background:white; padding:20px; border-radius:25px; box-shadow:0 10px 40px rgba(0,0,0,0.1); width:90%; max-width:600px; margin:auto; }
            .ob { display:block; width:100%; padding:12px; margin:8px 0; border:2px solid #e2e8f0; border-radius:15px; background:white; font-size:18px; cursor:pointer; text-align:left; font-family:inherit;}
            .ob.sel { background:#ede7f6; border-color:#673ab7; color:#673ab7; font-weight:bold; }
            
            .kn { width: 95%; max-width: 500px; padding: 15px; margin: auto; background: #fff; border: 4px solid #673ab7; border-radius: 25px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow-y: auto; max-height: 98vh; }
            .stat-group { margin-bottom: 10px; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
            .stat-group h4 { background: #f1f5f9; margin: 0; padding: 8px; color: #475569; font-size: 14px; text-align: left; padding-left: 15px; border-bottom: 1px solid #e2e8f0; font-weight: 700; text-transform: uppercase; }
            .sl { display: flex; justify-content: space-between; align-items: center; font-size: 15px; padding: 8px 15px; border-bottom: 1px solid #f8fafc; color: #333; }
            .sl:last-child { border-bottom: none; }
            .sl-mini-grid { display: flex; justify-content: space-around; padding: 10px; background: #fdfdfd; font-weight: bold; font-size: 14px; }
            
            .name-in { padding:15px; border:4px solid #673ab7; border-radius:20px; font-size:20px; text-align:center; width:80%; max-width:300px; margin:15px 0; outline:none; }
            
            @media print { .btn { display: none; } .kn { border: 2px solid #000; box-shadow: none; } }
        </style>
        </head>
        <body>
            <div id="s1" class="scr on" style="justify-content:center;">
                <h1 style="color:#673ab7; margin:0; font-size:36px; font-weight:800;">Okuma Serüveni 🚀</h1>
                <p style="color:#666; font-size:14px; margin-top:5px;">Lütfen Adınızı ve Soyadınızı yazınız</p>
                <input type="text" id="nIn" class="name-in" placeholder="Örn: Serkan Erdem">
                <button id="sBt" class="btn" disabled>BAŞLA ▶</button>
                <a href="/index.html" class="btn" style="background:#94a3b8; font-size:16px; padding:10px 25px; margin-top:15px; box-shadow:0 5px 0 #64748b;">🏠 Ana Sayfaya Dön</a>
            </div>

            <div id="s2" class="scr">
                <div class="tm" id="tm">00:00</div>
                <div id="reading-content"><div id="word-area" style="width:100%;"></div></div>
                <div style="padding:10px; text-align:center;"><button id="nb" class="btn"></button></div>
            </div>

            <div id="s3" class="scr" style="justify-content:center;">
                <div class="quiz-card"><h3 id="qt"></h3><div id="qo"></div><button id="xb" class="btn" style="width:100%; margin-top:15px;">İleri ➔</button></div>
            </div>

            <div id="s4" class="scr" style="justify-content:center;">
                <div class="kn">
                    <h2 id="knT" style="color:#673ab7; margin:5px 0 10px 0; font-size:22px;"></h2>
                    <div id="rs" style="text-align:left;"></div>
                    <div style="background:#fff7ed; padding:10px; border-radius:12px; border:2px dashed #f97316; margin:10px 0; text-align:center;">
                        <p id="rf" style="font-size:15px; line-height:1.4; color:#7c2d12; margin:0; font-weight:600;"></p>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <button class="btn" onclick="window.print()" style="font-size:16px; background:#0ea5e9; width:100%; padding:12px; margin:0; box-shadow:0 4px 0 #0284c7;">📄 Karnemi Kaydet</button>
                        <button class="btn" onclick="location.reload()" style="font-size:16px; background:#f97316; width:100%; padding:12px; margin:0; box-shadow:0 4px 0 #c2410c;">↺ Tekrar Oku</button>
                        <a href="/index.html" class="btn" style="font-size:16px; background:#64748b; width:100%; padding:12px; margin:0; box-shadow:0 4px 0 #475569;">🏠 Ana Sayfaya Dön</a>
                    </div>
                </div>
            </div>

            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
            <form id="gForm" method="POST" target="hidden_iframe" style="display:none;"></form>

            <script>
                const c = JSON.parse(decodeURIComponent("%7B%22m%22%3A%22full%22%2C%22s%22%3A%22auto%22%2C%22z%22%3A%2240%22%2C%22f%22%3A%22'Segoe%20UI'%2C%20sans-serif%22%2C%22v%22%3A1500%2C%22tw%22%3A20%2C%22w%22%3A%5B%22%C3%9C%C3%87%22%2C%22SEV%C4%B0ML%C4%B0%22%2C%22D%C4%B0NOZOR%22%2C%22Eski%22%2C%22zamanlarda%22%2C%22birbirini%22%2C%22%C3%A7ok%22%2C%22seven%22%2C%22%C3%BC%C3%A7%22%2C%22dinozor%22%2C%22arkada%C5%9F%22%2C%22ya%C5%9Farm%C4%B1%C5%9F.%22%2C%22Bunlar%C4%B1n%22%2C%22adlar%C4%B1%3A%22%2C%22Kuki%2C%22%2C%22Bobi%22%2C%22ve%22%2C%22Tobi%22%2C%22dinozorlarm%C4%B1%C5%9F.%22%2C%22Di%C4%9Fer%22%2C%22dinozorlar%22%2C%22gibi%22%2C%22de%C4%9Fillermi%C5%9F.%22%2C%22Kuki%2C%22%2C%22%C3%A7ok%22%2C%22sevimli%22%2C%22ve%22%2C%22utanga%C3%A7m%C4%B1%C5%9F%22%2C%22ama%22%2C%22y%C3%BCz%C3%BC%22%2C%22de%22%2C%22hep%22%2C%22g%C3%BClermi%C5%9F.%22%2C%22Bobi%22%2C%22dans%22%2C%22etmeye%22%2C%22bay%C4%B1l%C4%B1rm%C4%B1%C5%9F.%22%2C%22S%C3%BCrekli%22%2C%22dans%22%2C%22edermi%C5%9F.%22%2C%22Tobi%22%2C%22ise%22%2C%22biraz%22%2C%22%C5%9Fa%C5%9Fk%C4%B1n%22%2C%22ve%22%2C%22sakarm%C4%B1%C5%9F.%22%2C%22Kuyru%C4%9Fu%22%2C%22s%C3%BCrekli%22%2C%22bir%22%2C%22arkada%C5%9Flar%C4%B1na%22%2C%22%C3%A7arparm%C4%B1%C5%9F.%22%2C%22Onlar%C4%B1%22%2C%22g%C3%B6renler%22%2C%22di%C4%9Fer%22%2C%22dinozorlar%22%2C%22%C3%A7ok%22%2C%22sevinirlermi%C5%9Fler%22%2C%22ve%22%2C%22onlarla%22%2C%22arkada%C5%9F%22%2C%22olmak%22%2C%22isterlermi%C5%9F.%22%5D%2C%22fullHtml%22%3A%22%3Cdiv%20style%3D%5C%22text-align%3A%20center%3B%5C%22%3E%3Cfont%20color%3D%5C%22%23ff2600%5C%22%3E%C3%9C%C3%87%20SEV%C4%B0ML%C4%B0%20D%C4%B0NOZOR%3C%2Ffont%3E%3C%2Fdiv%3E%3Cdiv%3E%26nbsp%3B%20%26nbsp%3BEski%20zamanlarda%20birbirini%20%C3%A7ok%20seven%20%C3%BC%C3%A7%20dinozor%20arkada%C5%9F%20ya%C5%9Farm%C4%B1%C5%9F.%20Bunlar%C4%B1n%20adlar%C4%B1%3A%20Kuki%2C%20Bobi%20ve%20Tobi%20dinozorlarm%C4%B1%C5%9F.%20Di%C4%9Fer%20dinozorlar%20gibi%20de%C4%9Fillermi%C5%9F.%20Kuki%2C%20%C3%A7ok%20sevimli%20ve%20utanga%C3%A7m%C4%B1%C5%9F%20ama%20y%C3%BCz%C3%BC%20de%20hep%20g%C3%BClermi%C5%9F.%20Bobi%20dans%20etmeye%20bay%C4%B1l%C4%B1rm%C4%B1%C5%9F.%20S%C3%BCrekli%20dans%20edermi%C5%9F.%20Tobi%20ise%20biraz%20%C5%9Fa%C5%9Fk%C4%B1n%20ve%20sakarm%C4%B1%C5%9F.%20Kuyru%C4%9Fu%20s%C3%BCrekli%20bir%20arkada%C5%9Flar%C4%B1na%20%C3%A7arparm%C4%B1%C5%9F.%20Onlar%C4%B1%20g%C3%B6renler%20di%C4%9Fer%20dinozorlar%20%C3%A7ok%20sevinirlermi%C5%9Fler%20ve%20onlarla%20arkada%C5%9F%20olmak%20isterlermi%C5%9F.%26nbsp%3B%3C%2Fdiv%3E%22%2C%22q%22%3A%5B%7B%22t%22%3A%22Hikayenin%20ba%C5%9Fl%C4%B1%C4%9F%C4%B1%20neydi%3F%22%2C%22o%22%3A%5B%22Kuki%2C%20Bobi%2C%20Tobi%22%2C%22%C3%9C%C3%A7%20Sevimli%20Dinozor%22%2C%22%C3%9C%C3%A7%20Arkada%C5%9F%22%5D%2C%22c%22%3A1%7D%2C%7B%22t%22%3A%22A%C5%9Fa%C4%9F%C4%B1dakilerden%20hangisi%20bu%20dinozorladan%20birinin%20ad%C4%B1%20de%C4%9Fildir%3F%22%2C%22o%22%3A%5B%22Toki%22%2C%22Bobi%22%2C%22Tobi%22%5D%2C%22c%22%3A0%7D%2C%7B%22t%22%3A%22Bu%20%C3%BC%C3%A7%20arkada%C5%9F%20dinozoru%20g%C3%B6renler%20ne%20yaparm%C4%B1%C5%9F%3F%22%2C%22o%22%3A%5B%22Korkarlarm%C4%B1%C5%9F%22%2C%22%C3%9Cz%C3%BCl%C3%BCrlermi%C5%9F%22%2C%22Sevinirlermi%C5%9F%22%5D%2C%22c%22%3A2%7D%2C%7B%22t%22%3A%22%C5%9Ea%C5%9Fk%C4%B1n%20olan%20Tobi%20arkada%C5%9Flar%C4%B1na%20neyle%20%C3%A7arp%C4%B1yormu%C5%9F%3F%22%2C%22o%22%3A%5B%22Kula%C4%9F%C4%B1yla%22%2C%22Boynuzuyla%22%2C%22Kuyru%C4%9Fuyla%22%5D%2C%22c%22%3A2%7D%2C%7B%22t%22%3A%22A%C5%9Fa%C4%9F%C4%B1dakilerden%20hangisi%20Bobi'nin%20%C3%B6zelliklerindendir%3F%22%2C%22o%22%3A%5B%22Top%20oynamak%22%2C%22Dans%20etmek%22%2C%22Kayak%20yapmak%22%5D%2C%22c%22%3A1%7D%5D%2C%22formUrl%22%3A%22https%3A%2F%2Fdocs.google.com%2Fforms%2Fd%2Fe%2F1FAIpQLSe1ep5t3AJnDKMQqwe2sWnfCOcniruAwTnvjwBi6YQHmy5GmA%2FformResponse%22%2C%22textTitle%22%3A%22%C3%9C%C3%87%20SEV%C4%B0ML%C4%B0%20D%C4%B0NOZOR%22%2C%22gIds%22%3A%7B%22name%22%3A%22entry.1988276794%22%2C%22time%22%3A%22entry.1939787797%22%2C%22wpm%22%3A%22entry.1579217315%22%2C%22cor%22%3A%22entry.805749654%22%2C%22wrn%22%3A%22entry.1821560368%22%2C%22pct%22%3A%22entry.1581261404%22%2C%22titleId%22%3A%22entry.428466239%22%7D%7D")); 
                let i=0, qi=0, st, et, ti, ai, ans=Array(c.q.length).fill(null), sn="";
                const nIn=document.getElementById('nIn'), sBt=document.getElementById('sBt');
                
                nIn.addEventListener('input', () => { const val = nIn.value.trim(); sBt.disabled = !(val.includes(' ') && val.length > 3); });
                
                sBt.onclick = () => { sn = nIn.value.trim(); show('s2'); st=Date.now(); ti=setInterval(upT, 1000); const area=document.getElementById('word-area'), nb=document.getElementById('nb'); if(c.m==='word'){ area.innerHTML='<div id="wb" style="font-size:'+c.z+'px; font-family:'+c.f+'"></div>'; if(c.s==='auto') { nb.style.display='none'; upW(); ai=setInterval(upW, c.v); } else { nb.innerText="SONRAKİ ➔"; nb.onclick=upW; upW(); } } else { area.innerHTML='<div id="fb" style="font-size:'+c.z+'px; font-family:'+c.f+'">'+c.fullHtml+'</div>'; nb.innerText="OKUMAM BİTTİ ✅"; nb.onclick=fin; } };
                function show(id){ document.querySelectorAll('.scr').forEach(x=>x.classList.remove('on')); document.getElementById(id).classList.add('on'); }
                function upT(){ let s=Math.floor((Date.now()-st)/1000); document.getElementById('tm').innerText=Math.floor(s/60).toString().padStart(2,'0')+":"+(s%60).toString().padStart(2,'0'); }
                function upW(){ const b=document.getElementById('wb'); if(!b) return; if(i>=c.w.length){ fin(); return; } b.innerText=c.w[i]; i++; }
                function fin(){ clearInterval(ti); if(ai) clearInterval(ai); et=Date.now(); if(c.q.length > 0) { show('s3'); loadQ(); } else { res(); } }
                function loadQ(){ const q=c.q[qi]; document.getElementById('qt').innerText=q.t; let h=''; q.o.forEach((o,x)=>{ h+='<button class="ob '+(ans[qi]===x?'sel':'')+'" onclick="sv('+x+')">'+String.fromCharCode(65+x)+') '+o+'</button>'; }); document.getElementById('qo').innerHTML=h; document.getElementById('xb').innerText=qi===c.q.length-1?'BİTİR 🏁':'İLERİ ➔'; }
                window.sv=(x)=>{ans[qi]=x; loadQ();};
                document.getElementById('xb').onclick=()=>{ if(ans[qi]===null) return alert('Lütfen seçim yapalım!'); qi++; if(qi>=c.q.length) res(); else loadQ(); };
                
                const feedbacks = {
                    champion: [ "Muhteşem! Hem yıldırım gibi hızlısın hem de her şeyi harika anlamışsın. Tam bir okuma şampiyonusun! 🏆🚀", "İnanılmazsın! Okuduğunu bu kadar hızlı ve doğru anlaman gurur verici. Geleceğin profesörü! 🌟📖", "Tebrikler! Hem hız hem de anlama konusunda sınıfın yıldızısın. Benim akıllı öğrencim! ✨🧠", "Harika bir performans! Okuma hızın ve dikkatin parmak ısırtıyor. Alkışlar senin için! 👏⚡" ],
                    careful: [ "Anlama oranın harika! Çok dikkatlisin. Biraz daha hızlı okuma çalışmalarıyla seni kimse tutamaz! 🦉📚", "Tam bir dedektif gibi her soruyu doğru bildin! Okuma hızımız da pratikle artacak, pes etmek yok! 🔍💪", "Harikasın! Okuduğunu çok iyi anlıyorsun. Tekerleme çalışmalarıyla hızına hız katacağız! 🗣️✨", "Dikkatin ve anlama başarın beni çok mutlu etti. Okuma hızını da geliştireceğinden hiç şüphem yok! 🎯📈" ],
                    speedster: [ "Vay canına, rüzgar gibi hızlı okuyorsun! Ama bir dahaki sefere metnin anlamını kaçırmamak için biraz yavaşlayalım, anlaştık mı? ⚡👀", "Gözlerim hızına yetişemedi! Çok hızlısın. Şimdi bu hızı dikkatle birleştirip soruları da doğru yapma zamanı! 🚀🤔", "Okuma hızın süper! Fakat okumanın asıl amacı anlamaktır. Bir dahaki sefere daha dikkatli okuyalım olur mu? 💡📖", "Uçak gibi hızlısın! Bir sonraki okumanda acele etmeden, kelimelerin tadını çıkararak oku, başarı %100 olacak! ✈️🎯" ],
                    developing: [ "Güzel çaba! Pes etmeden okuduğun için seninle gurur duyuyorum. Birlikte çalışarak çok daha iyi olacağız! 🌱💪", "Okuma serüvenimiz devam ediyor! Her gün biraz daha kitap okuyarak hem hızlanacağız hem de daha iyi anlayacağız. Sihir pratiktedir! ✨📚", "Bugün güzel bir çalışma yaptık. Unutma, en büyük şampiyonlar en çok pratik yapanlardır. Okumaya devam! 🌟📖", "Çabanı çok takdir ettim! Hata yapmak öğrenmenin bir parçasıdır. Bir dahaki sefere çok daha iyi olacaksın, sana inanıyorum! ❤️🚀" ],
                    no_question: [ "Harikasın! Hedeflediğimiz hıza ulaştın. Çok seri okuyorsun, seninle gurur duyuyorum! 🚀👏", "Okuma performansın çok iyi! Ritimli ve akıcı okuman beni çok mutlu etti. 🌟📖", "Tebrikler! Belirlediğimiz sürede harika bir okuma gerçekleştirdin. 🏆⚡" ]
                };

                function getRandomFeedback(category) { const options = feedbacks[category]; return options[Math.floor(Math.random() * options.length)]; }

                function res(){
                    show('s4'); 
                    let cor=0, emp=0; c.q.forEach((q,x)=>{ if(ans[x]===null) emp++; else if(ans[x]===q.c) cor++; });
                    let wrg = c.q.length - cor - emp;
                    let sec = Math.floor((et-st)/1000);
                    let wpm = Math.round((c.w.length/(sec||1))*60);
                    let sc = (c.q.length > 0) ? Math.round((cor/c.q.length)*100) : 100;
                    
                    document.getElementById('knT').innerText = "Sevgili " + sn + ", İşte Karnen";
                    
                    let html = '<div class="stat-group"><h4>📖 Okuma Performansı</h4>';
                    html += '<div class="sl"><span>Metin Uzunluğu:</span> <b>' + c.w.length + ' Kelime</b></div>';
                    html += '<div class="sl"><span>Okuma Süresi:</span> <b>' + sec + ' sn</b></div>';
                    html += '<div class="sl"><span>Senin Hızın:</span> <b style="color:#673ab7">' + wpm + ' Kelime/Dk</b></div>';
                    html += '<div class="sl"><span>Hedef Hız:</span> <b>' + c.tw + ' Kelime/Dk</b></div></div>';
                    
                    if(c.q.length > 0) {
                        html += '<div class="stat-group"><h4>🧠 Anlama Performansı</h4>';
                        html += '<div class="sl"><span>Anlama Puanı:</span> <b style="color:#0ea5e9">' + sc + ' / 100</b></div>';
                        html += '<div class="sl"><span>Toplam Soru:</span> <b>' + c.q.length + ' Adet</b></div>';
                        html += '<div class="sl-mini-grid"><span style="color:#22c55e">✅ ' + cor + ' D</span><span style="color:#ef4444">❌ ' + wrg + ' Y</span><span style="color:#f97316">⭕ ' + emp + ' B</span></div></div>';
                    }
                    document.getElementById('rs').innerHTML = html;

                    let cat = "";
                    if(c.q.length === 0) cat = "no_question";
                    else if(wpm >= c.tw && sc >= 80) cat = "champion";
                    else if(wpm < c.tw && sc >= 80) cat = "careful";
                    else if(wpm >= c.tw && sc < 80) cat = "speedster";
                    else cat = "developing";

                    document.getElementById('rf').innerHTML = "<b>" + sn + ",</b> " + getRandomFeedback(cat);

                    if(c.formUrl && c.gIds.name) {
                        const form = document.getElementById('gForm');
                        form.action = c.formUrl;
                        form.innerHTML = ''; 
                        
                        // YENİ: Veri paketine Metin Başlığı'nı ekliyoruz
                        const data = {}; 
                        data[c.gIds.name] = sn; 
                        data[c.gIds.time] = sec; 
                        data[c.gIds.wpm] = wpm; 
                        data[c.gIds.cor] = cor; 
                        data[c.gIds.wrn] = wrg; 
                        data[c.gIds.pct] = sc;
                        // Metin Başlığını da gönder
                        if(c.gIds.titleId) {
                            data[c.gIds.titleId] = c.textTitle;
                        }

                        for(let key in data) { const input = document.createElement('input'); input.type = 'hidden'; input.name = key; input.value = data[key]; form.appendChild(input); }
                        form.submit();
                    }
                }
            </script>
        </body>
        </html>
