                function loadQ(){ const q=c.q[qi]; document.getElementById('qt').innerText=q.t; let h=''; q.o.forEach((o,x)=>{ h+='<button class="ob '+(ans[qi]===x?'sel':'')+'" onclick="sv('+x+')">'+String.fromCharCode(65+x)+') '+o+'</button>'; }); document.getElementById('qo').innerHTML=h; document.getElementById('xb').innerText=qi===c.q.length-1?'BİTİR 🏁':'İLERİ ➔'; }
                window.sv=(x)=>{ans[qi]=x; loadQ();};
                document.getElementById('xb').onclick=()=>{ if(ans[qi]===null) return alert('Lütfen seçim yapalım!'); qi++; if(qi>=c.q.length) res(); else loadQ(); };
                
                const feedbacks = {
                    champion: [ "Muhteşem! Hem yıldırım gibi hızlısın hem de her şeyi harika anlamışsın. Tam bir okuma şampiyonusun! 🏆🚀", "İnanılmazsın! Okuduğunu bu kadar hızlı ve doğru anlaman gurur verici. Geleceğin profesörü! 🌟📖", "Tebrikler! Hem hız hem de anlama konusunda sınıfın yıldızısın. Benim akıllı öğrencim! ✨🧠", "Harika bir performans! Okuma hızın ve dikkatin parmak ısırtıyor. Alkışlar senin için! 👏⚡" ],
                    careful: [ "Anlama oranın harika! Çok dikkatlisin. Biraz daha hızlı okuma çalışmalarıyla seni kimse tutamaz! 🦉📚", "Tam bir dedektif gibi her soruyu doğru bildin! Okuma hızımız da pratikle artacak, pes etmek yok! 🔍💪", "Harikasın! Okuduğunu çok iyi anlıyorsun. Tekerleme çalışmalarıyla hızına hız katacağız! 🗣️✨", "Dikkatin ve anlama başarın beni çok mutlu etti. Okuma hızını da geliştireceğinden hiç şüphem yok! 🎯📈" ],
                    speedster: [ "Vay canına, rüzgar gibi hızlı okuyorsun! Ama bir dahaki sefere metnin anlamını kaçırmamak için biraz yavaşlayalım, anlaştık mı? ⚡👀", "Gözlerim hızına yetişemedi! Çok hızlısın. Şimdi bu hızı dikkatle birleştirip soruları da doğru yapma zamanı! 🚀🤔", "Okuma hızın süper! Fakat okumanın asıl amacı anlamaktır. Bir dahaki sefere daha dikkatli okuyalım olur mu? 💡📖", "Uçak gibi hızlısın! Bir sonraki okumanda acele etmeden, kelimelerin tadını çıkararak oku, başarı %100 olacak! ✈️🎯" ],
                    developing: [ "Güzel çaba! Pes etmeden okuduğun için seninle gurur duyuyorum. Birlikte çalışarak çok daha iyi olacağız! 🌱💪", "Okuma serüvenimiz devam ediyor! Her gün biraz daha kitap okuyarak hem hızlanacağız hem de daha iyi anlayacağız. Sihir pratiktedir! ✨📚", "Bugün güzel bir çalışma yaptık. Unutma, en büyük şampiyonlar en çok pratik yapanlardır. Okumaya devam! 🌟📖", "Çabanı çok takdir ettim! Hata yapmak öğrenmenin bir parçasıdır. Bir dahaki sefere çok daha iyi olacaksın, sana inanıyorum! ❤️🚀" ],
                    no_question: [ "Harikasın! Hedeflediğimiz hıza ulaştın. Çok seri okuyorsun, seninle gurur duyuyorum! 🚀👏", "Okuma performansın çok iyi! Ritimli ve akıcı okuman beni çok mutlu etti. 🌟📖", "Tebrikler! Belirlediğimiz sürede harika bir okuma gerçekleştirdin. 🏆⚡" ]
                };

                function getRandomFeedback(category) { const options = feedbacks[category]; return options[Math.floor(Math.random() * options.length)]; }

                function res(){
                    show('s4'); 
                    let cor=0, emp=0; c.q.forEach((q,x)=>{ if(ans[x]===null) emp++; else if(ans[x]===q.c) cor++; });
                    let wrg = c.q.length - cor - emp;
                    let sec = Math.floor((et-st)/1000);
                    let wpm = Math.round((c.w.length/(sec||1))*60);
                    let sc = (c.q.length > 0) ? Math.round((cor/c.q.length)*100) : 100;
                    
                    document.getElementById('knT').innerText = "Sevgili " + sn + ", İşte Karnen";
                    
                    let html = '<div class="stat-group"><h4>📖 Okuma Performansı</h4>';
                    html += '<div class="sl"><span>Metin Uzunluğu:</span> <b>' + c.w.length + ' Kelime</b></div>';
                    html += '<div class="sl"><span>Okuma Süresi:</span> <b>' + sec + ' sn</b></div>';
                    html += '<div class="sl"><span>Senin Hızın:</span> <b style="color:#673ab7">' + wpm + ' Kelime/Dk</b></div>';
                    html += '<div class="sl"><span>Hedef Hız:</span> <b>' + c.tw + ' Kelime/Dk</b></div></div>';
                    
                    if(c.q.length > 0) {
                        html += '<div class="stat-group"><h4>🧠 Anlama Performansı</h4>';
                        html += '<div class="sl"><span>Anlama Puanı:</span> <b style="color:#0ea5e9">' + sc + ' / 100</b></div>';
                        html += '<div class="sl"><span>Toplam Soru:</span> <b>' + c.q.length + ' Adet</b></div>';
                        html += '<div class="sl-mini-grid"><span style="color:#22c55e">✅ ' + cor + ' D</span><span style="color:#ef4444">❌ ' + wrg + ' Y</span><span style="color:#f97316">⭕ ' + emp + ' B</span></div></div>';
                    }
                    document.getElementById('rs').innerHTML = html;

                    let cat = "";
                    if(c.q.length === 0) cat = "no_question";
                    else if(wpm >= c.tw && sc >= 80) cat = "champion";
                    else if(wpm < c.tw && sc >= 80) cat = "careful";
                    else if(wpm >= c.tw && sc < 80) cat = "speedster";
                    else cat = "developing";

                    document.getElementById('rf').innerHTML = "<b>" + sn + ",</b> " + getRandomFeedback(cat);

                    if(c.formUrl && c.gIds.name) {
                        const form = document.getElementById('gForm');
                        form.action = c.formUrl;
                        form.innerHTML = ''; 
                        
                        // YENİ: Veri paketine Metin Başlığı'nı ekliyoruz
                        const data = {}; 
                        data[c.gIds.name] = sn; 
                        data[c.gIds.time] = sec; 
                        data[c.gIds.wpm] = wpm; 
                        data[c.gIds.cor] = cor; 
                        data[c.gIds.wrn] = wrg; 
                        data[c.gIds.pct] = sc;
                        // Metin Başlığını da gönder
                        if(c.gIds.titleId) {
                            data[c.gIds.titleId] = c.textTitle;
                        }

                        for(let key in data) { const input = document.createElement('input'); input.type = 'hidden'; input.name = key; input.value = data[key]; form.appendChild(input); }
                        form.submit();
                    }
                }
            </script>
        </body>
        </html>
