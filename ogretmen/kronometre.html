        E.classWheelWinnerHint.textContent = winner ? 'Son seçim kaydedildi.' : 'Hazır';
      }
      if(E.classWheelSpinBtn) E.classWheelSpinBtn.disabled = S.classroom.isSpinningWheel || getEnabledWheelItems().length === 0;
    }
    function drawClassOptionWheel() {
      if(!E.classOptionWheel) return;
      var svg = E.classOptionWheel;
      var items = getEnabledWheelItems();
      svg.style.transform = 'rotate(' + (S.classroom.wheelRotation || 0) + 'deg)';
      if(items.length === 0) {
        svg.innerHTML = '<circle cx="0" cy="0" r="104" fill="#e2e8f0"></circle><text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-family="Nunito" font-weight="900" font-size="12" fill="#64748b">Seçenek ekleyin</text>';
        return;
      }
      function slicePath(startAngle, endAngle, radius) {
        var rad1 = (startAngle - 90) * Math.PI / 180;
        var rad2 = (endAngle - 90) * Math.PI / 180;
        var x1 = Math.cos(rad1) * radius;
        var y1 = Math.sin(rad1) * radius;
        var x2 = Math.cos(rad2) * radius;
        var y2 = Math.sin(rad2) * radius;
        var largeArc = endAngle - startAngle > 180 ? 1 : 0;
        return 'M 0 0 L ' + x1 + ' ' + y1 + ' A ' + radius + ' ' + radius + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + ' Z';
      }
      function fitWheelLabel(label, baseSize, maxLength) {
        var text = String(label || '').replace(/\s+/g, ' ').trim();
        if(!text) text = 'Seçenek';
        return {
          text: text.length > maxLength ? text.slice(0, Math.max(4, maxLength - 1)).trim() + '…' : text,
          size: Math.max(11, baseSize - Math.max(0, Math.ceil((text.length - 10) / 4)))
        };
      }
      var sliceAngle = 360 / items.length;
      var html = '';
      for(var i = 0; i < items.length; i += 1) {
        var startAngle = i * sliceAngle;
        var endAngle = (i + 1) * sliceAngle;
        var color = items[i].color || W_COLORS[i % W_COLORS.length];
        if(items.length === 1) {
          html += '<circle cx="0" cy="0" r="104" fill="' + color + '"></circle>';
        } else {
          html += '<path d="' + slicePath(startAngle, endAngle, 104) + '" fill="' + color + '" stroke="#ffffff" stroke-width="2"></path>';
        }
        var textAngle = startAngle + sliceAngle / 2;
        var theta = (textAngle - 90) * Math.PI / 180;
        var textX = Math.cos(theta) * (sliceAngle >= 72 ? 58 : 62);
        var textY = Math.sin(theta) * (sliceAngle >= 72 ? 58 : 62);
        var rotation = (textAngle - 90);
        if(rotation > 90 || rotation < -90) rotation += 180;
        var baseSize = sliceAngle >= 72 ? 17 : (sliceAngle >= 48 ? 14 : 12);
        var labelFit = fitWheelLabel(items[i].label, baseSize, sliceAngle >= 72 ? 10 : 8);
        html += '<g transform="translate(' + textX.toFixed(2) + ' ' + textY.toFixed(2) + ') rotate(' + rotation.toFixed(2) + ')">';
        html += '<text class="wheel-label-text" text-anchor="middle" dominant-baseline="middle" font-size="' + labelFit.size + '" lengthAdjust="spacingAndGlyphs" textLength="' + (sliceAngle >= 72 ? 56 : 50) + '">' + escapeHtml(labelFit.text) + '</text>';
        html += '</g>';
      }
      svg.innerHTML = html;
    }
    function renderClassroomWorkspace() {
      renderClassroomTabs();
      renderClassSelector();
      renderClassStats();
      renderSelectedStudent();
      renderStudentCards();
      renderWheelOptionList();
      renderWheelResult();
      drawClassOptionWheel();
      E.studentGenderBtns.forEach(function(btn) { btn.classList.toggle('is-active', btn.dataset.studentGender === S.classroom.draftGender); });
    }

    function setClassroomView(view) {
      S.classroom.view = view === 'wheel' ? 'wheel' : 'class';
      commitClassroomChanges();
    }
    function addNewClassroom() {
      var name = prompt('Yeni sınıfın adını girin (Örn: 2/B):');
      if(!name || !name.trim()) return;
      var trimmed = name.trim();
      var duplicate = S.classroom.classes.some(function(cls) { return cls.name.toLowerCase() === trimmed.toLowerCase(); });
      if(duplicate) { alert('Bu isimde bir sınıf zaten var.'); return; }
      var newClass = createClassroom(trimmed);
      S.classroom.classes.push(newClass);
      S.classroom.currentClassId = newClass.id;
      S.classroom.selectedStudentId = '';
      S.classroom.classWinnerId = '';
      commitClassroomChanges();
    }
    function renameCurrentClassroom() {
      var current = getCurrentClassroom();
      if(!current) return;
      var name = prompt('Sınıfın yeni adı:', current.name);
      if(!name || !name.trim()) return;
      var trimmed = name.trim();
      var duplicate = S.classroom.classes.some(function(cls) { return cls.id !== current.id && cls.name.toLowerCase() === trimmed.toLowerCase(); });
      if(duplicate) { alert('Bu isimde başka bir sınıf zaten var.'); return; }
      current.name = trimmed;
      commitClassroomChanges();
    }
    function deleteCurrentClassroom() {
      var current = getCurrentClassroom();
      if(!current) return;
      if(S.classroom.classes.length <= 1) { alert('En az bir sınıf bulunmalıdır.'); return; }
      if(!confirm('"' + current.name + '" sınıfı silinecek. Emin misiniz?')) return;
      S.classroom.classes = S.classroom.classes.filter(function(cls) { return cls.id !== current.id; });
      S.classroom.currentClassId = S.classroom.classes[0].id;
      S.classroom.selectedStudentId = '';
      S.classroom.classWinnerId = '';
      commitClassroomChanges();
    }
    function changeCurrentClassroom(classId) {
      S.classroom.currentClassId = classId;
      S.classroom.selectedStudentId = '';
      S.classroom.classWinnerId = '';
      commitClassroomChanges();
    }
    function addStudentToCurrentClassroom() {
      var current = getCurrentClassroom();
      if(!current || !E.studentNameInput) return;
      var name = E.studentNameInput.value.trim();
      if(!name) return;
      current.students.push(createStudent(name, S.classroom.draftGender));
      E.studentNameInput.value = '';
      S.classroom.selectedStudentId = '';
      commitClassroomChanges();
      E.studentNameInput.focus();
    }
    function editStudentName(studentId) {
      var student = getStudentById(studentId);
      if(!student) return;
      var nextName = prompt('Öğrenci adını düzenleyin:', student.name);
      if(!nextName || !nextName.trim()) return;
      student.name = nextName.trim();
      commitClassroomChanges();
    }
    function deleteStudentFromCurrentClassroom(studentId) {
      var current = getCurrentClassroom();
      if(!current) return;
      var student = getStudentById(studentId);
      if(!student) return;
      if(!confirm('"' + student.name + '" öğrencisi silinsin mi?')) return;
      current.students = current.students.filter(function(item) { return item.id !== studentId; });
      if(S.classroom.selectedStudentId === studentId) S.classroom.selectedStudentId = '';
      if(S.classroom.classWinnerId === studentId) S.classroom.classWinnerId = '';
      commitClassroomChanges();
    }
    function setStudentStatus(studentId, status) {
      var student = getStudentById(studentId);
      if(!student) return;
      student.status = status;
      S.classroom.selectedStudentId = studentId;
      commitClassroomChanges();
    }
    function resetAllStudentStatuses() {
      var current = getCurrentClassroom();
      if(!current) return;
      current.students.forEach(function(student) { student.status = 'active'; });
      commitClassroomChanges();
    }
    function toggleSelectedStudentPassive() {
      var student = getStudentById(S.classroom.selectedStudentId);
      if(!student) return;
      student.status = student.status === 'passive' ? 'active' : 'passive';
      commitClassroomChanges();
    }
    function activateSelectedStudent() {
      var student = getStudentById(S.classroom.selectedStudentId);
      if(!student) return;
      student.status = 'active';
      commitClassroomChanges();
    }
    function scrollStudentCardIntoView(studentId) {
      if(!E.studentCardGrid) return;
      var card = null;
      [].slice.call(E.studentCardGrid.querySelectorAll('[data-student-card-id]')).some(function(node) {
        if(node.getAttribute('data-student-card-id') === studentId) { card = node; return true; }
        return false;
      });
      if(card && card.scrollIntoView) {
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
      }
    }
    function startRandomStudentPick() {
      var eligible = getEligibleStudents();
      if(S.classroom.isPickingStudent) return;
      if(eligible.length === 0) { alert('Seçim için en az bir aktif öğrenci gerekiyor.'); return; }
      S.classroom.isPickingStudent = true;
      S.classroom.classWinnerId = '';
      renderClassroomWorkspace();
      var sequence = [];
      var totalSteps = Math.max(eligible.length * 2, 15) + Math.floor(Math.random() * 6);
      var lastId = '';
      for(var i = 0; i < totalSteps; i += 1) {
        var pool = eligible.filter(function(student) { return eligible.length === 1 || student.id !== lastId; });
        var picked = pool[Math.floor(Math.random() * pool.length)];
        sequence.push(picked);
        lastId = picked.id;
      }
      function advance(step) {
        var student = sequence[step];
        S.classroom.highlightStudentId = student.id;
        renderStudentCards();
        playStudentPickSound(step, totalSteps);
        if(step < totalSteps - 1) {
          setTimeout(function() { advance(step + 1); }, 65 + step * 18);
          return;
        }
        S.classroom.highlightStudentId = '';
        S.classroom.classWinnerId = student.id;
        S.classroom.selectedStudentId = student.id;
        S.classroom.isPickingStudent = false;
        saveClassroomState();
        renderClassroomWorkspace();
        playStudentWinSound();
        konfetiBaslat();
        scrollStudentCardIntoView(student.id);
        var winnerNameEl = document.getElementById('winnerModalName');
        var winnerModalEl = document.getElementById('winnerModal');
        if(winnerNameEl) winnerNameEl.textContent = student.name;
        if(winnerModalEl) winnerModalEl.classList.add('show');
      }
      advance(0);
    }

    function addWheelItem(label) {
      var trimmed = String(label || '').trim();
      if(!trimmed) return;
      S.classroom.wheelItems.push({
        id: uid('wheel'),
        label: trimmed,
        color: W_COLORS[S.classroom.wheelItems.length % W_COLORS.length],
        enabled: true
      });
    }
    function addWheelItemsFromBulk(text) {
      String(text || '').split('\n').map(function(line) { return line.trim(); }).filter(Boolean).forEach(addWheelItem);
    }
    function toggleWheelItemEnabled(itemId) {
      S.classroom.wheelItems = S.classroom.wheelItems.map(function(item) {
        if(item.id === itemId) item.enabled = item.enabled === false;
        return item;
      });
      commitClassroomChanges();
    }
    function deleteWheelItem(itemId) {
      S.classroom.wheelItems = S.classroom.wheelItems.filter(function(item) { return item.id !== itemId; });
      if(S.classroom.wheelWinnerId === itemId) S.classroom.wheelWinnerId = '';
      commitClassroomChanges();
    }
    function resetWheelItems() {
      S.classroom.wheelItems = getDefaultWheelItems();
      S.classroom.wheelWinnerId = '';
      commitClassroomChanges();
    }
    function clearWheelItems() {
      if(!confirm('Çarktaki tüm seçenekler silinsin mi?')) return;
      S.classroom.wheelItems = [];
      S.classroom.wheelWinnerId = '';
      commitClassroomChanges();
    }
    function spinClassOptionWheel() {
      var items = getEnabledWheelItems();
      if(S.classroom.isSpinningWheel) return;
      if(items.length === 0) { alert('Çarkı çevirmek için en az bir aktif seçenek ekleyin.'); return; }
      S.classroom.isSpinningWheel = true;
      renderWheelResult();
      var winnerIndex = Math.floor(Math.random() * items.length);
      var winner = items[winnerIndex];
      var sliceAngle = 360 / items.length;
      var targetAngle = (winnerIndex * sliceAngle) + (sliceAngle / 2);
      var startRotation = S.classroom.wheelRotation || 0;
      var currentBase = ((startRotation % 360) + 360) % 360;
      var deltaToTarget = (360 - targetAngle - currentBase + 360) % 360;
      var endRotation = startRotation + (4 + Math.floor(Math.random() * 2)) * 360 + deltaToTarget;
      var startTime = null;
      var duration = 5200;
      var lastTick = -1;

      function animate(now) {
        if(startTime === null) startTime = now;
        var progress = Math.min(1, (now - startTime) / duration);
        var eased = 1 - Math.pow(1 - progress, 3);
        var rotation = startRotation + (endRotation - startRotation) * eased;
        S.classroom.wheelRotation = rotation;
        if(E.classOptionWheel) E.classOptionWheel.style.transform = 'rotate(' + rotation + 'deg)';
        var tickIndex = Math.floor((rotation - startRotation) / sliceAngle);
        if(tickIndex > lastTick) {
          lastTick = tickIndex;
          pulseWheelPointer();
          playWheelTickSound();
        }
        if(progress < 1) {
          requestAnimationFrame(animate);
          return;
        }
        S.classroom.isSpinningWheel = false;
        S.classroom.wheelWinnerId = winner.id;
        saveClassroomState();
        renderWheelResult();
        playWheelWinSound();
        konfetiBaslat();
      }
      requestAnimationFrame(animate);
    }

    window.handleWinner = function(action) {
      var winnerModalEl = document.getElementById('winnerModal');
      if(action === 'passive') toggleSelectedStudentPassive();
      if(action === 'keep') activateSelectedStudent();
      if(winnerModalEl) winnerModalEl.classList.remove('show');
    };

    /* ── SAYFA BAĞLANTILARI ── */
    E.shortcutHelpBtns.forEach(function(btn) {
      btn.addEventListener('click', function(evt) {
        evt.preventDefault();
        evt.stopPropagation();
        toggleShortcutPopover(btn.getAttribute('data-shortcut-target'));
      });
    });
    E.shortcutCloseBtns.forEach(function(btn) {
      btn.addEventListener('click', function(evt) {
        evt.preventDefault();
        closeShortcutPopovers();
      });
    });
    document.addEventListener('click', function(evt) {
      if(evt.target.closest('.shortcut-help')) return;
      closeShortcutPopovers();
    });

    E.modeTabs.forEach(function(tab) {
      tab.addEventListener('click', function() { setMode(tab.dataset.mode); });
    });
    if(E.startPauseBtn) {
      E.startPauseBtn.addEventListener('click', function() {
        S.running ? pauseTimer() : startTimer();
      });
    }
    if(E.stopBtn) {
      E.stopBtn.addEventListener('click', function() { stopTimer(); });
    }
    if(E.resetBtn) {
      E.resetBtn.addEventListener('click', resetTimer);
    }
    if(E.presetFiveBtn) {
      E.presetFiveBtn.addEventListener('click', function() { setPreset(300); });
    }
    if(E.presetTenBtn) {
      E.presetTenBtn.addEventListener('click', function() { setPreset(600); });
    }
    E.presetBtns.forEach(function(btn) {
      btn.addEventListener('click', function() { setPreset(Number(btn.dataset.preset)); });
    });
    E.adjBtns.forEach(function(btn) {
      btn.addEventListener('click', function() { adjustUnit(btn.dataset.unit, Number(btn.dataset.adj)); });
    });
    [E.hInput, E.mInput, E.sInput].forEach(function(input) {
      if(!input) return;
      input.addEventListener('change', function() {
        if(S.mode !== 'countdown' || S.running) return;
        S.cdTarget = Math.max(getInputMs(), 1000);
        S.dispMs = S.cdTarget;
        syncSteppers();
        render();
      });
    });
    if(E.soundToggleBtn) {
      E.soundToggleBtn.addEventListener('click', function() {
        S.alarmOn = !S.alarmOn;
        E.soundToggleBtn.innerHTML = S.alarmOn ? '<i class="fas fa-bell"></i> Ses açık' : '<i class="fas fa-bell-slash"></i> Ses kapalı';
        if(!S.alarmOn) clearAlarm();
      });
    }
    if(E.millisCb) {
      E.millisCb.addEventListener('change', function() {
        S.showMs = E.millisCb.checked;
        render();
      });
    }
    if(E.alarmStopBtn) {
      E.alarmStopBtn.addEventListener('click', clearAlarm);
    }
    if(E.stageFullscreenBtn) {
      E.stageFullscreenBtn.addEventListener('click', toggleStageFs);
    }
    document.addEventListener('fullscreenchange', syncFsBtn);
    document.addEventListener('webkitfullscreenchange', syncFsBtn);

    updateClock();
    buildTimerTicks();
    syncSteppers();
    render();
    S.clockTick = setInterval(updateClock, 1000);
    window.addEventListener('resize', function() {
      buildTimerTicks();
      render();
    });
    document.addEventListener('keydown', function(e) {
      if(isEditableTarget(e.target)) return;
      var k = e.key.toLowerCase();
      if(k === ' ' || k === 'enter') {
        e.preventDefault();
        S.running ? pauseTimer() : startTimer();
      }
      if(k === 'r') resetTimer();
    });

})();
  </script>
</body>
</html>
