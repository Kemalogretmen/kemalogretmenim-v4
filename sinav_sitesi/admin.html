<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Paneli — Kemal Öğretmenim</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#6C3DED;--purple-d:#5428C9;--purple-l:#8B5CF6;
  --navy:#0F172A;--slate:#475569;--muted:#94A3B8;
  --border:#E2E8F0;--cream:#F8F6FF;--white:#fff;
  --green:#10B981;--green-d:#059669;
  --red:#EF4444;--red-d:#DC2626;
  --yellow:#F59E0B;--teal:#0EA5E9;
  --bg:#F1F5F9;
  --r-sm:8px;--r:12px;--r-lg:16px;--r-xl:24px;
  --sh-sm:0 1px 3px rgba(0,0,0,.08);
  --sh:0 4px 12px rgba(0,0,0,.08);
  --sh-lg:0 10px 30px rgba(0,0,0,.12);
  --sh-xl:0 20px 40px rgba(0,0,0,.15);
  --fd:'Nunito',sans-serif;--fb:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--navy);min-height:100vh}
h1,h2,h3,h4{font-family:var(--fd)}

/* UTILITIES */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.justify-center{justify-content:center}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.flex-1{flex:1}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.text-center{text-align:center}.text-muted{color:var(--muted)}.text-sm{font-size:13px}.text-xs{font-size:11px}
.font-bold{font-weight:700}.font-semi{font-weight:600}
.p-4{padding:16px}.p-6{padding:24px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.w-full{width:100%}

/* CARD */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh-sm);border:1px solid var(--border)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--r-sm);border:none;cursor:pointer;font-weight:700;font-size:14px;font-family:var(--fb);transition:all .18s;display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 3px 10px rgba(108,61,237,.3)}
.btn-primary:hover:not(:disabled){box-shadow:0 5px 18px rgba(108,61,237,.4);transform:translateY(-1px)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover:not(:disabled){background:var(--green-d)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover:not(:disabled){background:var(--red-d)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--slate)}.btn-outline:hover:not(:disabled){border-color:var(--purple);color:var(--purple)}
.btn-lg{padding:12px 24px;font-size:15px}.btn-sm{padding:6px 12px;font-size:12px}

/* FORM */
.form-label{display:block;font-weight:700;font-size:12px;margin-bottom:5px;color:var(--navy)}
.form-input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--fb);outline:none;transition:border-color .2s;color:var(--navy);background:var(--white)}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,61,237,.1)}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-blue{background:#DBEAFE;color:var(--purple)}

/* SIDEBAR */
.admin-wrap{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-head{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-head h2{font-size:14px;font-weight:900;color:#fff;line-height:1.3}
.sidebar-head p{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.sidebar-nav{padding:10px 8px;flex:1;overflow-y:auto}
.snav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;transition:all .18s;margin-bottom:2px;font-family:var(--fb)}
.snav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.snav-item.active{background:linear-gradient(135deg,var(--purple),var(--purple-l));color:#fff;box-shadow:0 3px 12px rgba(108,61,237,.3)}
.sidebar-links-head{padding:14px 12px 6px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.snav-link{color:rgba(255,255,255,.72)}
.snav-link:hover{color:#fff}
.sidebar-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)}
.main-area{margin-left:230px;flex:1;min-width:0}
.page-pad{padding:28px 32px;max-width:1100px}

/* STEPS */
.step-row{display:flex;align-items:center;margin-bottom:24px}
.step-item{display:flex;align-items:center;gap:6px;flex:1}
.step-circle{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--muted);flex-shrink:0;transition:all .3s;font-family:var(--fd)}
.step-label{font-size:12px;font-weight:600;color:var(--muted)}
.step-line{flex:1;height:2px;background:var(--border);margin:0 5px}
.step-item.done .step-circle{background:var(--green);border-color:var(--green);color:#fff}
.step-item.done .step-label{color:var(--green)}
.step-item.active .step-circle{background:var(--purple);border-color:var(--purple);color:#fff}
.step-item.active .step-label{color:var(--purple);font-weight:700}

/* SEL CARDS */
.sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:9px}
.sel-card{padding:13px 8px;border:2px solid var(--border);border-radius:var(--r);text-align:center;cursor:pointer;font-weight:700;font-size:13px;transition:all .2s;background:var(--white);font-family:var(--fb)}
.sel-card:hover{border-color:var(--purple);color:var(--purple);background:#F5F3FF}
.sel-card.selected{border-color:var(--purple);background:#EEF2FF;color:var(--purple)}

/* PDF / CANVAS */
.pdf-layout{display:flex;gap:18px;align-items:flex-start}
.pdf-main{flex:1;min-width:0}
.pdf-controls{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--white);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap}
.pdf-canvas-wrap{position:relative;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);overflow:auto;max-height:560px;cursor:crosshair;user-select:none}
#pdfCanvas{display:block;background:var(--white)}
#cropCanvas{position:absolute;top:0;left:0}

/* Q PANEL */
.q-panel{width:290px;flex-shrink:0;max-height:660px;overflow-y:auto}
.q-list{display:flex;flex-direction:column;gap:8px}
.q-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);box-shadow:var(--sh-sm)}
.q-thumb{width:72px;height:44px;object-fit:contain;border:1px solid var(--border);border-radius:4px;background:#f8f9fa;flex-shrink:0}
.ans-badge{padding:3px 11px;border-radius:20px;background:var(--purple);color:#fff;font-weight:700;font-size:12px}
.q-handle{width:34px;height:44px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:10px;background:#F8FAFC;color:var(--muted);font-size:16px;cursor:grab;flex-shrink:0}
.q-handle:active{cursor:grabbing}
.q-order{min-width:18px;padding-top:4px;font-weight:800;color:var(--muted);font-size:12px;font-family:var(--fd)}
.q-meta{flex:1;min-width:0}
.q-answer-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.q-answer-chip{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:12px;font-weight:800;color:var(--slate);cursor:pointer;transition:all .18s}
.q-answer-chip:hover{border-color:var(--purple);color:var(--purple)}
.q-answer-chip.active{background:var(--purple);border-color:var(--purple);color:#fff;box-shadow:0 8px 16px rgba(108,61,237,.18)}
.q-remove-btn{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;padding:2px 4px;line-height:1}
.sortable-ghost{opacity:.45;background:#F5F3FF}
.sortable-chosen{box-shadow:var(--sh-lg);border-color:rgba(108,61,237,.32)}

/* TABLE */
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:#F8FAFC;padding:10px 13px;text-align:left;font-size:11px;font-weight:800;color:var(--muted);border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.data-table td{padding:10px 13px;font-size:13px;border-bottom:1px solid var(--border)}
.data-table tr:hover td{background:#FAFBFF}
.score-bar-track{height:8px;background:#E2E8F0;border-radius:4px;overflow:hidden;width:60px;display:inline-block}
.score-bar-fill{height:100%;border-radius:4px}

/* TOGGLE SWITCH */
.toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.toggle{width:42px;height:24px;background:var(--border);border-radius:12px;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:21px}

/* SPINNER */
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 16px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--sh-lg);animation:toastIn .25s ease;max-width:300px}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-info{background:var(--navy);color:#fff}
.toast-success{background:var(--green-d);color:#fff}
.toast-error{background:var(--red);color:#fff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal-box{background:var(--white);border-radius:var(--r-xl);padding:28px;width:100%;max-width:550px;box-shadow:var(--sh-xl);animation:popIn .22s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ans-opt{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;cursor:pointer;transition:all .18s;font-family:var(--fd)}
.ans-opt:hover{border-color:var(--purple);color:var(--purple)}
.ans-opt.sel{background:var(--purple);border-color:var(--purple);color:#fff}

/* GRADE COLORS */
.gc-1{background:linear-gradient(135deg,#FF6B6B,#FF8E53)}
.gc-2{background:linear-gradient(135deg,#FF8E53,#FFA726)}
.gc-3{background:linear-gradient(135deg,#FFA726,#FFCC02)}
.gc-4{background:linear-gradient(135deg,#4CAF50,#66BB6A)}
.gc-5{background:linear-gradient(135deg,#26A69A,#26C6DA)}
.gc-6{background:linear-gradient(135deg,#29B6F6,#42A5F5)}
.gc-7{background:linear-gradient(135deg,#5C6BC0,#7E57C2)}
.gc-8{background:linear-gradient(135deg,#AB47BC,#EC407A)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:14px}
.loading-overlay p{font-weight:600;color:var(--slate);font-size:14px}

/* LOGIN */
.login-bg{min-height:100vh;background:linear-gradient(145deg,#0F172A,#1E2A4A,#0F172A);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:44px 40px;max-width:380px;width:100%}
.login-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px;box-shadow:0 8px 24px rgba(108,61,237,.4)}

/* OPTION COUNT SELECTOR */
.opt-count-sel{display:flex;gap:8px}
.occ{width:38px;height:38px;border:2px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;transition:all .18s;font-family:var(--fd)}
.occ:hover{border-color:var(--purple);color:var(--purple)}
.occ.sel{background:var(--purple);border-color:var(--purple);color:#fff}

/* SECTION EDITOR */
.section-editor{display:flex;flex-direction:column;gap:12px}
.section-row{display:grid;grid-template-columns:minmax(0,1.6fr) 110px 110px auto;gap:10px;align-items:end;padding:14px;border:1px solid var(--border);border-radius:var(--r);background:#F8FAFC}
.section-note{padding:12px 14px;border-radius:var(--r);background:#EEF2FF;color:var(--purple);font-size:12px;font-weight:600;line-height:1.6}
.section-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:#EEF2FF;color:var(--purple);font-size:11px;font-weight:800}

/* MAIN FOOTER */
.main-footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:40px}
.main-footer a{color:var(--purple);text-decoration:none;font-family:var(--fd);font-weight:700;font-size:12px}
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div id="app"><div class="spinner" style="margin-top:100px"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { app, db } from "./js/firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  deleteDoc,
  query,
  where,
  orderBy,
  serverTimestamp,
  writeBatch,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  signOut,
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const GRADES=[1,2,3,4,5,6,7,8];
const SUBJECTS_BY_GRADE={
  1:['Türkçe','Matematik','Hayat Bilgisi','Deneme'],
  2:['Türkçe','Matematik','Hayat Bilgisi','Deneme'],
  3:['Türkçe','Matematik','Hayat Bilgisi','Fen Bilimleri','Deneme'],
  4:['Türkçe','Matematik','Sosyal Bilgiler','Fen Bilimleri','Deneme','Agisler'],
  5:['Türkçe','Matematik','Sosyal Bilgiler','Fen Bilimleri','Deneme','Agisler'],
  6:['Türkçe','Matematik','Sosyal Bilgiler','Fen Bilimleri','Deneme','Agisler'],
  7:['Türkçe','Matematik','Sosyal Bilgiler','Fen Bilimleri','Deneme','Agisler'],
  8:['Türkçe','Matematik','Sosyal Bilgiler','Fen Bilimleri','Deneme','Agisler']
};
const ALL_SUBJECTS=['Türkçe','Matematik','Hayat Bilgisi','Fen Bilimleri','Sosyal Bilgiler','Deneme','Agisler'];
const ALL_OPTS=['A','B','C','D','E','F'];
const auth=getAuth(app);

let authReady=false;
let currentUser=null;
let currentUserIsAdmin=false;
let questionSortables=[];
function createInitialState(overrides={}){
  return Object.assign({
    page:'create',step:1,
    grade:null,subject:null,examName:'',
    optionCount:4,negativeMarking:false,
    questionSections:[],
    questions:[],
    pdfDoc:null,pdfPage:1,pdfTotal:0,imgLoaded:false,pdfZoom:1.5,imgData:null,
    pubTitle:'',pubDur:30,editExamId:null,
    exams:[],results:[],appeals:[],
    appealInspect:null,
    rf:{grade:'',subject:'',name:'',examId:'',sube:''},
    draftImg:null,draftAns:null
  },overrides);
}
let A=createInitialState();
const appEl=()=>document.getElementById('app');

/* ── UTILS ── */
function toast(msg,type='info'){
  const el=document.createElement('div');el.className=`toast toast-${type}`;el.textContent=msg;
  document.getElementById('toast-wrap').appendChild(el);setTimeout(()=>el.remove(),3200);
}
function showLoad(msg='Yükleniyor...'){
  let el=document.getElementById('ld');
  if(!el){el=document.createElement('div');el.id='ld';el.className='loading-overlay';el.innerHTML=`<div class="spinner" style="margin:0"></div><p></p>`;document.body.appendChild(el);}
  el.querySelector('p').textContent=msg;el.style.display='flex';
}
function hideLoad(){const el=document.getElementById('ld');if(el)el.style.display='none';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){if(!ts)return'';try{const d=ts.seconds?new Date(ts.seconds*1000):new Date(ts);return d.toLocaleDateString('tr-TR');}catch{return'';}}
function fmtDT(ts){if(!ts)return'';try{const d=ts.seconds?new Date(ts.seconds*1000):new Date(ts);return d.toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return'';}}
function buildExamShareUrl(examId){return`${window.location.origin}/sinav_sitesi/index.html?examId=${encodeURIComponent(examId)}`;}
function normalizeKeyPart(value){
  return String(value||'').trim().toLocaleLowerCase('tr-TR').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
function buildStudentKey(source){
  return[
    normalizeKeyPart(source?.firstName),
    normalizeKeyPart(source?.lastName),
    normalizeKeyPart(source?.grade),
    normalizeKeyPart(source?.sube)
  ].filter(Boolean).join('|');
}
function getResultStudentKey(result){
  return result?.studentKey||buildStudentKey(result);
}
async function copyText(text,successMsg='Kopyalandı'){
  try{
    await navigator.clipboard.writeText(text);
    toast(successMsg,'success');
    return true;
  }catch{
    try{
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.style.position='fixed';
      ta.style.top='-1000px';
      document.body.appendChild(ta);
      ta.select();
      const copied=document.execCommand('copy');
      ta.remove();
      if(!copied) throw new Error('copy-failed');
      toast(successMsg,'success');
      return true;
    }catch{
      toast('Bağlantı kopyalanamadı','error');
      return false;
    }
  }
}
function getOPTS(){return ALL_OPTS.slice(0,A.optionCount);}
function syncQuestionOrder(){A.questions=A.questions.map((q,index)=>({...q,order:index}));}
function destroyQuestionSortables(){questionSortables.forEach(instance=>instance?.destroy?.());questionSortables=[];}
function shouldUseSections(subject){return subject==='Deneme'||subject==='Agisler';}
function toSectionNumber(value){
  const num=parseInt(value,10);
  return Number.isFinite(num)?num:'';
}
function normalizeSectionDraft(section,index){
  return{
    id:section?.id||`sec-${index+1}`,
    label:String(section?.label||section?.title||'').trim(),
    start:toSectionNumber(section?.start),
    end:toSectionNumber(section?.end)
  };
}
function cloneQuestionSections(sections){
  return Array.isArray(sections)?sections.map((section,index)=>normalizeSectionDraft(section,index)):[];
}
function findSectionLabel(questionNo,sections=A.questionSections){
  const list=Array.isArray(sections)?sections:[];
  for(const section of list){
    const start=toSectionNumber(section?.start);
    const end=toSectionNumber(section?.end);
    const label=String(section?.label||'').trim();
    if(!label||start===''||end==='') continue;
    if(questionNo>=start&&questionNo<=end) return label;
  }
  return '';
}
function getQuestionSectionLabel(index){
  return String(A.questions[index]?.sectionTitle||findSectionLabel(index+1)).trim();
}
function prepareQuestionSections(totalQuestions,sections=A.questionSections){
  if(!shouldUseSections(A.subject)) return{sections:[],assignments:{}};
  const rows=cloneQuestionSections(sections).filter(section=>section.label||section.start!==''||section.end!=='');
  if(!rows.length) return{sections:[],assignments:{}};
  const assignments={};
  const normalized=rows.map((section,index)=>{
    const label=String(section.label||'').trim();
    const start=toSectionNumber(section.start);
    const end=toSectionNumber(section.end);
    if(!label) throw new Error(`${index+1}. bölüm için ders adı girin.`);
    if(start===''||end==='') throw new Error(`${label} bölümü için başlangıç ve bitiş soru numaralarını girin.`);
    if(start<1||end<1||start>totalQuestions||end>totalQuestions){
      throw new Error(`${label} bölümü 1 ile ${totalQuestions} arasındaki sorulara atanmalıdır.`);
    }
    if(end<start) throw new Error(`${label} bölümünde bitiş soru numarası başlangıçtan küçük olamaz.`);
    for(let questionNo=start;questionNo<=end;questionNo++){
      if(assignments[questionNo]){
        throw new Error(`${questionNo}. soru hem ${assignments[questionNo]} hem de ${label} bölümüne atanmış görünüyor.`);
      }
      assignments[questionNo]=label;
    }
    return{label,start,end};
  });
  return{sections:normalized,assignments};
}
function deriveQuestionSectionsFromQuestions(questions){
  const derived=[];
  let current=null;
  (questions||[]).forEach((question,index)=>{
    const label=String(question?.sectionTitle||'').trim();
    if(!label){
      current=null;
      return;
    }
    if(current&&current.label===label&&current.end===index){
      current.end=index+1;
      return;
    }
    current={id:`derived-${derived.length+1}`,label,start:index+1,end:index+1};
    derived.push(current);
  });
  return cloneQuestionSections(derived);
}
function buildResultAnswerMap(result){
  const map={};
  const details=Array.isArray(result?.answerDetails)?result.answerDetails:[];
  details.forEach((item,index)=>{
    const questionNo=parseInt(item?.questionNo,10)||index+1;
    map[questionNo]=String(item?.selectedAnswer||'').trim().toUpperCase();
  });
  return map;
}
function calculateRevisedResultSnapshot(result,examMeta,questions){
  const totalQuestions=questions.length;
  const details=Array.isArray(result?.answerDetails)?result.answerDetails:[];
  if(!totalQuestions||!details.length) return null;
  if((parseInt(result?.total,10)||0)!==totalQuestions) return null;
  if(details.length!==totalQuestions) return null;
  const selectedMap=buildResultAnswerMap(result);
  let correct=0,wrong=0,blank=0;
  const answerDetails=questions.map((question,index)=>{
    const questionNo=index+1;
    const selectedAnswer=String(selectedMap[questionNo]||'').trim().toUpperCase();
    const correctAnswer=String(question?.correctAnswer||'').trim().toUpperCase();
    const sectionTitle=String(question?.sectionTitle||findSectionLabel(questionNo,examMeta.questionSections)||examMeta.subject||'').trim();
    let outcome='B';
    if(selectedAnswer) outcome=selectedAnswer===correctAnswer?'D':'Y';
    if(outcome==='D') correct++;
    else if(outcome==='Y') wrong++;
    else blank++;
    return{
      questionNo,
      questionId:question?.id||'',
      order:question?.order??index,
      sectionTitle,
      selectedAnswer,
      correctAnswer,
      outcome
    };
  });
  let netCorrect=correct;
  if(examMeta.negativeMarking) netCorrect=Math.max(0,correct-Math.floor(wrong/3));
  const score=totalQuestions?Math.round(netCorrect/totalQuestions*100):0;
  return{
    examTitle:examMeta.title||result.examTitle||'',
    subject:examMeta.subject||result.subject||'',
    grade:examMeta.grade??result.grade,
    correct,
    wrong,
    blank,
    netCorrect,
    score,
    total:totalQuestions,
    negativeMarking:!!examMeta.negativeMarking,
    answerDetails,
    questionSections:Array.isArray(examMeta.questionSections)?examMeta.questionSections:[]
  };
}
async function recalculateExamResults(examId,examMeta,questions){
  const snap=await getDocs(query(collection(db,'results'),where('examId','==',examId)));
  let updated=0,skipped=0,batchCount=0;
  let batch=writeBatch(db);
  for(const resultDoc of snap.docs){
    const nextData=calculateRevisedResultSnapshot(resultDoc.data(),examMeta,questions);
    if(!nextData){skipped++;continue;}
    batch.update(resultDoc.ref,nextData);
    updated++;
    batchCount++;
    if(batchCount>=350){
      await batch.commit();
      batch=writeBatch(db);
      batchCount=0;
    }
  }
  if(batchCount) await batch.commit();
  return{total:snap.size,updated,skipped};
}
function getAppealStatusMeta(status){
  if(status==='partial') return{label:'Kısmi İnceleme',icon:'🧩',bg:'#EDE9FE',color:'#6D28D9'};
  if(status==='accepted_corrected') return{label:'Haklı Bulundu Düzeltildi',icon:'✅',bg:'#DCFCE7',color:'#166534'};
  if(status==='corrected_no_score_change') return{label:'Düzeltildi Sonuç Aynı',icon:'🛠',bg:'#DBEAFE',color:'#1D4ED8'};
  if(status==='accepted') return{label:'Haklı',icon:'✅',bg:'#DCFCE7',color:'#166534'};
  if(status==='rejected') return{label:'Reddedildi',icon:'⛔',bg:'#FEE2E2',color:'#B91C1C'};
  return{label:'İncelemede',icon:'🕵️',bg:'#FEF3C7',color:'#92400E'};
}
function buildAppealQuestionReviewMap(appeal){
  const map=new Map();
  (Array.isArray(appeal?.questionReviews)?appeal.questionReviews:[]).forEach(review=>{
    const questionNo=parseInt(review?.questionNo,10);
    if(Number.isFinite(questionNo)&&questionNo>0) map.set(questionNo,review);
  });
  return map;
}
function getAppealQuestionNumbers(appeal){
  return(Array.isArray(appeal?.questionNos)?appeal.questionNos:[])
    .map(value=>parseInt(value,10))
    .filter(Number.isFinite)
    .filter(value=>value>0)
    .sort((a,b)=>a-b);
}
function deriveAppealStatus(appeal){
  const questionNos=getAppealQuestionNumbers(appeal);
  if(!questionNos.length) return appeal?.status||'pending';
  const reviewMap=buildAppealQuestionReviewMap(appeal);
  let pending=0,accepted=0,rejected=0,correctedNoChange=0;
  questionNos.forEach(questionNo=>{
    const status=reviewMap.get(questionNo)?.status||'pending';
    if(status==='accepted_corrected') accepted++;
    else if(status==='corrected_no_score_change') correctedNoChange++;
    else if(status==='rejected') rejected++;
    else pending++;
  });
  if(pending===questionNos.length) return 'pending';
  if(pending>0) return 'partial';
  if(rejected===questionNos.length) return 'rejected';
  if((accepted+correctedNoChange)>0&&rejected===0) return 'accepted';
  return 'partial';
}
function upsertAppealQuestionReview(appeal,review){
  const list=(Array.isArray(appeal?.questionReviews)?appeal.questionReviews:[])
    .filter(item=>parseInt(item?.questionNo,10)!==review.questionNo);
  list.push(review);
  return list.sort((a,b)=>(parseInt(a?.questionNo,10)||0)-(parseInt(b?.questionNo,10)||0));
}
function buildExamAppealSummary(appeals){
  const summary={};
  (appeals||[]).forEach(appeal=>{
    const examId=appeal?.examId;
    if(!examId) return;
    if(!summary[examId]) summary[examId]={total:0,pending:0};
    summary[examId].total+=1;
    if(deriveAppealStatus(appeal)==='pending'||deriveAppealStatus(appeal)==='partial') summary[examId].pending+=1;
  });
  return summary;
}
function getExamStatus(exam){
  if(exam?.status) return exam.status;
  if(exam?.published===true) return 'active';
  if(exam?.published===false) return 'paused';
  return 'draft';
}
function getExamStatusMeta(status){
  if(status==='active') return {label:'Yayında',icon:'🟢',bg:'#DCFCE7',color:'#166534'};
  if(status==='paused') return {label:'Pasif',icon:'⏸',bg:'#FEF3C7',color:'#92400E'};
  return {label:'Beklemede',icon:'🕒',bg:'#E2E8F0',color:'#334155'};
}

function initQuestionSortables(){
  destroyQuestionSortables();
  if(typeof Sortable==='undefined') return;
  ['qList','previewQuestionList'].forEach(id=>{
    const list=document.getElementById(id);
    if(!list) return;
    questionSortables.push(new Sortable(list,{
      animation:180,
      handle:'.q-handle',
      ghostClass:'sortable-ghost',
      chosenClass:'sortable-chosen',
      onEnd(evt){
        if(evt.oldIndex==null||evt.newIndex==null||evt.oldIndex===evt.newIndex) return;
        const [moved]=A.questions.splice(evt.oldIndex,1);
        A.questions.splice(evt.newIndex,0,moved);
        syncQuestionOrder();
        refreshQuestionPanels();
        toast('Soru sırası güncellendi','success');
      }
    }));
  });
}

/* ── IMAGE/PDF ── */
function renderImageOnCanvas(){
  const img=A.imgData;if(!img)return;
  const c=document.getElementById('pdfCanvas');const cc=document.getElementById('cropCanvas');
  if(!c||!cc)return;
  const baseW=Math.min(img.width,900);
  const scale=(A.pdfZoom/1.5)*(baseW/img.width);
  c.width=img.width*scale;c.height=img.height*scale;
  cc.width=c.width;cc.height=c.height;
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  const zl=document.getElementById('zoomLbl');if(zl)zl.textContent=Math.round(A.pdfZoom/1.5*100)+'%';
  const bp=document.getElementById('btnPDFPrev');if(bp)bp.disabled=true;
  const bn=document.getElementById('btnPDFNext');if(bn)bn.disabled=true;
  setupCrop();
}

async function loadFile(inp){
  const file=inp.files[0];if(!file)return;
  const isImg=/image\//i.test(file.type)||/\.(jpg|jpeg|png|webp)$/i.test(file.name);
  if(isImg){
    showLoad('Görsel yükleniyor...');
    try{
      const url=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=e=>res(e.target.result);fr.onerror=rej;fr.readAsDataURL(file);});
      const img=new Image();
      await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});
      A.pdfDoc=null;A.imgLoaded=true;A.imgData=img;A.pdfPage=1;A.pdfTotal=1;
      document.getElementById('pdfCont').style.display='block';
      document.getElementById('pdfPh').style.display='none';
      document.getElementById('pdfCtrl').style.display='flex';
      renderImageOnCanvas();hideLoad();
    }catch(e){hideLoad();toast('Görsel yükleme hatası: '+e.message,'error');}
    return;
  }
  showLoad('PDF yükleniyor...');
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const ab=await file.arrayBuffer();
    A.pdfDoc=await pdfjsLib.getDocument(ab).promise;
    A.pdfTotal=A.pdfDoc.numPages;A.pdfPage=1;A.imgLoaded=false;
    document.getElementById('pdfCont').style.display='block';
    document.getElementById('pdfPh').style.display='none';
    document.getElementById('pdfCtrl').style.display='flex';
    hideLoad();await renderPage(1);
  }catch(e){hideLoad();toast('PDF yükleme hatası: '+e.message,'error');}
}

async function renderPage(n){
  if(!A.pdfDoc)return;
  const page=await A.pdfDoc.getPage(n);
  const vp=page.getViewport({scale:A.pdfZoom});
  const c=document.getElementById('pdfCanvas');const cc=document.getElementById('cropCanvas');
  if(!c||!cc)return;
  c.width=vp.width;c.height=vp.height;cc.width=vp.width;cc.height=vp.height;
  await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  const pj=document.getElementById('pageJump');if(pj)pj.value=n;
  const bp=document.getElementById('btnPDFPrev');if(bp)bp.disabled=(n<=1);
  const bn=document.getElementById('btnPDFNext');if(bn)bn.disabled=(n>=A.pdfTotal);
  const zl=document.getElementById('zoomLbl');if(zl)zl.textContent=Math.round(A.pdfZoom/1.5*100)+'%';
  setupCrop();
}

function setupCrop(){
  const cc=document.getElementById('cropCanvas');const pc=document.getElementById('pdfCanvas');
  if(!cc||!pc)return;
  const newCC=cc.cloneNode(false);cc.parentNode.replaceChild(newCC,cc);
  let drawing=false,sx=0,sy=0;
  const getPos=e=>{
    const rect=newCC.getBoundingClientRect();
    const sx2=newCC.width/rect.width,sy2=newCC.height/rect.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(cx-rect.left)*sx2,y:(cy-rect.top)*sy2};
  };
  newCC.style.cursor='crosshair';
  newCC.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);sx=p.x;sy=p.y;e.preventDefault();});
  document.addEventListener('mousemove',function onmm(e){
    if(!drawing)return;const p=getPos(e);
    const ctx=newCC.getContext('2d');ctx.clearRect(0,0,newCC.width,newCC.height);
    ctx.strokeStyle='#6C3DED';ctx.lineWidth=2;ctx.setLineDash([6,3]);
    ctx.strokeRect(sx,sy,p.x-sx,p.y-sy);
    ctx.fillStyle='rgba(108,61,237,.08)';ctx.fillRect(sx,sy,p.x-sx,p.y-sy);
  });
  document.addEventListener('mouseup',function onmu(e){
    if(!drawing)return;drawing=false;const p=getPos(e);
    newCC.getContext('2d').clearRect(0,0,newCC.width,newCC.height);
    const x=Math.min(sx,p.x),y=Math.min(sy,p.y),w=Math.abs(p.x-sx),h=Math.abs(p.y-sy);
    if(w<20||h<20)return;
    const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
    tmp.getContext('2d').drawImage(pc,x,y,w,h,0,0,w,h);
    A.draftImg=tmp.toDataURL('image/jpeg',.88);A.draftAns=null;
    showCropModal();
  });
}

async function fbLoadExams(gf){
  try{
    const q=gf?query(collection(db,'exams'),where('grade','==',parseInt(gf)),orderBy('createdAt','desc')):
      query(collection(db,'exams'),orderBy('createdAt','desc'));
    const snap=await getDocs(q);return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e1){
    try{
      const q2=gf?query(collection(db,'exams'),where('grade','==',parseInt(gf))):query(collection(db,'exams'));
      const snap=await getDocs(q2);
      return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    }catch(e2){
      const psnap=await getDocs(collection(db,'exams'));
      const g=gf?parseInt(gf):null;
      const docs=g?psnap.docs.filter(d=>d.data()?.grade===g):psnap.docs;
      return docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    }
  }
}

async function fbLoadResults(rf){
  try{
    const q=query(collection(db,'results'),orderBy('date','desc'));
    const snap=await getDocs(q);
    let res=snap.docs.map(d=>({id:d.id,...d.data()})).map(r=>({...r,studentKey:getResultStudentKey(r)}));
    if(rf.grade) res=res.filter(r=>r.grade==rf.grade);
    if(rf.sube) res=res.filter(r=>r.sube===rf.sube);
    if(rf.subject) res=res.filter(r=>r.subject===rf.subject);
    if(rf.name) res=res.filter(r=>`${r.firstName} ${r.lastName}`.toLowerCase().includes(rf.name.toLowerCase()));
    if(rf.examId) res=res.filter(r=>r.examId===rf.examId);
    return res;
  }catch{
    const snap=await getDocs(collection(db,'results'));
    return snap.docs.map(d=>({id:d.id,...d.data()})).map(r=>({...r,studentKey:getResultStudentKey(r)})).sort((a,b)=>(b.date?.seconds||0)-(a.date?.seconds||0));
  }
}

async function fbLoadAppeals(){
  try{
    const snap=await getDocs(query(collection(db,'resultAppeals'),orderBy('createdAt','desc')));
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch{
    const snap=await getDocs(collection(db,'resultAppeals'));
    return snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }
}

async function fbLoadExamQuestions(examId){
  try{
    const orderedSnap=await getDocs(query(collection(db,'questions'),where('examId','==',examId),orderBy('order','asc')));
    return orderedSnap.docs.map(d=>({id:d.id,...d.data()}));
  }catch{
    const fallbackSnap=await getDocs(query(collection(db,'questions'),where('examId','==',examId)));
    return fallbackSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order??0)-(b.order??0));
  }
}

    if(!A.questions.length){toast('En az 1 soru ekleyin','error');return;}

    }catch(error){
      toast(error.message,'error');
      return;
    }

    const isEdit=!!A.editExamId;
    const actionLabel=targetStatus==='active'
      ? (isEdit?'Sınav güncelleniyor...':'Sınav yayınlanıyor...')
      : targetStatus==='paused'
        ? 'Sınav pasif olarak kaydediliyor...'
        : 'Sınav beklemede kaydediliyor...';

    showLoad(actionLabel);
    try{
      const payload={
        title:t,grade:A.grade,subject:A.subject,
        duration:A.pubDur,questionCount:A.questions.length,
        optionCount:A.optionCount,negativeMarking:A.negativeMarking,
        questionSections:sectionData.sections,
        published:targetStatus==='active',
        status:targetStatus,
        updatedAt:serverTimestamp()
      };

      let examId=A.editExamId;
      if(examId){
        await updateDoc(doc(db,'exams',examId),payload);
        const existingQuestions=await getDocs(query(collection(db,'questions'),where('examId','==',examId)));
        for(const qd of existingQuestions.docs){
          await deleteDoc(doc(db,'questions',qd.id));
        }
      }else{
        const er=await addDoc(collection(db,'exams'),Object.assign({},payload,{createdAt:serverTimestamp()}));
        examId=er.id;
      }

      const writtenQuestions=[];
      for(let i=0;i<A.questions.length;i++){
        const questionPayload={
          examId:examId,
          imageData:A.questions[i].img,
          correctAnswer:A.questions[i].ans,
          sectionTitle:sectionData.assignments[i+1]||'',
          order:A.questions[i].order??i
        };
        const questionRef=await addDoc(collection(db,'questions'),questionPayload);
        writtenQuestions.push({id:questionRef.id,...questionPayload});
      }

      let recalcSummary=null;
      if(isEdit){
        recalcSummary=await recalculateExamResults(examId,{
          title:t,
          grade:A.grade,
          subject:A.subject,
          negativeMarking:A.negativeMarking,
          questionSections:sectionData.sections
        },writtenQuestions);
      }

      const successText=targetStatus==='active'
        ? (isEdit?'🎉 Sınav güncellendi ve yayınlandı!':'🎉 Sınav başarıyla yayınlandı!')
        : targetStatus==='paused'
          ? '⏸ Sınav pasif olarak kaydedildi.'
          : '🕒 Sınav beklemede kaydedildi.';
      toast(successText,'success');
      resetBuilderState('exams');
      const [exams,appeals]=await Promise.all([fbLoadExams(''),fbLoadAppeals()]);
      A.exams=exams;
      A.appeals=appeals;
      hideLoad();render();
      if(recalcSummary?.updated){
        toast(`♻️ ${recalcSummary.updated} öğrenci sonucu yeni cevap anahtarına göre güncellendi.`,'success');
      }
      if(recalcSummary?.skipped){
        toast(`ℹ️ ${recalcSummary.skipped} eski sonuç kaydı soru sayısı uyuşmadığı için otomatik güncellenemedi.`,'info');

                ${appeal.reviewedAt?`<div><strong>Son işlem:</strong> ${fmtDT(appeal.reviewedAt)}</div>`:''}
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
                <button class="btn btn-sm btn-outline" onclick="W.inspectAppeal('${appeal.id}')">🔎 İncele</button>
                <button class="btn btn-sm btn-outline" onclick="W.openResultKarneById('${appeal.resultId}')">📄 Sonucu Aç</button>
                <button class="btn btn-sm btn-primary" onclick="W.closeExamAppeals();W.editExam('${examId}')">✏️ Sınavı Düzenle</button>
                <button class="btn btn-sm btn-outline" onclick="W.setAppealStatus('${appeal.id}','pending','${examId}')">🕵️ İncelemede</button>
                <button class="btn btn-sm btn-red" onclick="W.deleteAppeal('${appeal.id}','${examId}')">🗑 Sil</button>
              </div>
            </div>`;
        }).join('');
    const el=document.createElement('div');
    el.className='modal-overlay';
    el.id='examAppealsModal';
    el.innerHTML=`<div class="modal-box" style="max-width:860px;padding:0;overflow:hidden">
      <div style="padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-family:var(--fd);font-size:22px;font-weight:900">📝 İtiraz Edilen Sorular</div>
          <div class="text-sm text-muted" style="margin-top:4px">${esc(exam.title)} · ${appeals.length} kayıt</div>
        </div>
        <button class="btn btn-outline" onclick="W.closeExamAppeals()">Kapat</button>
      </div>
      <div style="padding:18px;max-height:75vh;overflow-y:auto;background:#F8FAFC">${body}</div>
    </div>`;
    document.body.appendChild(el);
    el.addEventListener('click',event=>{if(event.target===el)W.closeExamAppeals();});
  },
  renderAppealInspectModal(){
    const ctx=A.appealInspect;
    if(!ctx) return;
    const questionNo=ctx.questionNos[ctx.currentIndex]||ctx.questionNos[0];
    const question=ctx.questions[questionNo-1]||{};
    const detail=ctx.detailMap.get(questionNo)||{};
    const reviewMap=buildAppealQuestionReviewMap(ctx.appeal);
    const review=reviewMap.get(questionNo)||null;
    const reviewMeta=getAppealStatusMeta(review?.status||'pending');
    const imageSrc=question?.imageData||question?.imageUrl||'';
    const selectedAnswer=ctx.selectedAnswer||String(question?.correctAnswer||detail?.correctAnswer||'A').trim().toUpperCase();
    const optionCount=ctx.exam?.optionCount||4;
    const answerButtons=ALL_OPTS.slice(0,optionCount).map(opt=>`
      <button class="ans-opt ${selectedAnswer===opt?'sel':''}" type="button" onclick="W.selectAppealCorrectAnswer('${opt}')">${opt}</button>
    `).join('');
    const questionList=ctx.questionNos.map((itemQuestionNo,index)=>{
      const itemDetail=ctx.detailMap.get(itemQuestionNo)||{};
      const itemReview=reviewMap.get(itemQuestionNo)||null;

      return `
        <button type="button" onclick="W.selectAppealInspectQuestion(${index})" style="width:100%;text-align:left;padding:14px 15px;border-radius:16px;border:1.5px solid ${index===ctx.currentIndex?'#8B5CF6':'var(--border)'};background:${index===ctx.currentIndex?'#F5F3FF':'#fff'};cursor:pointer;display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
            <strong style="font-family:var(--fd);font-size:16px;color:var(--navy)">${itemQuestionNo}. Soru</strong>
            <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:${itemMeta.bg};color:${itemMeta.color};font-size:11px;font-weight:900">${itemMeta.icon} ${itemMeta.label}</span>
          </div>
          <div style="font-size:12px;color:var(--slate);line-height:1.7">
            ${itemDetail.sectionTitle?`${esc(itemDetail.sectionTitle)} · `:''}Doğru: <strong>${esc(itemDetail.correctAnswer||question?.correctAnswer||'—')}</strong> · Verilen: <strong>${esc(itemDetail.selectedAnswer||'Boş')}</strong>
          </div>
          ${itemReview?.message?`<div style="font-size:11px;color:#64748B;line-height:1.6">${esc(itemReview.message)}</div>`:''}
        </button>`;
    }).join('');
    let el=document.getElementById('appealInspectModal');
    if(!el){
      el=document.createElement('div');
      el.className='modal-overlay';
      el.id='appealInspectModal';
      document.body.appendChild(el);
      el.addEventListener('click',event=>{if(event.target===el)W.closeAppealInspect();});
    }
    el.innerHTML=`<div class="modal-box" style="width:min(1180px,calc(100vw - 24px));max-width:1180px;padding:0;overflow:hidden;max-height:calc(100vh - 24px);display:flex;flex-direction:column">
      <div style="padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-family:var(--fd);font-size:22px;font-weight:900">🔎 İtiraz İncelemesi</div>
          <div class="text-sm text-muted" style="margin-top:4px">${esc(ctx.appeal.examTitle||ctx.exam?.title||'Sınav')} · ${ctx.questionNos.length} soru</div>
        </div>
        <button class="btn btn-outline" onclick="W.closeAppealInspect()">Kapat</button>
      </div>
      <div style="display:grid;grid-template-columns:minmax(250px,320px) minmax(0,1fr);gap:0;flex:1;min-height:0;overflow:hidden">
        <div style="padding:18px;background:#F8FAFC;border-right:1px solid var(--border);overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:10px">
          ${questionList}
        </div>
        <div style="padding:18px;background:#fff;overflow-y:auto;min-height:0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px">
            <div>
              <div style="font-family:var(--fd);font-size:26px;font-weight:900">${questionNo}. Soru</div>
              <div class="text-sm text-muted" style="margin-top:4px">${esc(detail.sectionTitle||question.sectionTitle||ctx.appeal.subject||'Genel')} · Öğrenci: ${esc(ctx.appeal.firstName||'')} ${esc(ctx.appeal.lastName||'')}</div>
            </div>
            <span style="display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:${reviewMeta.bg};color:${reviewMeta.color};font-size:12px;font-weight:900">${reviewMeta.icon} ${reviewMeta.label}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px">
            <div style="padding:12px;border-radius:16px;background:#F8FAFC;border:1px solid var(--border)"><div style="font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em">Verilen</div><div style="font-family:var(--fd);font-size:26px;font-weight:900;color:#1E293B;margin-top:6px">${esc(detail.selectedAnswer||'Boş')}</div></div>
            <div style="padding:12px;border-radius:16px;background:#F8FAFC;border:1px solid var(--border)"><div style="font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em">Mevcut Doğru</div><div style="font-family:var(--fd);font-size:26px;font-weight:900;color:#2563EB;margin-top:6px">${esc(detail.correctAnswer||question.correctAnswer||'—')}</div></div>
            <div style="padding:12px;border-radius:16px;background:#F8FAFC;border:1px solid var(--border)"><div style="font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em">Durum</div><div style="font-family:var(--fd);font-size:18px;font-weight:900;color:#0F172A;margin-top:10px">${detail.outcome==='D'?'Doğru':detail.outcome==='Y'?'Yanlış':'Boş'}</div></div>
          </div>
          ${review?.message?`<div style="margin-bottom:14px;padding:12px 14px;border-radius:16px;background:#F8FAFC;border:1px solid var(--border);font-size:13px;line-height:1.8;color:var(--slate)"><strong style="color:var(--navy)">Son karar notu:</strong> ${esc(review.message)}</div>`:''}
          <div style="border:1px solid var(--border);border-radius:18px;background:#F8FAFC;padding:14px;margin-bottom:16px">
            ${imageSrc
              ? `<img src="${imageSrc}" alt="${questionNo}. soru" style="width:100%;max-height:min(48vh,520px);object-fit:contain;border-radius:14px;background:#fff;border:1px solid var(--border)">`
              : `<div style="padding:24px;border:1px dashed var(--border);border-radius:14px;background:#fff;color:var(--muted);font-size:14px;line-height:1.8">Bu soru için görsel verisi bulunamadı.</div>`
            }
          </div>
          <div style="padding:16px;border-radius:18px;background:#F8FAFC;border:1px solid var(--border);position:sticky;bottom:0;z-index:2">
            <div style="font-family:var(--fd);font-size:18px;font-weight:900;margin-bottom:8px">Cevap Anahtarı İncelemesi</div>
            <p class="text-sm text-muted" style="margin-bottom:12px;line-height:1.8">Doğru cevabı aşağıdan seç. Eğer seçtiğin cevap öğrencinin verdiği cevapla aynıysa sistem bu soruyu otomatik olarak <strong>Haklı bulundu düzeltildi</strong> olarak işaretler. Cevap anahtarında değişiklik yapmayacaksan bu soru için <strong>Reddet</strong> seçeneğini kullan.</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px">${answerButtons}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between">
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-green" type="button" onclick="W.applyAppealCorrection()">✅ Düzeltmeyi Uygula</button>
                <button class="btn btn-red" type="button" onclick="W.rejectAppealQuestion()">⛔ Reddet</button>
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-outline" type="button" onclick="W.selectAppealInspectQuestion(${Math.max(0,ctx.currentIndex-1)})" ${ctx.currentIndex===0?'disabled':''}>‹ Önceki</button>
                <button class="btn btn-outline" type="button" onclick="W.selectAppealInspectQuestion(${Math.min(ctx.questionNos.length-1,ctx.currentIndex+1)})" ${ctx.currentIndex===ctx.questionNos.length-1?'disabled':''}>Sonraki ›</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  },
  async inspectAppeal(appealId){
    const appeal=A.appeals.find(item=>item.id===appealId);
    if(!appeal){
      toast('İtiraz kaydı bulunamadı','error');
      return;
    }
    showLoad('İtiraz edilen sorular hazırlanıyor...');
    try{
      const [resultSnap,questions,examSnap]=await Promise.all([
        getDoc(doc(db,'results',appeal.resultId)),
        fbLoadExamQuestions(appeal.examId),
        getDoc(doc(db,'exams',appeal.examId))
      ]);
      if(!resultSnap.exists()) throw new Error('Sonuç kaydı bulunamadı.');
      if(!examSnap.exists()) throw new Error('Sınav kaydı bulunamadı.');
      const result={id:resultSnap.id,...resultSnap.data()};
      const exam={id:examSnap.id,...examSnap.data()};
      const detailMap=new Map((Array.isArray(result.answerDetails)?result.answerDetails:[]).map(item=>[parseInt(item?.questionNo,10),{...item}]));
      const questionNos=getAppealQuestionNumbers(appeal);
      A.appealInspect={
        appealId,
        appeal:{...appeal},
        exam,
        result,
        questions:[...questions],
        detailMap,
        questionNos,
        currentIndex:0,
        selectedAnswer:String(questions[questionNos[0]-1]?.correctAnswer||detailMap.get(questionNos[0])?.correctAnswer||'A').trim().toUpperCase()
      };
      this.renderAppealInspectModal();
    }catch(error){
      toast(error.message||'İtiraz detayları açılamadı','error');
    }finally{
      hideLoad();
    }
  },
  selectAppealInspectQuestion(index){
    if(!A.appealInspect) return;
    const nextIndex=Math.max(0,Math.min(A.appealInspect.questionNos.length-1,index));
    const questionNo=A.appealInspect.questionNos[nextIndex];
    const detail=A.appealInspect.detailMap.get(questionNo)||{};
    const question=A.appealInspect.questions[questionNo-1]||{};
    A.appealInspect.currentIndex=nextIndex;
    A.appealInspect.selectedAnswer=String(question.correctAnswer||detail.correctAnswer||'A').trim().toUpperCase();
    this.renderAppealInspectModal();
  },
  selectAppealCorrectAnswer(answer){
    if(!A.appealInspect) return;
    A.appealInspect.selectedAnswer=String(answer||'').trim().toUpperCase();
    this.renderAppealInspectModal();
  },
  async persistAppealQuestionReview(appeal,review){
    const questionReviews=upsertAppealQuestionReview(appeal,review);
    const nextAppeal={
      ...appeal,
      questionReviews,
      status:deriveAppealStatus({...appeal,questionReviews}),
      reviewedBy:currentUser?.uid||'',
      reviewedAt:{seconds:Math.floor(Date.now()/1000)}
    };
    await updateDoc(doc(db,'resultAppeals',appeal.id),{
      questionReviews,
      status:nextAppeal.status,
      reviewedAt:serverTimestamp(),
      reviewedBy:currentUser?.uid||''
    });
    A.appeals=A.appeals.map(item=>item.id===appeal.id?nextAppeal:item);
    if(A.appealInspect?.appeal?.id===appeal.id) A.appealInspect.appeal=nextAppeal;
    setContent(renderAdminExams());
    return nextAppeal;
  },
  async applyAppealCorrection(){
    const ctx=A.appealInspect;
    if(!ctx) return;
    const questionNo=ctx.questionNos[ctx.currentIndex];
    const question=ctx.questions[questionNo-1];
    if(!question){
      toast('Soru kaydı bulunamadı','error');
      return;
    }
    const nextAnswer=String(ctx.selectedAnswer||'').trim().toUpperCase();
    const currentAnswer=String(question.correctAnswer||'').trim().toUpperCase();
    if(!nextAnswer){
      toast('Lütfen doğru cevabı seçin.','error');
      return;
    }
    if(nextAnswer===currentAnswer){
      toast('Seçtiğiniz cevap mevcut anahtarla aynı. Hata yoksa bu soru için Reddet seçeneğini kullanın.','info');
      return;
    }
    showLoad('Cevap anahtarı güncelleniyor...');
    try{
      await updateDoc(doc(db,'questions',question.id),{correctAnswer:nextAnswer});
      ctx.questions[questionNo-1]={...question,correctAnswer:nextAnswer};
      const recalcSummary=await recalculateExamResults(ctx.exam.id,{
        title:ctx.exam.title,
        grade:ctx.exam.grade,
        subject:ctx.exam.subject,
        negativeMarking:ctx.exam.negativeMarking,
        questionSections:Array.isArray(ctx.exam.questionSections)?ctx.exam.questionSections:[]
      },ctx.questions);
      const updatedResult=calculateRevisedResultSnapshot(ctx.result,ctx.exam,ctx.questions);
      if(updatedResult){
        ctx.result={...ctx.result,...updatedResult};
        ctx.detailMap=new Map(updatedResult.answerDetails.map(item=>[parseInt(item.questionNo,10),{...item}]));
        A.results=A.results.map(item=>item.id===ctx.result.id?{...item,...updatedResult}:item);
      }
      const latestDetail=ctx.detailMap.get(questionNo)||{};
      const studentAnswer=String(latestDetail.selectedAnswer||'').trim().toUpperCase();
      const reviewStatus=studentAnswer&&studentAnswer===nextAnswer?'accepted_corrected':'corrected_no_score_change';
      const reviewMessage=reviewStatus==='accepted_corrected'
        ? 'Haklı bulundu, cevap anahtarı düzeltildi ve öğrenci sonucu güncellendi.'
        : 'Cevap anahtarı düzeltildi ancak bu öğrencinin verdiği cevap yeni anahtarla da uyuşmuyor.';
      await this.persistAppealQuestionReview(ctx.appeal,{
        questionNo,
        status:reviewStatus,
        previousCorrectAnswer:currentAnswer,
        updatedCorrectAnswer:nextAnswer,
        studentAnswer:studentAnswer||'',
        reviewedAt:Date.now(),
        reviewedBy:currentUser?.uid||'',
        message:reviewMessage,
        studentNoticeState:'queued'
      });
      ctx.selectedAnswer=nextAnswer;
      this.renderAppealInspectModal();
      toast(reviewStatus==='accepted_corrected'
        ? 'Soru haklı bulundu ve cevap anahtarı düzeltildi.'
        : 'Cevap anahtarı düzeltildi; bu öğrencinin sonucu değişmedi.',reviewStatus==='accepted_corrected'?'success':'info');
      if(recalcSummary?.updated){
        toast(`♻️ ${recalcSummary.updated} öğrenci sonucu yeniden hesaplandı.`,'success');
      }
    }catch(error){
      toast('Cevap anahtarı güncellenemedi: '+error.message,'error');
    }finally{
      hideLoad();
    }
  },
  async rejectAppealQuestion(){
    const ctx=A.appealInspect;
    if(!ctx) return;
    const questionNo=ctx.questionNos[ctx.currentIndex];
    const detail=ctx.detailMap.get(questionNo)||{};
    try{
      await this.persistAppealQuestionReview(ctx.appeal,{
        questionNo,
        status:'rejected',
        previousCorrectAnswer:String(detail.correctAnswer||ctx.questions[questionNo-1]?.correctAnswer||'').trim().toUpperCase(),
        updatedCorrectAnswer:String(detail.correctAnswer||ctx.questions[questionNo-1]?.correctAnswer||'').trim().toUpperCase(),
        studentAnswer:String(detail.selectedAnswer||'').trim().toUpperCase(),
        reviewedAt:Date.now(),
        reviewedBy:currentUser?.uid||'',
        message:'İtiraz incelendi, cevap anahtarında değişiklik gerekmedi.',
        studentNoticeState:'queued'
      });
      this.renderAppealInspectModal();
      toast(`${questionNo}. soru için itiraz reddedildi.`,'success');
    }catch(error){
      toast('İtiraz reddedilemedi: '+error.message,'error');
    }
  },
  async setAppealStatus(appealId,status,examId){
    const labels={pending:'İncelemede',accepted:'haklı',rejected:'reddedildi'};
    try{
      await updateDoc(doc(db,'resultAppeals',appealId),{
        status,
        reviewedAt:serverTimestamp(),
        reviewedBy:currentUser?.uid||''
      });
      A.appeals=A.appeals.map(item=>item.id===appealId?{...item,status,reviewedBy:currentUser?.uid||'',reviewedAt:{seconds:Math.floor(Date.now()/1000)}}:item);
      toast(`İtiraz durumu ${labels[status]||status} olarak güncellendi.`,'success');
      this.showExamAppeals(examId);
      setContent(renderAdminExams());
    }catch(error){
      toast('İtiraz durumu güncellenemedi: '+error.message,'error');
    }
  },
  async deleteAppeal(appealId,examId){
    if(!confirm('Bu itiraz kaydını silmek istiyor musunuz?')) return;
    try{
      await deleteDoc(doc(db,'resultAppeals',appealId));
      A.appeals=A.appeals.filter(item=>item.id!==appealId);
      toast('İtiraz kaydı silindi.','success');
      this.closeAppealInspect();
      this.showExamAppeals(examId);
      setContent(renderAdminExams());
    }catch(error){
      toast('İtiraz kaydı silinemedi: '+error.message,'error');
    }
  },
  exportXlsx(){
    if(!A.results.length){toast('Dışa aktarılacak kayıt yok','error');return;}
    const summary=A.results.map(r=>({
      'Ad':r.firstName,'Soyad':r.lastName,
      'Sınıf':r.grade+'. Sınıf','Şube':r.sube||'—',
      'Öğrenci Anahtarı':getResultStudentKey(r),
      'Ders':r.subject||'—','Sınav':r.examTitle||'—',
      'Doğru':r.correct,'Yanlış':r.wrong,'Boş':r.blank,
      'Net':r.netCorrect??'—',
      'Başarı (%)':r.score,'Tarih':fmtDT(r.date)
    }));
    const detailRows=[];
    A.results.forEach(r=>{
      const details=Array.isArray(r.answerDetails)?r.answerDetails:[];
      if(!details.length){
        detailRows.push({
          'Ad':r.firstName,'Soyad':r.lastName,'Sınıf':r.grade+'. Sınıf','Şube':r.sube||'—',
          'Öğrenci Anahtarı':getResultStudentKey(r),
          'Ders':r.subject||'—','Sınav':r.examTitle||'—','Soru No':'—',
          'Sonuç':'Detay yok','Verilen Cevap':'—','Doğru Cevap':'—'
        });
        return;
      }
      details.forEach(item=>{
        const outcome=item.outcome==='D'?'Doğru':item.outcome==='Y'?'Yanlış':'Boş';
        detailRows.push({
          'Ad':r.firstName,'Soyad':r.lastName,'Sınıf':r.grade+'. Sınıf','Şube':r.sube||'—',
          'Öğrenci Anahtarı':getResultStudentKey(r),
          'Ders':r.subject||'—','Bölüm / Üst Başlık':item.sectionTitle||r.subject||'—','Sınav':r.examTitle||'—','Soru No':item.questionNo,
          'Sonuç':outcome,'Verilen Cevap':item.selectedAnswer||'Boş','Doğru Cevap':item.correctAnswer||'—'
        });
      });
    });
    const ws=XLSX.utils.json_to_sheet(summary);
    const wsDetail=XLSX.utils.json_to_sheet(detailRows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Özet');
    XLSX.utils.book_append_sheet(wb,wsDetail,'Soru Detay');
    XLSX.writeFile(wb,'sinav_sonuclari_detayli.xlsx');
    toast('📥 Excel indiriliyor...','success');
  }
};
window.W=W;window.A=A;

async function checkIsAdmin(uid){
  try{
    const snap=await getDoc(doc(db,'admins',uid));
    return snap.exists();
  }catch(e){
    console.error(e);
    return false;
  }
}

onAuthStateChanged(auth, async (user) => {
  authReady=true;
  currentUser=user||null;
  currentUserIsAdmin=false;
  if(user) currentUserIsAdmin=await checkIsAdmin(user.uid);
  render();
});

function render(){
  if(!authReady){
    appEl().innerHTML=`<div class="spinner" style="margin-top:100px"></div>`;
    return;
  }
  if(!currentUser){renderLogin();return;}
  if(!currentUserIsAdmin){renderNotAuthorized();return;}
  if(A.page==='create'){renderShell(renderCreate());afterCreateRender();}
  else if(A.page==='exams') renderShell(renderAdminExams());
  else if(A.page==='results') renderShell(renderAdminResults());
}
render();
</script>
